<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Gestión — Global Solutions</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; }
  .container { max-width: 560px; margin: 0 auto; }

  .topbar { background: linear-gradient(160deg, #051525 0%, #0B2545 50%, #163A6B 100%); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .topbar-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .topbar .label { color: rgba(255,255,255,0.9); font-size: 13px; letter-spacing: 3px; font-weight: 700; }
  .topbar h1 { color: white; font-weight: 800; font-size: 22px; margin: 2px 0; }
  .topbar .sub { color: rgba(255,255,255,0.6); font-size: 10px; }
  .copy-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 8px; padding: 6px 10px; font-size: 10px; cursor: pointer; white-space: nowrap; margin-left: 8px; margin-top: 2px; transition: all 0.15s; }
  .copy-btn:hover { background: rgba(255,255,255,0.25); }
  .copy-btn.copied { background: #375623; border-color: #375623; }
  .filters { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 10px; border-radius: 20px; border: none; cursor: pointer; font-size: 10px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); transition: all 0.15s; }
  .filter-btn.active { background: white; color: #1F4E79; font-weight: 700; }

  .content { padding: 14px 12px; }
  .kpi-banner { background: linear-gradient(135deg, #1F4E79, #2E75B6); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(31,78,121,0.3); }
  .kpi-banner .result { color: white; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }
  .kpi-banner .kpi { color: rgba(255,255,255,0.75); font-size: 10px; margin-top: 3px; }

  .fase-card { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12); margin-bottom: 14px; background: white; }
  .fase-header { padding: 12px 16px; }
  .fase-header-inner { display: flex; align-items: center; justify-content: space-between; }
  .fase-left { display: flex; align-items: center; gap: 8px; }
  .fase-emoji { font-size: 20px; }
  .fase-num { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.7); }
  .fase-name { color: white; font-weight: 800; font-size: 15px; }
  .fase-right { text-align: right; }
  .fase-sub { color: rgba(255,255,255,0.8); font-size: 10px; font-style: italic; }
  .urgentes-badge { background: #C00000; color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-top: 3px; display: inline-block; }

  .tabs { display: flex; border-bottom: 1px solid #eee; }
  .tab-btn { flex: 1; padding: 8px 4px; border: none; cursor: pointer; font-size: 11px; color: #888; background: white; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
  .tab-btn.active { font-weight: 700; }

  .items { padding: 6px 10px 10px; }

  /* ACORDEÓN - Tareas Diarias (no tachables) */
  .acord-item { border-radius: 7px; margin-bottom: 4px; overflow: hidden; border: 1px solid #eee; }
  .acord-header { display: flex; align-items: center; padding: 9px 10px; cursor: pointer; background: white; transition: background 0.15s; gap: 8px; user-select: none; }
  .acord-header:hover { background: #f7f9ff; }
  .acord-header.open { background: #f0f5ff; }
  .acord-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; flex-shrink: 0; }
  .acord-header.open .acord-arrow { transform: rotate(90deg); }
  .acord-title { font-size: 12px; font-weight: 600; color: #222; flex: 1; }
  .acord-count { font-size: 10px; color: #aaa; background: #f0f0f0; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
  .proc-icon { font-size: 13px; cursor: pointer; flex-shrink: 0; opacity: 0.5; }
  .proc-icon:hover { opacity: 1; }

  .acord-body { display: none; background: #fafbff; border-top: 1px solid #eef2ff; padding: 8px 10px 8px 28px; }
  .acord-body.open { display: block; }

  /* Procedimiento / ayuda de memoria */
  .proc-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 11px; color: #614700; line-height: 1.5; }
  .proc-box strong { display: block; margin-bottom: 4px; font-size: 11px; color: #ad6800; }
  .proc-edit-area { width: 100%; border: 1px solid #ffe58f; border-radius: 5px; padding: 6px 8px; font-size: 11px; font-family: inherit; resize: vertical; min-height: 60px; background: #fffef5; outline: none; }
  .proc-save-btn { margin-top: 4px; background: #d48806; color: white; border: none; border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }

  .subtask { display: flex; align-items: flex-start; padding: 5px 4px; border-radius: 5px; margin-bottom: 1px; }
  .subtask-text { font-size: 11px; color: #444; line-height: 1.4; flex: 1; }
  .subtask-del { font-size: 14px; color: #ddd; cursor: pointer; padding: 0 4px; flex-shrink: 0; line-height: 1.6; }
  .subtask-del:hover { color: #e55; }

  .add-sub-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-sub-input { flex: 1; border: 1px solid #dde; border-radius: 5px; padding: 5px 8px; font-size: 11px; outline: none; font-family: inherit; }
  .add-sub-input:focus { border-color: var(--fc); }
  .add-sub-btn { background: var(--fc); color: white; border: none; border-radius: 5px; padding: 5px 10px; font-size: 13px; cursor: pointer; font-weight: 700; }

  /* PENDIENTES */
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #aaa; padding: 6px 4px 4px; }
  .pend-item { display: flex; align-items: flex-start; padding: 7px 8px; border-radius: 7px; cursor: pointer; margin-bottom: 3px; background: white; border: 1px solid #eee; }
  .pend-item:hover { background: #fafafa; }
  .pend-item.done-pend { background: #f9f9f9; }
  .pend-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #ccc; background: white; margin-right: 8px; margin-top: 1px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
  .pend-check.done { background: #607D8B; border-color: #607D8B; }
  .pend-check.done::after { content: '✓'; color: white; font-size: 11px; font-weight: 900; line-height: 1; }
  .pend-text { font-size: 12px; color: #222; line-height: 1.4; flex: 1; }
  .pend-item.done-pend .pend-text { color: #aaa; text-decoration: line-through; }
  .pend-edit { font-size: 12px; color: #bbb; cursor: pointer; padding: 0 3px; flex-shrink: 0; align-self: center; }
  .pend-edit:hover { color: #2E75B6; }
  .pend-tach { font-size: 13px; color: #bbb; cursor: pointer; padding: 0 3px; flex-shrink: 0; align-self: center; font-weight: 700; }
  .pend-tach:hover { color: #888; }
  .pend-tach.tachado { color: #4CAF50; }
  .pend-del { font-size: 15px; color: #ddd; cursor: pointer; padding: 0 4px; flex-shrink: 0; align-self: center; }
  .pend-del:hover { color: #e55; }

  .hoy-badge { background: #C00000; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .lunes-badge { background: #2E75B6; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .ok-badge { background: #375623; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .martes-badge { background: #5B3E8C; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .miercoles-badge { background: #2E7D32; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .jueves-badge { background: #6D4C41; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .viernes-badge { background: #00695C; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .sabado-badge { background: #616161; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .domingo-badge { background: #37474F; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 5px; letter-spacing: 0.5px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }

  .add-pend-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .add-pend-input { flex: 1; min-width: 150px; border: 1px solid #dde; border-radius: 7px; padding: 7px 10px; font-size: 12px; outline: none; font-family: inherit; }
  .add-pend-input:focus { border-color: var(--fc); }
  .badge-select { border: 1px solid #dde; border-radius: 7px; padding: 7px 6px; font-size: 11px; outline: none; font-family: inherit; background: white; cursor: pointer; }
  .add-pend-btn { background: var(--fc); color: white; border: none; border-radius: 7px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-weight: 700; white-space: nowrap; }

  /* DASHBOARD */
  .dash-wrap { margin-bottom: 14px; }
  .dash-formula { background: #1F4E79; border-radius: 10px 10px 0 0; padding: 10px 14px 8px; box-shadow: 0 2px 8px rgba(31,78,121,0.3); }

  .dash-formula .result { color: white; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
  .dash-formula .kpi { color: rgba(255,255,255,0.92); font-size: 12px; font-weight: 600; margin-top: 4px; }
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1a4570; border-radius: 0 0 10px 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .dash-card { background: #1F4E79; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
  .dash-card-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); letter-spacing: 0.8px; text-transform: uppercase; }
  .dash-card-value { font-size: 22px; font-weight: 800; color: white; line-height: 1; }
  .dash-card-value span { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); }
  .dash-card-sub { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 600; }
  .dash-card-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .dash-card-bar-fill { height: 100%; border-radius: 4px; }
  .dash-edit-btn { font-size: 9px; color: rgba(255,255,255,0.7); cursor: pointer; text-decoration: underline; margin-top: 1px; background: none; border: none; padding: 0; text-align: left; }
  .dash-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .dash-modal.open { display: flex; }
  .dash-modal-box { background: white; border-radius: 14px; padding: 20px; width: 88%; max-width: 380px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
  .dash-modal-title { font-size: 14px; font-weight: 800; color: #1F4E79; margin-bottom: 14px; }
  .dash-field { margin-bottom: 12px; }
  .dash-field label { font-size: 11px; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
  .dash-field input { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; outline: none; }
  .dash-field input:focus { border-color: #2E75B6; }
  .dash-modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .dash-btn-save { flex: 1; background: #1F4E79; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .dash-btn-cancel { background: #f0f0f0; color: #555; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; cursor: pointer; }

  /* PLAN EN FASES */
  .plan-fase { padding: 4px 0; }
  .plan-que { font-size: 11px; font-style: italic; color: #555; background: #f8f8f8; border-radius: 7px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; }
  .plan-que strong { color: #333; font-style: normal; display: block; margin-bottom: 3px; font-size: 10px; letter-spacing: 0.5px; }
  .plan-como-title { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 0.5px; margin-bottom: 6px; padding-left: 2px; }
  .plan-como-item { display: flex; align-items: flex-start; padding: 5px 4px; border-radius: 5px; cursor: pointer; margin-bottom: 2px; }
  .plan-como-item:hover { background: #f5f5f5; }
  .plan-como-item.done-como .plan-como-text { color: #aaa; text-decoration: line-through; }
  .plan-como-check { width: 14px; height: 14px; border-radius: 3px; border: 2px solid #ccc; background: white; margin-right: 8px; margin-top: 1px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .plan-como-check.done { border-color: var(--fc); background: var(--fc); }
  .plan-como-check.done::after { content: '✓'; color: white; font-size: 9px; font-weight: 700; }
  .plan-como-text { font-size: 12px; color: #222; line-height: 1.4; }
  .plan-meta-box { margin-top: 10px; padding: 7px 10px; border-radius: 7px; font-size: 11px; font-weight: 700; color: white; line-height: 1.4; }
  .plan-progress { display: flex; align-items: center; gap: 6px; margin: 8px 0 6px; }
  .plan-bar { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
  .plan-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .plan-bar-label { font-size: 9px; color: #888; white-space: nowrap; }

  /* PLAN DE ESTABILIZACIÓN */
  .plan-etapa { border-radius: 10px; margin-bottom: 12px; overflow: hidden; border: 1px solid #eee; }
  .plan-etapa-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .plan-etapa-header:hover { opacity: 0.92; }
  .plan-etapa-icon { font-size: 16px; }
  .plan-etapa-info { flex: 1; }
  .plan-etapa-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
  .plan-etapa-title { font-size: 13px; font-weight: 800; color: white; }
  .plan-etapa-periodo { font-size: 10px; color: rgba(255,255,255,0.75); font-style: italic; margin-top: 1px; }
  .plan-etapa-chevron { color: rgba(255,255,255,0.6); font-size: 12px; transition: transform 0.2s; }
  .plan-etapa-chevron.open { transform: rotate(90deg); }
  .plan-etapa-body { background: white; padding: 10px 12px 12px; border-top: 1px solid #eee; }
  .plan-objetivo { font-size: 11px; color: #555; font-style: italic; margin-bottom: 8px; padding: 6px 10px; background: #f8f8f8; border-radius: 6px; line-height: 1.4; }
  .plan-meta { font-size: 11px; font-weight: 700; color: white; padding: 6px 10px; border-radius: 6px; margin-top: 8px; line-height: 1.4; }
  .plan-accion { display: flex; align-items: flex-start; padding: 5px 4px; border-radius: 5px; cursor: pointer; margin-bottom: 1px; }
  .plan-accion:hover { background: #f5f5f5; }
  .plan-accion.done-plan .plan-accion-text { color: #aaa; text-decoration: line-through; }
  .plan-check { width: 14px; height: 14px; border-radius: 3px; border: 2px solid #ccc; background: white; margin-right: 7px; margin-top: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .plan-check.done { border-color: var(--etapa-color); background: var(--etapa-color); }
  .plan-check.done::after { content: "✓"; color: white; font-size: 9px; font-weight: 700; }
  .plan-accion-text { font-size: 11px; color: #222; line-height: 1.4; }
  .plan-progress { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .plan-progress-bar { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
  .plan-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .plan-progress-label { font-size: 9px; color: #888; white-space: nowrap; }

  /* SCALING UP */
  .su-section { margin-bottom: 12px; }
  .su-section-title { font-size: 11px; font-weight: 700; color: #37474F; letter-spacing: 0.5px; padding: 6px 4px 4px; border-bottom: 1px solid #dde4e8; margin-bottom: 6px; }
  .su-item { display: flex; align-items: flex-start; padding: 7px 8px; border-radius: 7px; margin-bottom: 3px; background: white; border: 1px solid #dde4e8; }
  .su-item.done-su { background: #f9f9f9; }
  .su-pillar { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-right: 6px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; white-space: nowrap; }
  .su-text { font-size: 12px; color: #333; line-height: 1.4; flex: 1; cursor: pointer; }
  .su-item.done-su .su-text { color: #aaa; text-decoration: line-through; }
  .su-del { font-size: 15px; color: #ddd; cursor: pointer; padding: 0 4px; flex-shrink: 0; align-self: center; }
  .su-del:hover { color: #e55; }
  .su-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid #ccc; background: white; margin-right: 8px; margin-top: 1px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
  .su-check.done { background: #455A64; border-color: #455A64; }
  .su-check.done::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

  .add-su-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
  .add-su-input { flex: 1; min-width: 140px; border: 1px solid #dde4e8; border-radius: 7px; padding: 7px 10px; font-size: 12px; outline: none; font-family: inherit; }
  .add-su-input:focus { border-color: #455A64; }
  .pillar-select { border: 1px solid #dde4e8; border-radius: 7px; padding: 7px 6px; font-size: 11px; outline: none; font-family: inherit; background: white; cursor: pointer; }
  .add-su-btn { background: #455A64; color: white; border: none; border-radius: 7px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-weight: 700; white-space: nowrap; }

  .plan-bloque-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: #888; padding: 8px 0 3px; text-transform: uppercase; }
  .save-indicator { text-align: center; color: #375623; font-size: 10px; padding: 2px; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }
  .footer { text-align: center; color: #aaa; font-size: 10px; padding: 8px 0 24px; }
</style>
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:linear-gradient(160deg,#051525,#0B2545,#163A6B);z-index:9999;overflow-y:auto">
  <div style="max-width:400px;margin:0 auto;padding:40px 20px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="color:rgba(255,255,255,0.7);font-size:11px;letter-spacing:3px;font-weight:700">GLOBAL SOLUTIONS</div>
      <div style="color:white;font-size:26px;font-weight:800;margin-top:4px">Panel de Gestión</div>
    </div>

    <!-- Paso 1: Selección de rol -->
    <div id="login-step-rol">
      <div style="color:rgba(255,255,255,0.7);font-size:11px;letter-spacing:2px;margin-bottom:16px;text-align:center">¿QUIÉN ERES?</div>
      <div id="roles-list" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <!-- Paso 2: Selección conductor (si aplica) -->
    <div id="login-step-conductor" style="display:none">
      <div style="color:rgba(255,255,255,0.7);font-size:11px;letter-spacing:2px;margin-bottom:16px;text-align:center">SELECCIONA TU NOMBRE</div>
      <div id="conductores-list-login" style="display:flex;flex-direction:column;gap:8px"></div>
      <button onclick="loginVolverRol()" style="width:100%;margin-top:16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px;font-size:13px;cursor:pointer">← Volver</button>
    </div>

    <!-- Paso 3: PIN -->
    <div id="login-step-pin" style="display:none">

const MAX_HISTORIAL = 20;

function registrarAccion(descripcion, fnDeshacer) {
  historialAcciones.push({ descripcion, fnDeshacer });
  if (historialAcciones.length > MAX_HISTORIAL) historialAcciones.shift();
  actualizarBotonDeshacer();
}
function deshacer() {
  if (historialAcciones.length === 0) return;
  const accion = historialAcciones.pop();
  accion.fnDeshacer();
  actualizarBotonDeshacer();
  saveData(); render();
}
function actualizarBotonDeshacer() {
  const btn = document.getElementById('btn-deshacer');
  if (!btn) return;
  btn.style.opacity = historialAcciones.length > 0 ? '1' : '0.35';
  btn.title = historialAcciones.length > 0 ? 'Deshacer: ' + historialAcciones[historialAcciones.length-1].descripcion : 'Sin acciones para deshacer';
}
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); deshacer(); }
});

function loadData() {
  try { const s = localStorage.getItem('gs_panel_v5'); appData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); } 
  catch(e) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  try { const s = localStorage.getItem('gs_panel_ui_v5'); uiState = s ? JSON.parse(s) : {}; }
  catch(e) { uiState = {}; }
  // Validar que el orden de fases sea siempre el correcto
  const ordenCorrecto = ['comercial','operacional','financiero','control'];
  if (appData.fases) {
    appData.fases.sort((a,b) => {
      const ia = ordenCorrecto.indexOf(a.id);
      const ib = ordenCorrecto.indexOf(b.id);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
  }
  // Migración: agregar dashboard si no existe
  if (!appData.dashboard) appData.dashboard = JSON.parse(JSON.stringify(DEFAULT_DATA.dashboard));
  // Costos fijos y PE — valores fijos, no se sobreescriben por localStorage
  appData.dashboard.gasto_meta = 5080000;
  if (appData.dashboard.gasto_real === undefined) appData.dashboard.gasto_real = 0;
  // PE siempre calculado desde costos fijos con margen 25%
  appData.dashboard.meta_pe = Math.round(appData.dashboard.gasto_meta / 0.25);
  if (appData.dashboard.servicios_semana === undefined) appData.dashboard.servicios_semana = 0;
  if (appData.dashboard.servicios_semana_presup === undefined) appData.dashboard.servicios_semana_presup = 0;
  if (appData.dashboard.facturas_cobrar === undefined) appData.dashboard.facturas_cobrar = 0;
  if (appData.dashboard.presupuesto_mes === undefined) appData.dashboard.presupuesto_mes = 0;
  // Migración: agregar ámbito control si no existe
  if (!appData.fases.find(f => f.id === 'control')) {
    const defaultControl = DEFAULT_DATA.fases.find(f => f.id === 'control');
    if (defaultControl) appData.fases.push(JSON.parse(JSON.stringify(defaultControl)));
  }
  // Migración: midia
  if (!appData.midia_foco) appData.midia_foco = [];
  if (!appData.midia_open) appData.midia_open = {};
  if (!appData.pipeline) appData.pipeline = JSON.parse(JSON.stringify(DEFAULT_DATA.pipeline));
  // Asegurar que clientes del DEFAULT_DATA siempre estén presentes
  DEFAULT_DATA.pipeline.forEach(def => {
    if (!appData.pipeline.find(p => p.cliente === def.cliente)) {
      appData.pipeline.push(JSON.parse(JSON.stringify(def)));
    }
  });
  // Migración: agregar plan a fases que no lo tengan
  appData.fases.forEach(fase => {
    if (!fase.plan) {
      const defaultFase = DEFAULT_DATA.fases.find(f => f.id === fase.id);
      if (defaultFase && defaultFase.plan) fase.plan = defaultFase.plan;
    }
  });
  // Migración: agregar plan a scalingup si no existe
  if (!appData.scalingup.plan) {
    appData.scalingup.plan = DEFAULT_DATA.scalingup.plan;
  }
  if (!appData.scalingup.planEscalamiento) {
    appData.scalingup.planEscalamiento = DEFAULT_DATA.scalingup.planEscalamiento;
  }
  // Migración: plan personal en control
  const ctrlFase = appData.fases.find(f => f.id === 'control');
  if (ctrlFase && !ctrlFase.personalPendientes) {
    ctrlFase.personalPendientes = [];
  }
}

async function addServicio() {
  const fechaRaw = document.getElementById('srv_fecha')?.value.trim();
  // Convertir yyyy-mm-dd a dd-mm-yyyy para consistencia interna
  const fecha = fechaRaw ? (() => { const p=fechaRaw.split('-'); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : fechaRaw; })() : null;
  const patenteRaw = document.getElementById('srv_patente')?.value.trim();
  const patente = patenteRaw === '__tercero__'
    ? (document.getElementById('srv_patente_manual')?.value.trim().toUpperCase() || 'TERCERO')
    : patenteRaw;
  const conductor = document.getElementById('srv_conductor')?.value.trim();
  const tipoEquipo = document.getElementById('srv_tipo_equipo')?.value.trim() || '';
  const clienteSelect = document.getElementById('srv_cliente')?.value.trim();
  const cliente = clienteSelect === '__nuevo__'
    ? (document.getElementById('srv_cliente_nuevo')?.value.trim() || '')
    : clienteSelect;
  const origen = document.getElementById('srv_origen')?.value.trim();
  const km = 0;
  const viaticos = 0;
  const peajes = parseInt(document.getElementById('srv_peajes')?.value) || 0;
  if (!patente && !cliente) return;
  if (!appData.servicios) appData.servicios = [];
  const hoy = new Date();
  const fechaFinal = fecha || `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  const partesFecha = fechaFinal.split('-');
  const anio = partesFecha[2] || hoy.getFullYear().toString();
  const mes = partesFecha[1] || String(hoy.getMonth()+1).padStart(2,'0');
  const id = 'S' + String(appData.servicios.length + 1).padStart(2,'0');
  const guias = uiState.srv_guias || [{ num:'', destino:'', fecha_descarga:'' }];
  const servicio = { id, fecha: fechaFinal, anio, mes, patente, conductor, tipoEquipo, cliente, precio: 0, petroleo: 0, adicional: 0, liquidado: false, origen, km, viaticos, peajes, guias };
  appData.servicios.push(servicio);
  upsertServicioSupabase(servicio);
  appData.dashboard.ventas_mes = (appData.dashboard.ventas_mes || 0) + precio;
  // Agregar conductor nuevo a la lista si no existe
  if (conductor && !(appData.conductores||[]).includes(conductor)) {
    if (!appData.conductores) appData.conductores = [];
    appData.conductores.push(conductor);
  }
  uiState.srv_guias = [{ num:'', destino:'', fecha_descarga:'' }];

  // Guardar en Supabase si está conectado
  let guardadoEnDB = false;
  if (supaConectado && supa) {
    try {
      const { error } = await supa.from('servicios').insert(servicioToRow(servicio));
      if (!error) guardadoEnDB = true;
    } catch(e) { guardadoEnDB = false; }
  }

  saveData(); render();
  mostrarToastServicio(guardadoEnDB);
}
function delServicio(si) {
  if (!appData.servicios) return;
  const precio = appData.servicios[si]?.precio || 0;
  appData.servicios.splice(si, 1);
  appData.dashboard.ventas_mes = Math.max(0, (appData.dashboard.ventas_mes || 0) - precio);
  saveData(); render();
}

function editPendInline(el, faseId, pi) {
  if (el.isContentEditable) return;
  el.contentEditable = true;
  el.style.outline = '1px solid #aaa';
  el.style.borderRadius = '3px';
  el.style.padding = '1px 4px';
  el.focus();
  // Seleccionar todo el texto
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
  const guardar = () => {
    el.contentEditable = false;
    el.style.outline = '';
    el.style.padding = '';
    const nuevoTexto = el.innerText.trim();
    if (nuevoTexto) {
      appData.fases.find(f=>f.id===faseId).pendientes[pi].texto = nuevoTexto;
      saveData();
    } else { render(); }
  };
  el.onblur = guardar;

function servicioToRow(s) {
  return {
    id: s.id,
    fecha: s.fecha,
    anio: s.anio,
    mes: s.mes,
    patente: s.patente || '',
    conductor: s.conductor || '',
    tipo_equipo: s.tipoEquipo || '',
    cliente: s.cliente || '',
    origen: s.origen || '',
    peajes: s.peajes || 0,
    guias: s.guias || [],
    precio: s.precio || 0,
    km: s.km || 0,
    litros: s.litros || 0,
    monto_comb: s.montoComb || 0,
    petroleo: s.petroleo || 0,
    adicional: s.adicional || 0,
    viaticos: s.viaticos || 0,
    cobro: s.cobro || 'pendiente',
    liquidado: s.liquidado || false,
    costo_total: s.costoTotal || 0,
    margen: s.margen || 0,
    rendimiento: s.rendimiento || 0,
  };
}

function rowToServicio(r) {
  return {
    id: r.id,
    fecha: r.fecha,
    anio: r.anio,
    mes: r.mes,
    patente: r.patente,
    conductor: r.conductor,
    tipoEquipo: r.tipo_equipo,
    cliente: r.cliente,
    origen: r.origen,
    peajes: r.peajes,
    guias: r.guias || [],
    precio: r.precio,
    km: r.km,
    litros: r.litros,
    montoComb: r.monto_comb,
    petroleo: r.petroleo,
    adicional: r.adicional,
    viaticos: r.viaticos,
    cobro: r.cobro,
    liquidado: r.liquidado,
    costoTotal: r.costo_total,
    margen: r.margen,
    rendimiento: r.rendimiento,
  };
}

async function syncServiciosDesdeSupabase() {
  if (!supaConectado || !supa) return;
  try {
    const { data, error } = await supa.from('servicios').select('*').order('created_at');
    if (!error && data) {
      // Migrar servicios locales a Supabase si la tabla está vacía
      if (data.length === 0 && appData.servicios && appData.servicios.length > 0) {
        for (const s of appData.servicios) {
          await supa.from('servicios').insert(servicioToRow(s));
        }
      } else if (data.length > 0) {
        appData.servicios = data.map(rowToServicio);
        saveData();
      }
    }
  } catch(e) { console.warn('Error sync servicios', e); }
}

async function guardarServicioSupabase(servicio) {
  if (!supaConectado || !supa) return false;
  try {
    const { error } = await supa.from('servicios').upsert(servicioToRow(servicio));
    return !error;
  } catch(e) { return false; }
}

  } catch(e) {
    if (el) { el.textContent = '⬤ DB Offline'; el.style.color = '#e57373'; }
    console.warn('Supabase no disponible, usando localStorage', e);
  }
}

async function syncPipelineDesdeSupabase() {
  const { data, error } = await supa.from('pipeline').select('*').order('created_at');
  if (!error && data) {
    if (data.length === 0 && appData.pipeline && appData.pipeline.length > 0) {
      // Primera vez — migrar pipeline local a Supabase
      for (const item of appData.pipeline) {
        const row = {
          cliente: item.cliente,
          contacto: item.contacto || '',
          etapa: item.etapa || 'prospecto',
          ultima_gestion: item.ultimaGestion || '',
          proxima_accion: item.proximaAccion || '',
          notas: item.notas || '',
        };
        const { data: ins } = await supa.from('pipeline').insert(row).select().single();
        if (ins) item.id = ins.id;
      }
      saveData();
    } else {
      appData.pipeline = data.map(r => ({
        id: r.id,
        cliente: r.cliente,
        contacto: r.contacto || '',
        etapa: r.etapa || 'prospecto',
        ultimaGestion: r.ultima_gestion || '',
        proximaAccion: r.proxima_accion || '',
        notas: r.notas || '',
      }));
      saveData(); render();
    }
  }
}

async function guardarPipelineSupabase(item) {
  if (!supaConectado || !supa) return;
  const row = {
    cliente: item.cliente,
    contacto: item.contacto || '',
    etapa: item.etapa || 'prospecto',
    ultima_gestion: item.ultimaGestion || '',
    proxima_accion: item.proximaAccion || '',
    notas: item.notas || '',
  };
  if (item.id && item.id.includes('-')) {
    await supa.from('pipeline').update(row).eq('id', item.id);
  } else {
    const { data } = await supa.from('pipeline').insert(row).select().single();
    if (data) item.id = data.id;
  }
}

async function eliminarPipelineSupabase(id) {
  if (!supaConectado || !supa || !id || !id.includes('-')) return;
  await supa.from('pipeline').delete().eq('id', id);
}
// ── SYNC SERVICIOS SUPABASE ───────────────────────────────
async function syncServiciosDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('servicios').select('*').order('created_at');
    if (error) { console.warn('Error sync servicios:', error); return; }
    if (!data || data.length === 0) {
      // Primera vez — migrar servicios locales a Supabase
      const locales = appData.servicios || [];
      for (const s of locales) {
        await upsertServicioSupabase(s);
      }
    } else {
      // Merge: supabase manda, pero agregar locales que no estén
      const idsRemoto = new Set(data.map(r => r.id));
      const localesNuevos = (appData.servicios||[]).filter(s => !idsRemoto.has(s.id));
      for (const s of localesNuevos) {
        await upsertServicioSupabase(s);
      }
      // Actualizar appData con datos remotos + locales nuevos
      const remotos = data.map(r => ({
        id: r.id, fecha: r.fecha, anio: r.anio, mes: r.mes,
        patente: r.patente, conductor: r.conductor, tipoEquipo: r.tipo_equipo,
        cliente: r.cliente, origen: r.origen, peajes: r.peajes||0,
        guias: r.guias||[], precio: r.precio||0, km: r.km||0,
        litros: r.litros||0, montoComb: r.monto_comb||0,
        petroleo: r.petroleo||0, adicional: r.adicional||0,
        viaticos: r.viaticos||0, cobro: r.cobro||'pendiente',
        liquidado: r.liquidado||false, costoTotal: r.costo_total||0,
        margen: r.margen||0, rendimiento: r.rendimiento||0
      }));
      appData.servicios = [...remotos, ...localesNuevos];
      saveData(); render();
    }
  } catch(e) { console.warn('Error sync servicios:', e); }
}

async function upsertServicioSupabase(s) {
  if (!supa || !supaConectado) return;
  try {
    const row = {
      id: s.id, fecha: s.fecha, anio: s.anio||'', mes: s.mes||'',
      patente: s.patente||'', conductor: s.conductor||'',
      tipo_equipo: s.tipoEquipo||'', cliente: s.cliente||'',
      origen: s.origen||'', peajes: s.peajes||0,
      guias: s.guias||[], precio: s.precio||0, km: s.km||0,
      litros: s.litros||0, monto_comb: s.montoComb||0,
      petroleo: s.petroleo||0, adicional: s.adicional||0,
      viaticos: s.viaticos||0, cobro: s.cobro||'pendiente',
      liquidado: s.liquidado||false, costo_total: s.costoTotal||0,
      margen: s.margen||0, rendimiento: s.rendimiento||0
    };
    await supa.from('servicios').upsert(row, { onConflict: 'id' });
  } catch(e) { console.warn('Error upsert servicio:', e); }
}

function renderInformes() {
  const periodo = uiState.informe_periodo || 'mes';
  const ambitoSel = uiState.informe_ambito || 'comercial';
  const servicios = appData.servicios || [];

  // Filtrar por período
  const hoy = new Date();
  const dd = s => { const p=s.fecha.split('-'); return new Date(p[2],p[1]-1,p[0]); };

  function filtrarPeriodo(svcs) {
    if (periodo === 'hoy') {
      const h = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
      return svcs.filter(s => s.fecha === h);
    }
    if (periodo === 'semana') {
      const lunes = new Date(hoy); lunes.setDate(hoy.getDate() - hoy.getDay() + 1);
      return svcs.filter(s => { try { return dd(s) >= lunes; } catch(e) { return false; } });
    }
    if (periodo === 'mes') {
      return svcs.filter(s => s.mes === String(hoy.getMonth()+1).padStart(2,'0') && s.anio === String(hoy.getFullYear()));
    }
    if (periodo === 'anterior') {
      const mesSel = uiState.informe_mes_sel || `${hoy.getFullYear()}-${String(hoy.getMonth()).padStart(2,'0')}`;
      const [anio, mes] = mesSel.split('-');
      return svcs.filter(s => s.anio === anio && s.mes === mes);
    }
    if (periodo === 'anual') {
      return svcs.filter(s => s.anio === String(hoy.getFullYear()));
    }
    return svcs;
  }

  const filtrados = filtrarPeriodo(servicios);
  const liquidados = filtrados.filter(s => s.liquidado);

  // KPIs base
  const totalServicios = filtrados.length;
  const totalIngresos = liquidados.reduce((a,s) => a+(s.precio||0), 0);
  const totalKm = liquidados.reduce((a,s) => a+(s.km||0), 0);
  const totalCombMonto = liquidados.reduce((a,s) => a+(s.montoComb||0), 0);
  const totalLitros = liquidados.reduce((a,s) => a+(s.litros||0), 0);
  const totalCostos = liquidados.reduce((a,s) => a+(s.costoTotal||0), 0);
  const rendProm = totalLitros > 0 ? (totalKm/totalLitros).toFixed(1) : '—';
  const margenProm = totalIngresos > 0 ? Math.round(((totalIngresos-totalCostos)/totalIngresos)*100) : 0;
  const cobPagado = liquidados.filter(s=>s.cobro==='pagado').reduce((a,s)=>a+(s.precio||0),0);
  const cobPendiente = liquidados.filter(s=>!s.cobro||s.cobro==='pendiente').reduce((a,s)=>a+(s.precio||0),0);

  function contenidoDisponibilidad() {

    if (dias.length===0) return `<div style="text-align:center;color:#aaa;padding:20px;font-size:12px">Sin registros de disponibilidad</div>`;

      const dd = disponibilidad[fecha]||{};

        if (e==='En servicio') resumenEquipos[p].enServicio++;

        else if (e==='Mantención') resumenEquipos[p].mantencion++;
      });
    });

    return `<div style="font-size:9px;font-weight:700;color:#6A1B9A;margin-bottom:8px;letter-spacing:0.5px">RESUMEN POR EQUIPO (${dias.length} días)</div>

          <span style="font-size:12px;font-weight:700;color:#333">${p}</span>

          <span style="font-size:9px;background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:6px">${r.enServicio}d en serv.</span>

      porConductor[c].km += s.km||0;

    const su = appData.scalingup || {};
    const fases = su.f6Items || [];

      return `<div style="padding:10px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:6px;border-left:3px solid #37474F">

    </div>`;
  }

                    ambitoSel==='operacional' ? contenidoOperacional() :
                    ambitoSel==='financiero' ? contenidoFinanciero() :
                    ambitoSel==='rrhh' ? contenidoRRHH() :
                    contenidoScalingUp();

  return `<div style="padding:12px">
    ${periodoHTML}
    ${kpisHTML}
    ${ambitoHTML}
    <div>${contenido}</div>
  </div>`;
}

function descargarRespaldo() {
  const fecha = new Date();
  const nombreArchivo = `GS_Respaldo_${String(fecha.getDate()).padStart(2,'0')}-${String(fecha.getMonth()+1).padStart(2,'0')}-${fecha.getFullYear()}.json`;
  const datos = JSON.stringify(appData, null, 2);
  const blob = new Blob([datos], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo; a.click();
  URL.revokeObjectURL(url);
}

function guardarDisponibilidad() {
  const fecha = document.getElementById('disp_fecha')?.value;
  const patente = document.getElementById('disp_patente')?.value;
  const estado = document.getElementById('disp_estado')?.value;
  const conductor = document.getElementById('disp_conductor')?.value||'';
  const tipoMant = document.getElementById('disp_tipo_mant')?.value||'';
  const mantManual = document.getElementById('disp_mant_manual')?.value||'';

  if (!patente || !estado || !fecha) return alert('Completa fecha, patente y estado');

  // Convertir fecha ISO a dd-mm-yyyy
  const p = fecha.split('-');
  const fechaKey = `${p[2]}-${p[1]}-${p[0]}`;

  if (!appData.disponibilidad) appData.disponibilidad = {};
  if (!appData.disponibilidad[fechaKey]) appData.disponibilidad[fechaKey] = {};
  appData.disponibilidad[fechaKey][patente] = { estado, conductor, tipoMant, mantManual };
  uiState.disp_form = {};
  saveData();
  render();
}

function setPrioridad(faseId, pendIdx, valor) {
  if (!appData.prioridades) appData.prioridades = {};
  const key = `${faseId}::${pendIdx}`;
  if (valor === 0) delete appData.prioridades[key];
  else appData.prioridades[key] = valor;
  saveData(); render();
}

function agregarFoco(faseId, faseNombre, pendIdx) {
  if (!appData.midia_foco) appData.midia_foco = [];
  const fase = appData.fases.find(f => f.id === faseId);
  if (!fase) return;
  const pend = fase.pendientes[pendIdx];
  if (!pend) return;
  const key = faseId + '::' + pend.texto;
  const yaEsta = appData.midia_foco.findIndex(f => f.faseId + '::' + f.texto === key);
  if (yaEsta >= 0) appData.midia_foco.splice(yaEsta, 1);
  else appData.midia_foco.push({ faseId, faseNombre, texto: pend.texto, done: false });
  saveData(); render();
}

function quitarFoco(fi) {
  if (!appData.midia_foco) return;
  appData.midia_foco.splice(fi, 1);
  saveData(); render();
}

function toggleFocoDone(fi) {
  if (!appData.midia_foco) return;
  appData.midia_foco[fi].done = !appData.midia_foco[fi].done;
  saveData(); render();
}

function toggleMidiaAmb(faseId) {
  if (!appData.midia_open) appData.midia_open = {};
  appData.midia_open[faseId] = !appData.midia_open[faseId];
  saveData(); render();
}

function editPersonalInline(el, pi) {
  if (el.isContentEditable) return;
  el.contentEditable = true; el.style.outline = '1px solid #aaa'; el.focus();
  const range = document.createRange(); range.selectNodeContents(el);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  const guardar = () => {
    el.contentEditable = false; el.style.outline = '';
    const val = el.innerText.trim();
    if (val) { const f = appData.fases.find(f=>f.id==='control'); if(f.personalPendientes) f.personalPendientes[pi].texto = val; saveData(); }
    else render();
  };
  el.onblur = guardar;
  el.onkeydown = (e) => { if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape')render(); };
}

function liquidarServicio(id) {
  const idx = (appData.servicios||[]).findIndex(s => s.id === id);
  if (idx === -1) return;
  const precio     = parseInt(document.getElementById(`liq_precio_${id}`)?.value) || 0;
  const km         = parseInt(document.getElementById(`liq_km_${id}`)?.value) || 0;
  const viaticos   = parseInt(document.getElementById(`liq_viaticos_${id}`)?.value) || 0;
  const petroleo   = parseInt(document.getElementById(`liq_petroleo_${id}`)?.value) || 0;
  const litros     = parseFloat(document.getElementById(`liq_litros_${id}`)?.value) || 0;
  const montoComb  = parseInt(document.getElementById(`liq_monto_comb_${id}`)?.value) || 0;
  const adicional  = parseInt(document.getElementById(`liq_adicional_${id}`)?.value) || 0;
  const peajes     = parseInt(document.getElementById(`liq_peajes_${id}`)?.value) || appData.servicios[idx].peajes || 0;
  const cobro      = uiState[`cobro_${id}`] || 'pendiente';

  const rendimiento = (litros > 0 && km > 0) ? Math.round((km / litros) * 10) / 10 : 0;
  const costoTotal = petroleo + montoComb + viaticos + peajes + adicional;
  const margen = precio > 0 ? Math.round(((precio - costoTotal) / precio) * 100) : 0;
  const esLiquidado = (precio > 0);

  Object.assign(appData.servicios[idx], {
    precio, km, viaticos, petroleo, litros, montoComb, adicional, peajes,
    cobro, rendimiento, costoTotal, margen,
    liquidado: esLiquidado
  });

  appData.dashboard.ventas_mes = (appData.servicios||[]).filter(s=>s.liquidado).reduce((a,s)=>a+(s.precio||0),0);
  uiState.liquidando_id = null;
  upsertServicioSupabase(appData.servicios[idx]);

  saveData(); render();
  mostrarToastServicio(supaConectado);
}

function copiarResumen() {
  let txt = `PANEL DE GESTIÓN — GLOBAL SOLUTIONS\n${new Date().toLocaleDateString('es-CL')}\n\n`;
  appData.fases.forEach(fase => {
    const activos = fase.pendientes.filter(p=>!p.done);
    const urgentes = activos.filter(p=>p.badge==='hoy');
    if (activos.length === 0) return;
    txt += `═══ ${fase.nombre} ═══\n`;
    if (urgentes.length) { txt += `HOY:\n`; urgentes.forEach(p => txt += `  • ${p.texto}\n`); }
    const resto = activos.filter(p=>p.badge!=='hoy');
    if (resto.length) { txt += `Pendientes:\n`; resto.forEach(p => txt += `  • ${p.badge?'['+p.badge.toUpperCase()+'] ':''}${p.texto}\n`); }
    txt += '\n';
  });
  const suActivos = appData.scalingup.rocks.filter(r=>!r.done);
  if (suActivos.length) {
    txt += `═══ SCALING UP — ROCKS ═══\n`;
    suActivos.forEach(r => txt += `  • [${r.pillar}] ${r.texto}\n`);
  }
  const btn = document.getElementById('copyBtn');
  const doCopiado = () => { btn.textContent = '✓ Copiado'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Copiar resumen'; btn.classList.remove('copied'); }, 2000); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(doCopiado).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); doCopiado();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); doCopiado();
  }
}

          <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.8)">${fmtPesoCompacto(costosFijos)} <span style="font-size:9px;cursor:pointer;text-decoration:underline;color:rgba(255,255,255,0.5)" onclick="openDashSingle('gasto_meta','Costos fijos ($)',${costosFijos})">editar</span></div>
        </div>
      </div>
      ${resBlock}${ingcosBlock}${opsBlock}
    </div>`;
}

let _dashField = null;
function openDashSingle(field, label, valor) {
  _dashField = field;
  document.getElementById('dash-modal-title').textContent = label;
  document.getElementById('dash-modal-label').textContent = label;
  const inp = document.getElementById('dash-modal-input');
  inp.value = valor || '';
  inp.placeholder = valor || '';
  document.getElementById('dash-modal').classList.add('open');
  setTimeout(()=>{ inp.focus(); inp.select(); }, 80);
}
function openDashModal() { openDashSingle('ventas','Ventas del mes ($)', appData.dashboard.ventas_mes||0); }

function closeDashModal() {
  document.getElementById('dash-modal').classList.remove('open');
  _dashField = null;
}

function saveDashSingle() {
  if (!_dashField) return;
  const val = parseInt(document.getElementById('dash-modal-input').value);
  if (isNaN(val)) { closeDashModal(); return; }
  const d = appData.dashboard;
  if (_dashField === 'ventas') d.ventas_mes = val;
  else if (_dashField === 'caja') d.caja = val;
  else if (_dashField === 'meta_pe') d.meta_pe = val;
  else if (_dashField === 'gasto_real') d.gasto_real = val;
  else if (_dashField === 'gasto_meta') d.gasto_meta = val;
  else if (_dashField === 'flota_disponible') d.flota_disponible = val;
  else if (_dashField === 'flota_ocupada') d.flota_ocupada = val;
  else d[_dashField] = val;
  closeDashModal();
  saveData(); render();
}

function render() {
  const dashEl = document.getElementById('dashboard-container');
  // Ocultar dashboard cuando se filtra por un ámbito específico
  if (vistaActual !== 'todas') {
    dashEl.style.display = 'none';
  } else {
    dashEl.style.display = '';
    renderDashboard();
  }
  const container = document.getElementById('fases');
  if (vistaActual === 'scalingup') {
    container.innerHTML = renderScalingUp();
    return;
  }
  const filtered = vistaActual==='todas' ? appData.fases : appData.fases.filter(f=>f.id===vistaActual);
  container.innerHTML = filtered.map(renderFase).join('') + (vistaActual==='todas' ? renderScalingUp() : '');
}

// ============ SISTEMA DE LOGIN ============
const ROLES = [
  { id: 'cgestion',   nombre: 'Controler',     pin: '0001', acceso: 'todo' },
  { id: 'coordinador',nombre: 'Coordinador',   pin: '0002', acceso: 'operacional,financiero' },
  { id: 'ayudante',   nombre: 'Mantenimiento', pin: '0003', acceso: 'operacional' },
  { id: 'admin',      nombre: 'Administrativo',pin: '0004', acceso: 'operacional,financiero,comercial' },
  { id: 'conductor',  nombre: 'Conductor',     pin: null,   acceso: 'conductor' },
];

const CONDUCTORES_PINS = {};
let sessionRol = null;
let sessionConductor = null;
let pinIngresado = '';
let pinTarget = null;

function iniciarLogin() {
  const guardado = localStorage.getItem('gs_session');
  if (guardado) {
    try {
      const s = JSON.parse(guardado);
      sessionRol = s.rol;
      sessionConductor = s.conductor || null;
      aplicarAcceso();
      return;
    } catch(e) {}
  }
  mostrarLogin();
}

function mostrarLogin() {
  document.getElementById('login-screen').style.display = 'block';
  document.querySelector('.container').style.display = 'none';
  mostrarPasoRol();
}

function mostrarPasoRol() {
  document.getElementById('login-step-rol').style.display = 'block';
  document.getElementById('login-step-conductor').style.display = 'none';
  document.getElementById('login-step-pin').style.display = 'none';
  const lista = document.getElementById('roles-list');
  lista.innerHTML = ROLES.map(r => `
    <button class="rol-btn" onclick="seleccionarRol('${r.id}')">${r.nombre}</button>
  `).join('');
}

function seleccionarRol(rolId) {
  const rol = ROLES.find(r => r.id === rolId);
  if (rolId === 'conductor') {
    mostrarPasoConductor();
  } else {
    pinTarget = rol;
    sessionConductor = null;
    mostrarPasoPin(rol.nombre);
  }
}

function mostrarPasoConductor() {
  document.getElementById('login-step-rol').style.display = 'none';
  document.getElementById('login-step-conductor').style.display = 'block';
  const conductores = appData.conductores || ['Manuel Madrid','Felipe Vidal','Manuel Madariaga','Sebastián Zúñiga','Pablo Riquelme'];
  const lista = document.getElementById('conductores-list-login');
  lista.innerHTML = conductores.map((c,i) => `
    <button class="rol-btn" onclick="seleccionarConductor('${c}', ${i})">${c}</button>
  `).join('');
}

function seleccionarConductor(nombre, idx) {
  const pin = String(5 + idx).padStart(4, '0');
  pinTarget = { id: 'conductor', nombre: 'Conductor', pin, acceso: 'conductor' };
  sessionConductor = nombre;
  mostrarPasoPin(nombre);
}

function mostrarPasoPin(nombre) {
  document.getElementById('login-step-rol').style.display = 'none';
  document.getElementById('login-step-conductor').style.display = 'none';
  document.getElementById('login-step-pin').style.display = 'block';
  document.getElementById('login-quien').textContent = nombre;
  pinIngresado = '';
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function pinPress(val) {
  if (pinIngresado.length < 4) {
    pinIngresado += String(val);
  }
  actualizarDots();
  if (pinIngresado.length === 4) {
    setTimeout(validarPin, 150);
  }
}

function pinBorrar() {
  pinIngresado = pinIngresado.slice(0, -1);
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function actualizarDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) => {
    d.classList.toggle('filled', i < pinIngresado.length);
  });
}

function validarPin() {
  if (pinIngresado === pinTarget.pin) {
    sessionRol = pinTarget;
    localStorage.setItem('gs_session', JSON.stringify({ rol: pinTarget, conductor: sessionConductor }));
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.container').style.display = 'block';
    aplicarAcceso();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Intenta de nuevo.';
    pinIngresado = '';
    actualizarDots();
  }
}

function loginVolverRol() {
  pinIngresado = '';
  sessionConductor = null;
  mostrarPasoRol();
}

function cerrarSesion() {
  localStorage.removeItem('gs_session');
  sessionRol = null;
  sessionConductor = null;
  mostrarLogin();
}

function aplicarAcceso() {
  if (!sessionRol) { mostrarLogin(); return; }
  document.getElementById('login-screen').style.display = 'none';
  document.querySelector('.container').style.display = 'block';
  // Mostrar nombre en topbar
  const info = document.getElementById('session-info');
  if (info) {
    const nombre = sessionConductor || sessionRol.nombre;
    info.textContent = nombre.toUpperCase();
  }
  const acceso = sessionRol.acceso;
  if (acceso === 'conductor') {
    // Ocultar todos los filtros excepto Operacional
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.style.display = 'none';
    });
    // Activar vista operacional directamente
    vistaActual = 'operacional';
    render();
    // Abrir acordeón de registro de servicio automáticamente
    setTimeout(() => {
      const fase = appData.fases.find(f => f.id === 'operacional');
      if (fase) {
        const idx = fase.rutinarias.findIndex(r => r.registroServicio);
        if (idx !== -1) {
          uiState[`acord_operacional_${idx}`] = true;
          render();
        }
      }
    }, 100);
  } else {
    render();
  }
}
// ============ FIN LOGIN ============

loadData(); iniciarLogin(); initSupabase();
</script>
