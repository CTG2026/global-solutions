function _costoListaMes(mes, anio) {
  const costos = (appData.costos||[]).filter(c=>c.mes===mes&&c.anio===anio);
  if (!costos.length) return '<div style="text-align:center;color:#aaa;font-size:11px;padding:12px">Sin costos registrados este mes</div>';
  const total = costos.reduce((a,c)=>a+c.total,0);
  return `<div style="font-size:9px;font-weight:700;color:#888;margin-bottom:6px">COSTOS DEL MES — $${total.toLocaleString('es-CL')}</div>
  ${costos.slice().reverse().map(c=>`
  <div style="background:white;border:1px solid #eee;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:700;color:#333">${c.empresa}</div>
      <div style="font-size:10px;color:#888">${c.fecha} · ${c.equipo==='flota_completa'?'Flota completa':c.equipo} · ${c.tipo_costo||c.categoria}</div>
      ${c.descripcion?`<div style="font-size:10px;color:#aaa">${c.descripcion}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px;flex-shrink:0">
      <div style="font-size:13px;font-weight:900;color:#C62828">$${c.total.toLocaleString('es-CL')}</div>
      <div style="font-size:9px;color:#aaa">neto $${c.monto_neto.toLocaleString('es-CL')}</div>
      <button onclick="editarCosto('${c.id}')" style="font-size:10px;padding:3px 8px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;cursor:pointer">✏️ Editar</button>
    </div>
  </div>`).join('')}`;
}

function renderCostos() {
  const tab = uiState.costoTab || 'manual';
  const hoy = new Date();
  const mes = String(hoy.getMonth()+1).padStart(2,'0');
  const anio = String(hoy.getFullYear());
  const flota = getFlota();
  const tabs = [['manual','🔧 Mantención'],['copec','⛽ Combustible'],['cartola','🏦 Cartola'],['historial','📋 Historial'],['remuneraciones','👥 Remuneraciones']];
  const nav = `<div style="display:flex;gap:4px;margin-bottom:10px;overflow-x:auto">${tabs.map(([id,lbl])=>`<button onclick="uiState.costoTab='${id}';render()" style="padding:7px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;${tab===id?'background:#1565C0;color:white;border:none':'background:#F5F5F5;color:#555;border:1px solid #dde'}">${lbl}</button>`).join('')}</div>`;
  let body = '';
  if (tab==='manual') body = _costoTabManual(mes, anio, flota);
  else if (tab==='copec') body = _costoTabCopec(mes, anio, flota);
  else if (tab==='cartola') body = _costoTabCartola(mes, anio);
  else if (tab==='historial') body = _costoTabHistorial(mes, anio, flota);
  else if (tab==='remuneraciones') body = _costoTabRemuneraciones(mes, anio);
  return `<div style="padding:2px">${nav}${body}</div>`;
}

function renderCaja() {
  const facturas = appData.facturas || [];
  const rendiciones = appData.rendiciones || [];
  const liquidaciones = appData.liquidaciones || [];
  const hoy = new Date();
  const mesSel = String(hoy.getMonth()+1).padStart(2,'0');
  const anioSel = String(hoy.getFullYear());
  const parseFechaDDMMYYYY = f => { if(!f) return null; const p=f.split('-'); return p[0].length===2 ? new Date(p[2],p[1]-1,p[0]) : new Date(p[0],p[1]-1,p[2]); };
  const esMes = f => { const d=parseFechaDDMMYYYY(f); return d && d.getMonth()+1===parseInt(mesSel) && d.getFullYear()===parseInt(anioSel); };
  const facMes = facturas.filter(f=>esMes(f.fecha));
  const cobradoMes = facMes.filter(f=>f.estado==='cobrada').reduce((a,f)=>a+(f.monto||0),0);
  const porCobrar = facturas.filter(f=>f.estado!=='cobrada').reduce((a,f)=>a+(f.monto||0),0);
  const renMes = rendiciones.filter(r=>esMes(r.fecha));
  const egresosMes = renMes.reduce((a,r)=>a+(r.total||0),0);
  const saldoEstimado = cobradoMes - egresosMes;
  const montoPendFac = liquidaciones.filter(l=>l.estado==='enviada').reduce((a,l)=>a+(l.total||0),0);
  const ultFacCob = facMes.filter(f=>f.estado==='cobrada').slice(-5).reverse();
  const ultRen = renMes.slice(-5).reverse();
  return `<div style="padding:2px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="background:#E8F5E9;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#2E7D32;margin-bottom:2px">COBRADO MES</div>
        <div style="font-size:14px;font-weight:900;color:#2E7D32">$${cobradoMes.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#FFEBEE;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#C62828;margin-bottom:2px">EGRESOS MES</div>
        <div style="font-size:14px;font-weight:900;color:#C62828">$${egresosMes.toLocaleString('es-CL')}</div>
      </div>
    </div>
    <div style="background:${saldoEstimado>=0?'#E8F5E9':'#FFEBEE'};border-radius:8px;padding:10px;text-align:center;margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;color:${saldoEstimado>=0?'#2E7D32':'#C62828'};margin-bottom:2px">SALDO ESTIMADO MES</div>
      <div style="font-size:20px;font-weight:900;color:${saldoEstimado>=0?'#1B5E20':'#B71C1C'}">$${saldoEstimado.toLocaleString('es-CL')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
      <div style="background:#FFFDE7;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#F9A825;margin-bottom:2px">POR COBRAR</div>
        <div style="font-size:13px;font-weight:900;color:#F57F17">$${porCobrar.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#E8EAF6;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#3949AB;margin-bottom:2px">PEND. FACTURAR</div>
        <div style="font-size:13px;font-weight:900;color:#3949AB">$${montoPendFac.toLocaleString('es-CL')}</div>
      </div>
    </div>
    ${ultFacCob.length?`<div style="font-size:9px;font-weight:700;color:#888;letter-spacing:0.5px;margin-bottom:5px">ÚLTIMAS COBRADAS</div>${ultFacCob.map(f=>`<div style="display:flex;justify-content:space-between;padding:6px 10px;background:#F8F9FA;border-radius:7px;margin-bottom:4px;border-left:3px solid #2E7D32"><span style="font-size:11px;color:#555">${f.numero||f.id} · ${f.cliente||'—'}</span><span style="font-size:11px;font-weight:700;color:#2E7D32">$${(f.monto||0).toLocaleString('es-CL')}</span></div>`).join('')}`:''}
    ${ultRen.length?`<div style="font-size:9px;font-weight:700;color:#888;letter-spacing:0.5px;margin:6px 0 5px">ÚLTIMAS RENDICIONES</div>${ultRen.map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 10px;background:#F8F9FA;border-radius:7px;margin-bottom:4px;border-left:3px solid #C62828"><span style="font-size:11px;color:#555">${r.id} · ${r.descripcion||'—'}</span><span style="font-size:11px;font-weight:700;color:#C62828">$${(r.total||0).toLocaleString('es-CL')}</span></div>`).join('')}`:''}
    ${!ultFacCob.length&&!ultRen.length?'<div style="text-align:center;color:#aaa;font-size:11px;padding:12px">Sin movimientos en el mes actual</div>':''}
  </div>`;
}

function toggleSrvLiq(id,checked){if(!uiState.liq_sel)uiState.liq_sel=[];if(checked){if(!uiState.liq_sel.includes(id))uiState.liq_sel.push(id);}else{uiState.liq_sel=uiState.liq_sel.filter(x=>x!==id);}render();}
function toggleTodosClienteLiq(cl,checked){if(!uiState.liq_sel)uiState.liq_sel=[];const svcs=(appData.servicios||[]).filter(s=>s.cliente===cl&&s.cerrado&&!s.liquidacionId);svcs.forEach(s=>{if(checked){if(!uiState.liq_sel.includes(s.id))uiState.liq_sel.push(s.id);}else{uiState.liq_sel=uiState.liq_sel.filter(x=>x!==s.id);}});render();}
function toggleRutLiq(rut,checked){if(!uiState.liq_ruts_sel)uiState.liq_ruts_sel=[];if(checked){if(!uiState.liq_ruts_sel.includes(rut))uiState.liq_ruts_sel.push(rut);}else{uiState.liq_ruts_sel=uiState.liq_ruts_sel.filter(r=>r!==rut);}render();}
function agregarRutLiq(){const input=document.getElementById('liq_rut_nuevo');const rut=input?.value.trim();if(!rut)return;const cl=uiState.liq_cliente_sel||'';if(cl){if(!appData.clientesRut)appData.clientesRut={};if(!appData.clientesRut[cl])appData.clientesRut[cl]=[];if(!appData.clientesRut[cl].includes(rut)){appData.clientesRut[cl].push(rut);saveData();}}if(!uiState.liq_ruts_sel)uiState.liq_ruts_sel=[];if(!uiState.liq_ruts_sel.includes(rut))uiState.liq_ruts_sel.push(rut);input.value='';render();}
function crearLiquidacionV2(){const sel=uiState.liq_sel||[];if(!sel.length)return alert('Selecciona al menos un servicio');const fecha=document.getElementById('liq_fecha_v2')?.value||new Date().toISOString().split('T')[0];const email=document.getElementById('liq_email_v2')?.value||'';const p=fecha.split('-');const fechaStr=`${p[2]}-${p[1]}-${p[0]}`;const ruts=uiState.liq_ruts_sel||[];const servicios=appData.servicios||[];const total=sel.reduce((a,id)=>{const s=servicios.find(sv=>sv.id===id);return a+(s?s.precio||0:0);},0);const id='LIQ-'+String(appData.liquidaciones.length+1).padStart(3,'0');appData.liquidaciones.push({id,fecha:fechaStr,email,serviciosIds:[...sel],total,estado:'creada',nFactura:'',ruts});sel.forEach(sid=>{const s=servicios.find(sv=>sv.id===sid);if(s){s.liquidacionId=id;upsertServicioSupabase(s);}});uiState.liq_sel=[];uiState.liq_ruts_sel=[];uiState.liq_preview=false;uiState.liq_ui_fecha='';uiState.liq_ui_email=undefined;saveData();pushLiquidacionesSupabase();render();alert('✅ '+id+' creada — Total: $'+total.toLocaleString('es-CL'));}
function cambiarEstadoLiq(liqId,estado){const liq=(appData.liquidaciones||[]).find(l=>l.id===liqId);if(!liq)return;liq.estado=estado;saveData();pushLiquidacionesSupabase();render();}
function guardarObsLiq(liqId) {
  const liq = (appData.liquidaciones||[]).find(l=>l.id===liqId);
  if (!liq) return;
  const obs = document.getElementById('liq_obs_'+liqId)?.value||'';
  liq.observaciones = obs;
  saveData();
  pushLiquidacionesSupabase();
  showToastGeneral('💾 Observaciones guardadas','#607D8B');
}
function guardarEdicionLiq(liqId) {
  const liq = (appData.liquidaciones||[]).find(l=>l.id===liqId);
  if (!liq) return;

// ── CALCULADORA DE SERVICIOS ──────────────────────────────────────────────────
function _calcResumen(c) {
  const precio  = parseInt(c.precio_neto) || 0;
  const tramos  = c.tramos || [];
  const totalKm = tramos.reduce((a,t) => a + (parseFloat(t.km)||0), 0);
  const precioComb = parseInt(c.precio_comb)   || 0;
  const rendEquipo = parseFloat(c.rend_equipo) || 0;
  const litrosCalc = rendEquipo > 0 && totalKm > 0 ? totalKm / rendEquipo : 0;
  const litros     = Math.round(litrosCalc);
  const petroleo   = Math.round(litrosCalc * precioComb);
  const tag         = parseInt(c.tag)          || 0;
  const peajes      = parseInt(c.peajes)       || 0;
  const viaticos    = parseInt(c.viaticos)     || 0;
  const comision    = parseInt(c.comision)     || 0;
  const base_chofer = parseInt(c.base_chofer)  || 0;
  const coordinador = parseInt(c.coordinador)  || 0;
  const mantenedor  = parseInt(c.mantenedor)   || 0;
  const controller  = parseInt(c.controller)   || 0;
  const cf          = parseInt(c.cf_prorrateado)|| 0;
  const fin_pct     = parseFloat(c.fin_pct)    || 0;
  const financiero  = Math.round(precio * fin_pct / 100);
  const adicional   = parseInt(c.adicional)    || 0;
  const otros       = parseInt(c.otros)        || 0;
  const totalCostos = petroleo + tag + peajes + viaticos + comision + base_chofer + coordinador + mantenedor + controller + cf + financiero + adicional + otros;
  const margen      = precio - totalCostos;
  const margenPct   = precio > 0 ? Math.round((margen / precio) * 100) : null;
  const porKm       = totalKm > 0 ? Math.round(margen / totalKm) : null;
  const rendimiento = rendEquipo > 0 ? rendEquipo.toFixed(1) : null;
  return { precio, totalKm, litros, precioComb, rendEquipo, totalCostos, margen, margenPct, porKm, rendimiento,
    petroleo, tag, peajes, viaticos, comision, base_chofer, coordinador, mantenedor, controller, cf, fin_pct, financiero, adicional, otros };
}

function _resumenHTML(r) {
  var mc  = r.margen > 0 ? '#2E7D32' : r.margen < 0 ? '#C62828' : '#546E7A';
  var mb  = r.margen > 0 ? '#E8F5E9' : r.margen < 0 ? '#FFEBEE' : '#F4F6F8';
  var cr = function(lbl, v) {
    return v ? '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:11px"><span style="color:#555">'+lbl+'</span><span style="color:#C62828;font-weight:600">-$'+v.toLocaleString('es-CL')+'</span></div>' : '';
  };
  var sep2 = '<div style="border-top:2px solid '+mc+'40;margin:3px 0"></div>';
  var costos = [
    cr('Combustible',           r.petroleo),
    cr('TAG',                   r.tag),
    cr('Peajes',                r.peajes),
    cr('Viáticos',              r.viaticos),
    cr('Comisión conductor',    r.comision),
    cr('Base chofer',           r.base_chofer),
    cr('Costo coordinador',     r.coordinador),
    cr('Costo mantenedor',      r.mantenedor),
    cr('Costo controller',      r.controller),
    cr('Costo fijo prorrateado',r.cf),
    cr('Costo financiero',      r.financiero),
    cr('Adicional',             r.adicional),
    cr('Otros costos',          r.otros),
  ].join('');
  return '<div style="background:'+mb+';border:2px solid '+mc+';border-radius:10px;padding:12px 14px;margin-top:10px">'
    +'<div style="font-size:9px;font-weight:800;color:'+mc+';letter-spacing:1px;margin-bottom:6px">RESUMEN</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:baseline;padding:4px 0 5px">'
    +'<span style="font-size:11px;font-weight:800;color:#333">PRECIO NETO</span>'
    +'<span style="font-size:14px;font-weight:900;color:#1B5E20">'+(r.precio ? '$'+r.precio.toLocaleString('es-CL') : '—')+'</span>'
    +'</div>'
    +sep2
    +(costos ? '<div style="padding:2px 0">'+costos+'</div>'+sep2 : '')
    +(r.totalCostos ? '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0 5px;font-size:11px"><span style="font-weight:800;color:#333">TOTAL COSTOS</span><span style="font-weight:900;color:#C62828">-$'+r.totalCostos.toLocaleString('es-CL')+'</span></div>'+sep2 : '')
    +'<div style="display:flex;justify-content:space-between;align-items:baseline;padding:5px 0 3px">'
    +'<span style="font-size:12px;font-weight:800;color:'+mc+'">MARGEN NETO</span>'
    +'<span style="font-size:16px;font-weight:900;color:'+mc+'">'+(r.precio||r.totalCostos ? '$'+r.margen.toLocaleString('es-CL') : '—')+'</span>'
    +'</div>'
    +(r.margenPct !== null ? '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:11px"><span style="color:'+mc+';font-weight:700">MARGEN %</span><span style="color:'+mc+';font-weight:800">'+r.margenPct+'%</span></div>' : '')
    +(r.porKm !== null ? '<div style="display:flex;justify-content:space-between;padding:2px 0 4px;font-size:11px"><span style="color:#546E7A;font-weight:700">RESULTADO / KM</span><span style="color:'+mc+';font-weight:800">$'+r.porKm.toLocaleString('es-CL')+'/km</span></div>' : '')
    +(r.rendimiento ? '<div style="border-top:1px solid '+mc+'30;margin-top:3px;padding-top:4px;display:flex;justify-content:space-between;font-size:10px;color:#aaa"><span>Rendimiento equipo</span><span>'+r.rendimiento+' km/L · '+r.litros+'L est.</span></div>' : '')
    +'</div>';
}
function calcularServicio() {
  const c = uiState.calc || {};
  const r = _calcResumen(c);
  const el = document.getElementById('calc_resumen');
  if (!el) return;
  el.innerHTML = _resumenHTML(r);
  const elComb = document.getElementById('calc_comb_display');
  if (elComb) elComb.innerHTML = '⛽ Costo combustible: ' + (r.petroleo ? '$'+r.petroleo.toLocaleString('es-CL') : (r.precioComb||r.rendEquipo ? '(faltan km)' : '—'));
  const elFin = document.getElementById('calc_fin_display');
  if (elFin) elFin.innerHTML = (r.financiero ? '= $'+r.financiero.toLocaleString('es-CL') : '= —')+'<br><span style="font-size:9px;font-weight:400;color:#7E57C2">sobre precio neto</span>';
}

function toggleCotItemV36(id){if(!uiState.cot_items_vis)uiState.cot_items_vis={};uiState.cot_items_vis[id]=!uiState.cot_items_vis[id];render();}

function abrirPreviewCotV2(){
  const clienteSel=document.getElementById('cot_cliente_v2')?.value||'';
  const cliente=clienteSel==='__nuevo__'?(document.getElementById('cot_cl_nuevo_txt')?.value.trim()||''):clienteSel;
  const origen=document.getElementById('cot_origen_v2')?.value.trim()||'';
  const destino=document.getElementById('cot_destino_v2')?.value.trim()||'';
  const km=parseInt(document.getElementById('cot_km_v2')?.value)||0;
  const precio=parseInt(document.getElementById('cot_precio_v2')?.value)||0;
  const fechaRaw=document.getElementById('cot_fecha_v2')?.value||'';
  if(!cliente||!precio) return alert('Completa al menos Cliente y Precio');
  const itemsVis=uiState.cot_items_vis||{};
  const itemsData={};
  COT_ITEMS_V36.forEach(item=>{if(itemsVis[item.id]){itemsData[item.id]=parseInt(document.getElementById('cot_v_'+item.id)?.value)||0;}});
  const p=fechaRaw.split('-');const fecha=p.length===3?`${p[2]}-${p[1]}-${p[0]}`:fechaRaw;
  const numero=getCotNumero();
  const cotObj={numero,fecha,cliente,origen,destino,km,precio,items:itemsData};
  const win=window.open('','_blank');
  const html=generarHTMLCotV2(cotObj);
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="1775443645"><title>${numero}</title><style>body{font-family:'Segoe UI',sans-serif;padding:30px;max-width:680px;margin:0 auto}@media print{.no-print{display:none!important}}</style></head><body>${html}<script>setTimeout(()=>window.print(),400);<\/script></body></html>`);
  win.document.close();
  // Guardar cotización
  if(!appData.cotizaciones) appData.cotizaciones=[];
  appData.cotizaciones.push(cotObj);
  uiState.cot_items_vis={};
  saveData();render();
}

// Orden: ID / Cliente / GD (nº guía) / Fecha guía / Origen / Destino / Fecha descarga
function srvVista(s) {
  const puntos = s.puntos || s.guias || [];
  // Números de guía en orden P1, P2, P3... — lee guia o num según disponibilidad
  const gdNums = puntos.map(g=>g.guia||g.num||'').filter(Boolean).join(', ') || '—';
  const gdFechaGuia = puntos.map(g=>g.fecha_guia||g.fecha).filter(Boolean).slice(0,1)[0] || s.fecha || '—';
  const gdDescarga = puntos.map(g=>g.fecha_descarga).filter(Boolean).join(', ') || '—';
  const destinoFinal = puntos.map(g=>g.destino).filter(Boolean).slice(-1)[0] || s.destino || '—';
  return `<div style="padding:8px 10px;background:white;border:1px solid #e8eaec;border-radius:8px;margin-bottom:4px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

    <div style="font-size:10px;color:#888;margin-top:1px">${s.origen||'—'} → ${destinoFinal}</div>
  </div>`;
}

function editarServicio(id) {

  const s = (appData.servicios||[]).find(sv=>sv.id===id);

function cancelarEditarServicio() {

function updEditPunto(pi, campo, valor) {
  if (!uiState.edit_srv_puntos) return;
  uiState.edit_srv_puntos[pi][campo] = valor;
}
function addEditPunto() {
  if (!uiState.edit_srv_puntos) uiState.edit_srv_puntos = [];
  uiState.edit_srv_puntos.push({destino:'',tipo:'descarga',guia:'',fecha_guia:'',fecha_descarga:'',kg:'',imagen_url:''});

function delEditPunto(pi) {
  if (!uiState.edit_srv_puntos || uiState.edit_srv_puntos.length <= 1) return;

function resizeEditPuntos(n) {
  if (!uiState.edit_srv_puntos) uiState.edit_srv_puntos = [];
  while (uiState.edit_srv_puntos.length < n) {
    uiState.edit_srv_puntos.push({destino:'',tipo:'descarga',guia:'',fecha_guia:'',fecha_descarga:'',kg:'',imagen_url:''});

async function subirImagenEditGuia(event, pi) {
  const file = event.target.files[0];
  if (!file || !supaConectado || !supa) return;
  showToastGeneral('⏳ Subiendo imagen...','#1565C0');
  try {
    const ext = file.name.split('.').pop();
    const nombre = `guia_edit_${Date.now()}_${pi}.${ext}`;
    const { error } = await supa.storage.from('guias').upload(nombre, file, {upsert:true});
    if (error) { showToastGeneral('❌ Error al subir imagen','#C62828'); return; }
    const { data: urlData } = supa.storage.from('guias').getPublicUrl(nombre);
    if (!uiState.edit_srv_puntos) return;
    uiState.edit_srv_puntos[pi].imagen_url = urlData.publicUrl;
    showToastGeneral('✅ Imagen subida','#2E7D32');
    render();
  } catch(e) { showToastGeneral('❌ Error: '+e.message,'#C62828'); }
}
async function guardarEdicionServicio() {
  const id = uiState.editando_srv_id;
  if (!id) return;
  const idx = (appData.servicios||[]).findIndex(s=>s.id===id);
  if (idx===-1) return;
  const s = appData.servicios[idx];
  const fecha = document.getElementById('edit_srv_fecha')?.value||s.fecha;
  const conductor = document.getElementById('edit_srv_conductor')?.value||s.conductor;
  const patenteRaw = document.getElementById('edit_srv_patente')?.value||s.patente;
  const patente = patenteRaw==='__tercero__'
    ? (document.getElementById('edit_srv_patente_manual')?.value.trim().toUpperCase()||s.patente)
    : patenteRaw;
  const tipoEquipo = document.getElementById('edit_srv_tipo_equipo')?.value||s.tipoEquipo||'';
  const clienteSelect = document.getElementById('edit_srv_cliente')?.value||s.cliente;
  const cliente = clienteSelect==='__nuevo__'
    ? (document.getElementById('edit_srv_cliente_nuevo')?.value.trim()||s.cliente)
    : clienteSelect;
  if (!conductor) { alert('⚠️ Debes seleccionar un conductor.'); return; }
  if (!patente) { alert('⚠️ Debes seleccionar una patente.'); return; }
  if (!cliente) { alert('⚠️ Debes seleccionar un cliente.'); return; }
  const puntos = (uiState.edit_srv_puntos||[]);
  const origen = document.getElementById('edit_srv_origen')?.value.trim() || s.origen || 'Casablanca';
  const estadia = document.getElementById('edit_srv_estadia')?.value || s.estadia || 'no';
  const estadiaDias = parseInt(document.getElementById('edit_srv_estadia_dias')?.value||s.estadiaDias||'1')||1;
  const numPuntos = puntos.length;
  // Convertir fecha
  const fechaFinal = fecha ? (()=>{const p=fecha.split('-');return p.length===3&&p[0].length===4?`${p[2]}-${p[1]}-${p[0]}`:fecha;})() : s.fecha;
  Object.assign(appData.servicios[idx], {fecha:fechaFinal, conductor, patente, tipoEquipo, cliente, origen, estadia, estadiaDias, numPuntos, puntos, guias:puntos});
  delete uiState.editando_srv_id;
  delete uiState.edit_srv_puntos;
  await upsertServicioSupabase(appData.servicios[idx]);
  saveData(); render();
  showToastGeneral('✅ Servicio actualizado','#2E7D32');
}

const ESTRUCTURA_VERSION = '78'; // Incrementar cuando cambie la estructura del panel

function loadData() {
  // Si la versión estructural cambió, limpiar la estructura pero preservar datos
  const versionGuardada = localStorage.getItem('gs_estructura_ver');
  if (versionGuardada !== ESTRUCTURA_VERSION) {
    // Preservar datos importantes antes de limpiar
    let datosAPreservar = {};
    try {
      const viejos = JSON.parse(localStorage.getItem('gs_panel_v5')||'{}');
      datosAPreservar = {
        pipeline: viejos.pipeline || [],
        liquidaciones: viejos.liquidaciones || [],
        rendiciones: viejos.rendiciones || [],
        facturas: viejos.facturas || [],
        conductores: viejos.conductores || [],
        patentes: viejos.patentes || [],
        camionetas: viejos.camionetas || [],
        costos: viejos.costos || [],
        copec: viejos.copec || [],
        cartola: viejos.cartola || [],
        remuneraciones: (viejos.remuneraciones && viejos.remuneraciones.length > 0) ? viejos.remuneraciones : JSON.parse(JSON.stringify(DEFAULT_DATA.remuneraciones)),
        clientesRut: viejos.clientesRut || {},
        cotizaciones: viejos.cotizaciones || [],
        cotizaciones_calc: viejos.cotizaciones_calc || [],
        rendimientoComb: viejos.rendimientoComb || [],
        dashboard: viejos.dashboard || {},
      };
    } catch(e) {}
    // Resetear estructura completa
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    // Restaurar datos preservados
    if (datosAPreservar.pipeline?.length) appData.pipeline = datosAPreservar.pipeline;
    if (datosAPreservar.liquidaciones?.length) appData.liquidaciones = datosAPreservar.liquidaciones;
    if (datosAPreservar.rendiciones?.length) appData.rendiciones = datosAPreservar.rendiciones;
    if (datosAPreservar.facturas?.length) appData.facturas = datosAPreservar.facturas;
    if (datosAPreservar.conductores?.length) appData.conductores = datosAPreservar.conductores;
    if (datosAPreservar.patentes?.length) appData.patentes = datosAPreservar.patentes;
    if (Object.keys(datosAPreservar.clientesRut||{}).length) appData.clientesRut = datosAPreservar.clientesRut;
    if (datosAPreservar.cotizaciones?.length) appData.cotizaciones = datosAPreservar.cotizaciones;
    if (datosAPreservar.cotizaciones_calc?.length) appData.cotizaciones_calc = datosAPreservar.cotizaciones_calc;
    if (datosAPreservar.rendimientoComb?.length) appData.rendimientoComb = datosAPreservar.rendimientoComb;
    if (datosAPreservar.camionetas?.length) appData.camionetas = datosAPreservar.camionetas;
    if (datosAPreservar.costos?.length) appData.costos = datosAPreservar.costos;
    if (datosAPreservar.copec?.length) appData.copec = datosAPreservar.copec;
    if (datosAPreservar.cartola?.length) appData.cartola = datosAPreservar.cartola;
    // Guardar nueva versión
    localStorage.setItem('gs_estructura_ver', ESTRUCTURA_VERSION);
    localStorage.setItem('gs_panel_ui_v5', '{}');
  } else {
    try { const s = localStorage.getItem('gs_panel_v5'); appData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); } 
    catch(e) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }
  // Limpiar servicios del localStorage — Supabase es la fuente única de verdad
  appData.servicios = [];
  try {
    const s = localStorage.getItem('gs_panel_ui_v5');
    uiState = s ? JSON.parse(s) : {};
    // v37: cerrar acordeones al cargar — vista limpia
    Object.keys(uiState).forEach(k => {
      if (k.startsWith('acord_') || k.startsWith('disp_hist_') ||
          k.startsWith('srv_open_') || k.startsWith('liq_open_') ||
          k.startsWith('liq_cl_') || k.startsWith('cs_') ||
          k.startsWith('avliq_tag_')) {
        delete uiState[k];
      }
    });
  } catch(e) { uiState = {}; }
  // Validar que el orden de fases sea siempre el correcto
  const ordenCorrecto = ['comercial','operacional','financiero','control'];
  if (appData.fases) {
    appData.fases.sort((a,b) => {
      const ia = ordenCorrecto.indexOf(a.id);
      const ib = ordenCorrecto.indexOf(b.id);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
  }
  // Migración: agregar dashboard si no existe
  if (!appData.dashboard) appData.dashboard = JSON.parse(JSON.stringify(DEFAULT_DATA.dashboard));
  // Costos fijos y PE — valores fijos, no se sobreescriben por localStorage
  appData.dashboard.gasto_meta = 5080000;
  // Corregir nombres de conductores incorrectos en localStorage
  if (appData.conductores) {
    appData.conductores = appData.conductores.map(c => {
      if (c === 'Manuel Madariaga') return 'Felipe Madariaga';
      if (c === 'Sebastian Zuñiga') return 'Sebastián Zúñiga';
      return c;
    });
    // Eliminar duplicados
    appData.conductores = [...new Set(appData.conductores)];
  }
  if (appData.dashboard.gasto_real === undefined) appData.dashboard.gasto_real = 0;
  // PE siempre calculado desde costos fijos con margen 25%
  appData.dashboard.meta_pe = Math.round(appData.dashboard.gasto_meta / 0.25);
  if (appData.dashboard.servicios_semana === undefined) appData.dashboard.servicios_semana = 0;
  if (appData.dashboard.servicios_semana_presup === undefined) appData.dashboard.servicios_semana_presup = 0;
  if (appData.dashboard.facturas_cobrar === undefined) appData.dashboard.facturas_cobrar = 0;
  if (appData.dashboard.presupuesto_mes === undefined) appData.dashboard.presupuesto_mes = 0;
  // ── MIGRACIÓN v36 ──────────────────────────────────────
  if (!appData.liquidaciones) appData.liquidaciones = [];
  if (!appData.rendimientoComb) appData.rendimientoComb = [];
  if (!appData.cotizaciones) appData.cotizaciones = [];
  if (!appData.clientesRut) appData.clientesRut = {};
  // Migrar IDs formato antiguo
  (appData.servicios||[]).forEach(s => {
    if (s.id && /^S-FEB-(\d+)$/.test(s.id)) {
      s.id = s.id.replace(/^S-FEB-(\d+)$/, (_,n) => n.padStart(2,'0')+'26FEB');
    } else if (s.id && /^S(\d+)$/.test(s.id)) {
      const p=(s.fecha||'').split('-');
      if(p.length===3){const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const m=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][d.getMonth()];const a=String(d.getFullYear()).slice(2);s.id=s.id.replace(/^S(\d+)$/,(_,n)=>n.padStart(2,'0')+a+m);}
    }
  });
  // Rendimiento Combustible en Operacional
  if (!appData.fases || !Array.isArray(appData.fases)) appData.fases = JSON.parse(JSON.stringify(DEFAULT_DATA.fases));
  const _opF = appData.fases.find(f=>f.id==='operacional');
  if (_opF && !_opF.rutinarias.some(r=>r.rendimientoCombTask)) {
    _opF.rutinarias.push({titulo:'Rendimiento Combustible',proc:'Día 1: registrar carga (patente, conductor, litros). Día 2: ingresar km recorridos para calcular rendimiento (km/L).',subtareas:[],rendimientoCombTask:true,done:false});
  }
  // Cierre de Servicios y Liquidaciones en Financiero
  const _finF = appData.fases.find(f=>f.id==='financiero');
  if (_finF) {
    if (!_finF.rutinarias.some(r=>r.cierreServicioTask)) {
      _finF.rutinarias.unshift({titulo:'Cierre de Servicios',proc:'Completar precio, Km, tag y datos faltantes.',subtareas:[],cierreServicioTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.liquidacionTask)) {
      const _iCs=_finF.rutinarias.findIndex(r=>r.cierreServicioTask);
      _finF.rutinarias.splice(_iCs+1,0,{titulo:'Liquidaciones',proc:'Gestionar liquidaciones por servicio o grupo con múltiples RUT.',subtareas:[],liquidacionTask:true,done:false});
    }
    // Agregar Facturación y Cobro si no existe
    if (!_finF.rutinarias.some(r=>r.facturaTask)) {
      const _iLq=_finF.rutinarias.findIndex(r=>r.liquidacionTask);
      _finF.rutinarias.splice(_iLq+1,0,{titulo:'Facturación y Cobro',proc:'Registrar facturas emitidas, gestionar factoring y hacer seguimiento de cobro.',subtareas:[],facturaTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.costosTask)) {
      const _iFac=_finF.rutinarias.findIndex(r=>r.facturaTask);
      _finF.rutinarias.splice(_iFac+1,0,{titulo:'Costos',proc:'Resumen de costos del mes: petróleo, peajes, viáticos, comisiones, costos fijos y rendiciones.',subtareas:[],costosTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.cajaTask)) {
      const _iCos=_finF.rutinarias.findIndex(r=>r.costosTask);
      _finF.rutinarias.splice(_iCos+1,0,{titulo:'Caja',proc:'Flujo de caja del mes: cobros recibidos, egresos, saldo estimado y pendientes de facturar.',subtareas:[],cajaTask:true,done:false});
    }
    // Rendición siempre al final
    if (!_finF.rutinarias.some(r=>r.rendicionTask)) {
      _finF.rutinarias.push({titulo:'Rendición de Gastos',proc:'Registrar y gestionar rendiciones de gastos del equipo.',subtareas:[],rendicionTask:true,done:false});
    } else {
      const _iRen=_finF.rutinarias.findIndex(r=>r.rendicionTask);
      if (_iRen!==-1 && _iRen!==_finF.rutinarias.length-1) {
        const [_ren]=_finF.rutinarias.splice(_iRen,1);
        _finF.rutinarias.push(_ren);
      }
    }
    // Limpiar módulos obsoletos y duplicados
    let _cpcCount=0; let _facCount=0; let _factCount=0;
    _finF.rutinarias=_finF.rutinarias.filter(r=>{
      if(r.liquidacionServicios||r.cierreLiquidacion) return false;
      if(r.titulo==='Bancarización Global Solutions'||r.titulo==='Bancarizacion Global Solutions') return false;
      if(r.titulo==='Control de caja y presupuesto') return false;
      if(r.titulo==='Cuentas por cobrar'||r.cuentasCobrarTask){_cpcCount++;return _cpcCount<=1;}
      if(r.facturaTask){_facCount++;return _facCount<=1;}
      if(r.factoringTask){_factCount++;return _factCount<=1;}
      return true;
    });
  }
  // Cotización PDF en Comercial
  const _comF = appData.fases.find(f=>f.id==='comercial');
  if (_comF && !_comF.rutinarias.some(r=>r.cotizacionTask)) {
    _comF.rutinarias.push({titulo:'Cotización PDF',proc:'Generar cotización formal en PDF.',subtareas:[],cotizacionTask:true,done:false});
  }
  if (_comF && !_comF.rutinarias.some(r=>r.calculadoraTask)) {
    _comF.rutinarias.push({titulo:'Calculadora de Servicios',proc:'Calcular precio y rentabilidad de un servicio antes de cotizar.',subtareas:[],calculadoraTask:true,done:false});
  }

  // Migración: agregar ámbito control si no existe
  if (!appData.fases.find(f => f.id === 'control')) {
    const defaultControl = DEFAULT_DATA.fases.find(f => f.id === 'control');
    if (defaultControl) appData.fases.push(JSON.parse(JSON.stringify(defaultControl)));
  }
  // Migración: midia
  if (!appData.midia_foco) appData.midia_foco = [];
  if (!appData.midia_open) appData.midia_open = {};
  if (!appData.pipeline) appData.pipeline = JSON.parse(JSON.stringify(DEFAULT_DATA.pipeline));
  // Asegurar que clientes del DEFAULT_DATA siempre estén presentes
  DEFAULT_DATA.pipeline.forEach(def => {
    if (!appData.pipeline.find(p => p.cliente === def.cliente)) {
      appData.pipeline.push(JSON.parse(JSON.stringify(def)));
    }
  });
  // Migración: agregar plan a fases que no lo tengan
  appData.fases.forEach(fase => {
    if (!fase.plan) {
      const defaultFase = DEFAULT_DATA.fases.find(f => f.id === fase.id);
      if (defaultFase && defaultFase.plan) fase.plan = defaultFase.plan;
    }
  });
  // Migración: agregar plan a scalingup si no existe
  if (!appData.scalingup.plan) {
    appData.scalingup.plan = DEFAULT_DATA.scalingup.plan;
  }
  if (!appData.scalingup.planEscalamiento) {
    appData.scalingup.planEscalamiento = DEFAULT_DATA.scalingup.planEscalamiento;
  }
  // Migración: plan personal en control
  const ctrlFase = appData.fases.find(f => f.id === 'control');
  if (ctrlFase && !ctrlFase.personalPendientes) {
    ctrlFase.personalPendientes = [];
  }
  // Migración: cargar servicios febrero 2026 si no existen
  if (!appData.servicios) appData.servicios = [];
  // Migración: RRHH
  if (!appData.fases.find(f => f.id === 'rrhh')) {
    appData.fases.push({ id:'rrhh', numero:'04', nombre:'RRHH', subtitulo:'Gestionar personas', color:'#5D4037', colorClaro:'#EFEBE9', emoji:'—', rutinarias:[], pendientes:[] });
  }
  // Migración: prioridades
  if (!appData.prioridades) appData.prioridades = {};
  // Guardar estructura migrada en localStorage
  localStorage.setItem('gs_panel_v5', JSON.stringify(appData));
}

function delTarea(faseId, ti) {
  const fase = appData.fases.find(f=>f.id===faseId);
  if (!fase) return;
  const tarea = fase.rutinarias[ti];
  // Proteger tareas del sistema
  if (tarea && (tarea.registroServicio || tarea.liquidacionServicios || tarea.disponibilidadDiaria || tarea.pipelineTask || tarea.respaldoTask || tarea.rendimientoCombTask || tarea.cierreServicioTask || tarea.liquidacionTask || tarea.cotizacionTask || tarea.calculadoraTask || tarea.rendicionTask || tarea.facturaTask)) {
    alert('Esta tarea es del sistema y no puede eliminarse.');
    return;
  }
  fase.rutinarias.splice(ti, 1);
  saveData();
  pushConfigPanel();
  render();
}
function moverTarea(faseId, ti, dir) {
  const fase = appData.fases.find(f=>f.id===faseId);
  if (!fase) return;
  const arr = fase.rutinarias;
  const ni = ti + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[ti], arr[ni]] = [arr[ni], arr[ti]];

  if (supaConectado) pushConfigPanel();
  render();
}

async function subirImagenGuia(event, gi) {
  const file = event.target.files[0];
  if (!file) return;
  if (!supaConectado || !supa) { alert('Sin conexión a Supabase'); return; }
  try {
    showToastGeneral('⏳ Subiendo imagen...', '#1565C0');
    const ext = file.name.split('.').pop();
    const nombre = `guia_${Date.now()}_${gi}.${ext}`;
    const { error } = await supa.storage.from('guias').upload(nombre, file, { upsert: true });
    if (error) { showToastGeneral('❌ Error al subir imagen', '#C62828'); return; }
    const { data: urlData } = supa.storage.from('guias').getPublicUrl(nombre);
    if (!uiState.srv_guias) return;
    uiState.srv_guias[gi].imagen_url = urlData.publicUrl;
    showToastGeneral('✅ Imagen subida', '#2E7D32');
    render();
  } catch(e) { showToastGeneral('❌ Error: ' + e.message, '#C62828'); }
}

async function addServicio() {
  const fechaRaw = document.getElementById('srv_fecha')?.value.trim() || uiState.srvForm?.fecha || '';
  const fecha = fechaRaw ? (() => { const p=fechaRaw.split('-'); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : fechaRaw; })() : null;
  const patenteRaw = document.getElementById('srv_patente')?.value.trim() || uiState.srvForm?.patente || '';
  const patente = patenteRaw === '__tercero__'
    ? (document.getElementById('srv_patente_manual')?.value.trim().toUpperCase() || uiState.srvForm?.patenteManual || 'TERCERO')
    : patenteRaw;
  const conductor = document.getElementById('srv_conductor')?.value.trim() || uiState.srvForm?.conductor || '';
  const tipoEquipo = document.getElementById('srv_tipo_equipo')?.value.trim() || uiState.srvForm?.tipoEquipo || '';
  const clienteSelect = document.getElementById('srv_cliente')?.value.trim() || uiState.srvForm?.cliente || '';
  const cliente = clienteSelect === '__nuevo__'
    ? (document.getElementById('srv_cliente_nuevo')?.value.trim() || uiState.srvForm?.clienteNuevo || '')
    : clienteSelect;
  const peajesVal = document.getElementById('srv_peajes')?.value || uiState.srvForm?.peajes || '';
  const peajes = parseInt(peajesVal);
  // Origen
  const origenSel = uiState.srvForm?.origen || 'Casablanca';
  const origen = origenSel === 'manual'
    ? (document.getElementById('srv_origen_manual')?.value.trim() || uiState.srvForm?.origenManual || '')
    : origenSel;
  // Guías — leer desde DOM para capturar valores aunque no hayan disparado oninput
  const guiasRaw = (uiState.srv_guias || []).map(function(g, i) {
    var numEl  = document.getElementById('srv_guia_num_'  + i);
    var destEl = document.getElementById('srv_guia_dest_' + i);
    var fgEl   = document.getElementById('srv_guia_fg_'   + i);
    return {
      num:            numEl  ? (numEl.value  || g.num  || '') : (g.num  || ''),
      destino:        destEl ? (destEl.value || g.destino || '') : (g.destino || ''),
      fecha_guia:     fgEl   ? (fgEl.value   || g.fecha_guia || '') : (g.fecha_guia || ''),
      fecha_descarga: g.fecha_descarga || '',
      kg:             g.kg || '',
      imagen_url:     g.imagen_url || ''
    };
  });
  // Validaciones en orden
  const markRed = id => { const el=document.getElementById(id); if(el){el.style.border='2px solid #C62828';} };
  if (!fechaRaw) { alert('⚠️ Ingresa la fecha del servicio.'); return; }
  if (!conductor) { alert('⚠️ Selecciona un conductor.'); return; }
  if (!patente) { alert('⚠️ Selecciona una patente.'); return; }
  if (!tipoEquipo) { alert('⚠️ Selecciona el tipo de equipo.'); return; }
  if (!cliente) { alert('⚠️ Selecciona un cliente.'); return; }
  if (!origen) { alert('⚠️ Ingresa el origen del servicio.'); return; }
  for (let i=0; i<guiasRaw.length; i++) {
    const g = guiasRaw[i];
    if (!g.num) { markRed(`srv_guia_num_${i}`); alert(`⚠️ La guía N°${i+1} necesita número.`); return; }
    if (!g.destino) { markRed(`srv_guia_dest_${i}`); alert(`⚠️ La guía N°${i+1} necesita destino.`); return; }
    if (!g.fecha_guia) { markRed(`srv_guia_fg_${i}`); alert(`⚠️ La guía N°${i+1} necesita fecha.`); return; }
  }
  if (isNaN(peajes)) { alert('⚠️ Ingresa los peajes.\nSi no hubo, escribe 0.'); return; }
  if (!appData.servicios) appData.servicios = [];
  const hoy = new Date();
  const fechaFinal = fecha || `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  const partesFecha = fechaFinal.split('-');
  const anio = partesFecha[2] || hoy.getFullYear().toString();
  const mes = partesFecha[1] || String(hoy.getMonth()+1).padStart(2,'0');
  const id = generarIdServicio(appData.servicios, fechaFinal);
  const guias = guiasRaw.filter(g => g.num || g.destino).map(g => ({
    num: g.num || '', guia: g.num || '',
    destino: g.destino || '', fecha_guia: g.fecha_guia || '',
    fecha_descarga: g.fecha_descarga || '', kg: g.kg || '', imagen_url: g.imagen_url || ''
  }));
  const numPuntos = parseInt(uiState.srvForm?.numPuntos)||1;
  const estadia = uiState.srvForm?.estadia || 'no';
  const estadiaDias = parseInt(uiState.srvForm?.estadiaDias)||1;
  const servicio = {
    id, fecha: fechaFinal, anio, mes, patente, conductor, tipoEquipo, cliente,
    origen, guias, puntos: guias, numPuntos, estadia, estadiaDias,
    peajes: parseInt(peajes)||0, precio: 0, petroleo: 0, adicional: 0,
    viaticos: 0, km: 0, tag: '', oc: '', liquidado: false, cerrado: false, estado: 'activo'
  };
  appData.servicios.push(servicio);
  registrarAccion(`Registrar servicio ${id} — ${cliente}`, () => {
    const i = appData.servicios.findIndex(s=>s.id===id);
    if (i!==-1) {
      appData.servicios.splice(i,1);
      if (supaConectado && supa) supa.from('servicios').delete().eq('id',id).then(()=>{});
    }
  });
  if (conductor && !(appData.conductores||[]).includes(conductor)) {
    if (!appData.conductores) appData.conductores = [];
    appData.conductores.push(conductor);
  }
  uiState.srv_guias = [{ num:'', destino:'', fecha_guia:'', fecha_descarga:'', kg:'', imagen_url:'' }];
  uiState.srvForm = {};
  saveData();
  render();
  if (supaConectado && supa) {
    try {
      const { error } = await supa.from('servicios').upsert(servicioToRow(servicio), {onConflict:'id'});
      mostrarToastServicio(!error);
    } catch(e) { mostrarToastServicio(false); }
  } else {
    mostrarToastServicio(false);
  }
  render();
}
async function delServicio(si) {
  if (!appData.servicios) return;
  const servicio = appData.servicios[si];
  if (!servicio) return;
  if (!confirm(`¿Eliminar servicio ${servicio.id} — ${servicio.cliente||'sin cliente'}?\nEsta acción no se puede deshacer.`)) return;
  const precio = servicio.precio || 0;
  const id = servicio.id;
  const copiaSrv = JSON.parse(JSON.stringify(servicio));
  registrarAccion(`Eliminar servicio ${id} — ${servicio.cliente||''}`, () => {
    appData.servicios.splice(si, 0, copiaSrv);
    if (supaConectado && supa) upsertServicioSupabase(copiaSrv);
  });
  appData.servicios.splice(si, 1);
  appData.dashboard.ventas_mes = Math.max(0, (appData.dashboard.ventas_mes || 0) - precio);
  saveData(); render();
  if (supaConectado && supa && id) {
    try { await supa.from('servicios').delete().eq('id', id); } catch(e) {}
  }
}

function editPendInline(el, faseId, pi) {
  if (el.isContentEditable) return;
  el.contentEditable = true;
  el.style.outline = '1px solid #aaa';
  el.style.borderRadius = '3px';
  el.style.padding = '1px 4px';
  el.focus();
  // Seleccionar todo el texto
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
  const guardar = () => {
    el.contentEditable = false;
    el.style.outline = '';
    el.style.padding = '';
    const nuevoTexto = el.innerText.trim();
    if (nuevoTexto) {
      appData.fases.find(f=>f.id===faseId).pendientes[pi].texto = nuevoTexto;
      saveData();
    } else { render(); }
  };
  el.onblur = guardar;
  el.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } if (e.key === 'Escape') { render(); } };
}

function renderFase(fase) {
  const tab = uiState[`tab_${fase.id}`] || 'rutinarias';
  const pendActivos = fase.pendientes.filter(p=>!p.done).length;
  const urgentes = fase.pendientes.filter(p=>p.badge==='hoy'&&!p.done).length;

  // Migración: asegurar que "Registro de servicio diario" existe en operacional
  if (fase.id === 'control') {
    const tieneRespaldo = fase.rutinarias.some(r => r.respaldoTask);
    if (!tieneRespaldo) {
      fase.rutinarias.push({
        titulo: 'Respaldo base de datos',
        proc: 'Ejecutar al término de cada día para respaldar toda la información del sistema en tu PC.',
        subtareas: [
          'Paso 1 — Ir a Control de Gestión → Tareas Rutinarias',
          'Paso 2 — Abrir tarea Respaldo base de datos',
          'Paso 3 — Hacer clic en el botón Descargar respaldo',
          'Paso 4 — El archivo se descarga con la fecha del día',
          'Paso 5 — Guardar en carpeta Respaldos Global Solutions en tu PC'
        ],
        respaldoTask: true, done: false
      });
      saveData();
    }
  }

  if (fase.id === 'comercial') {
    const tienePipeline = fase.rutinarias.some(r => r.pipelineTask);
    if (!tienePipeline) {
      fase.rutinarias.push({ titulo: 'Pipeline Comercial', proc: 'Revisar y actualizar el estado de cada cliente y prospecto activo.', subtareas: [], pipelineTask: true, done: false });
      saveData();
    }
  }

  if (fase.id === 'operacional') {
    const tieneRegistro = fase.rutinarias.some(r => r.registroServicio);
    if (!tieneRegistro) {
      fase.rutinarias.unshift({ titulo: 'Registro de servicio diario', proc: 'Completar al ejecutar o coordinar cada servicio del día.', subtareas: [], registroServicio: true, done: false });
      saveData();
    }
    const tieneDisponibilidad = fase.rutinarias.some(r => r.disponibilidadDiaria);
    if (!tieneDisponibilidad) {
      // Insertar en segundo lugar
      const idx = fase.rutinarias.findIndex(r => r.registroServicio);
      fase.rutinarias.splice(idx + 1, 0, { titulo: 'Disponibilidad y Ocupación diaria', proc: 'Registrar el estado de cada equipo al inicio del día.', subtareas: [], disponibilidadDiaria: true, done: false });
      saveData();
    } else {
      // Asegurar que disponibilidad esté en segundo lugar
      const idxReg = fase.rutinarias.findIndex(r => r.registroServicio);
      const idxDisp = fase.rutinarias.findIndex(r => r.disponibilidadDiaria);
      if (idxDisp !== idxReg + 1 && idxReg !== -1 && idxDisp !== -1) {
        const disp = fase.rutinarias.splice(idxDisp, 1)[0];
        fase.rutinarias.splice(idxReg + 1, 0, disp);
        saveData();
      }
    }
  }

  // v36: tareas sistema financiero
  if (fase.id === 'financiero') {
    if (!fase.rutinarias.some(r=>r.cierreServicioTask)) {
      fase.rutinarias.unshift({titulo:'Cierre de Servicios',proc:'Completar precio, Km, tag y datos faltantes.',subtareas:[],cierreServicioTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.liquidacionTask)) {
      const _iC=fase.rutinarias.findIndex(r=>r.cierreServicioTask);
      fase.rutinarias.splice(_iC+1,0,{titulo:'Liquidaciones',proc:'Gestionar liquidaciones por servicio o grupo.',subtareas:[],liquidacionTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.facturaTask)) {
      const _iLqRF=fase.rutinarias.findIndex(r=>r.liquidacionTask);
      fase.rutinarias.splice(_iLqRF+1,0,{titulo:'Facturación y Cobro',proc:'Registrar facturas emitidas, gestionar factoring y hacer seguimiento de cobro.',subtareas:[],facturaTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.costosTask)) {
      const _iFacRF=fase.rutinarias.findIndex(r=>r.facturaTask);
      fase.rutinarias.splice(_iFacRF+1,0,{titulo:'Costos',proc:'Resumen de costos del mes: petróleo, peajes, viáticos, comisiones, costos fijos y rendiciones.',subtareas:[],costosTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.cajaTask)) {
      const _iCosRF=fase.rutinarias.findIndex(r=>r.costosTask);
      fase.rutinarias.splice(_iCosRF+1,0,{titulo:'Caja',proc:'Flujo de caja del mes: cobros recibidos, egresos, saldo estimado y pendientes de facturar.',subtareas:[],cajaTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.rendicionTask)) {
      fase.rutinarias.push({titulo:'Rendición de Gastos',proc:'Registrar y gestionar rendiciones de gastos del equipo.',subtareas:[],rendicionTask:true,done:false});
      saveData();

function servicioToRow(s) {
  // Convertir fecha de dd-mm-yyyy a yyyy-mm-dd para Supabase
  const fechaISO = s.fecha ? (() => {
    const p = s.fecha.split('-');
    if (p.length === 3 && p[0].length === 2) return p[2]+'-'+p[1]+'-'+p[0];
    return s.fecha;
  })() : null;
  return {
    id: s.id,
    fecha: fechaISO,
    anio: s.anio,
    mes: s.mes,
    patente: s.patente || '',
    conductor: s.conductor || '',
    tipo_equipo: s.tipoEquipo || '',
    cliente: s.cliente || '',
    origen: s.origen || '',
    peajes: s.peajes || 0,
    guias: s.guias || [],
    precio: s.precio || 0,
    km: s.km || 0,
    litros: s.litros || 0,
    monto_comb: s.montoComb || 0,
    petroleo: s.petroleo || 0,
    adicional: s.adicional || 0,
    viaticos: s.viaticos || 0,
    cobro: s.cobro || 'pendiente',
    liquidado: s.liquidado || false,
    costo_total: s.costoTotal || 0,
    margen: s.margen || 0,
    rendimiento: s.rendimiento || 0,
    tag: s.tag || '',
    liquidacion_id: s.liquidacionId || '',
  };
}

async function syncServiciosDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('servicios').select('*').order('created_at');
    if (error) { console.warn('Error sync servicios:', error); return; }

    // ─── RESCATE: subir servicios locales que no están en Supabase ───────────
    // Antes de sobreescribir, detectar servicios guardados localmente pero no sincronizados
    const localServicios = appData.servicios || [];
    const remoteIds = new Set((data || []).map(r => r.id));
    const pendientesDeSubir = localServicios.filter(s => s.id && !remoteIds.has(s.id));
    if (pendientesDeSubir.length > 0) {
      console.log(`Subiendo ${pendientesDeSubir.length} servicio(s) local(es) pendientes a Supabase...`);
      for (const s of pendientesDeSubir) {
        try { await supa.from('servicios').upsert(servicioToRow(s), {onConflict:'id'}); }
        catch(e) { console.warn('Error subiendo servicio pendiente:', s.id, e); }
      }
      // Re-fetch para incluir los recién subidos
      const { data: data2, error: err2 } = await supa.from('servicios').select('*').order('created_at');
      if (!err2 && data2) {
        return _procesarRemotosServicios(data2);
      }
    }
    // ─────────────────────────────────────────────────────────────────────────

    _procesarRemotosServicios(data || []);
  } catch(e) { console.warn('Error sync servicios:', e); }
}

    appData.servicios = [];
    if (data && data.length > 0) {
      const remotos = data.map(r => ({
        id: r.id, fecha: r.fecha, anio: r.anio, mes: r.mes,
        patente: r.patente, conductor: r.conductor, tipoEquipo: r.tipo_equipo,
        cliente: r.cliente, origen: r.origen, peajes: r.peajes||0,
        guias: (r.guias||[]).map(g=>({...g, guia: g.guia||g.num||'', num: g.num||g.guia||''})),
        puntos: (r.puntos||r.guias||[]).map(g=>({...g, guia: g.guia||g.num||'', num: g.num||g.guia||''})),
        precio: r.precio||0, km: r.km||0,
        litros: r.litros||0, montoComb: r.monto_comb||0,
        petroleo: r.petroleo||0, adicional: r.adicional||0,
        viaticos: r.viaticos||0, cobro: r.cobro||'pendiente',
        liquidado: r.liquidado||false, costoTotal: r.costo_total||0,
        margen: r.margen||0, rendimiento: r.rendimiento||0,
        tag: r.tag||'', liquidacionId: r.liquidacion_id||'',
        cerrado: r.cerrado||false, estado: r.estado||'activo',
        numPuntos: r.num_puntos||1, estadia: r.estadia||'no', estadiaDias: r.estadia_dias||1,
        cfProrrateado: r.cf_prorrateado||50800,
        comisionConductor: r.comision_conductor||0,
      }));
      appData.servicios = remotos;
    }
    saveData(); render();
}

// ── SYNC DISPONIBILIDAD SUPABASE ──────────────────────────
async function syncDisponibilidadDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('disponibilidad').select('*').order('created_at');
    if (error) { console.warn('Error sync disponibilidad:', error); return; }
    if (!data || data.length === 0) {
      // Primera vez — migrar local a Supabase
      const local = appData.disponibilidad || {};
      for (const fecha of Object.keys(local)) {
        for (const patente of Object.keys(local[fecha])) {
          const r = local[fecha][patente];
          await supa.from('disponibilidad').upsert({
            id: `${fecha}_${patente}`,
            fecha, patente,
            estado: r.estado||'',
            conductor: r.conductor||'',
            tipo_mant: r.tipoMant||'',
            mant_manual: r.mantManual||''
          }, { onConflict: 'id' });
        }
      }
    } else {
      // Reconstruir appData.disponibilidad desde Supabase
      const disp = {};
      data.forEach(r => {
        if (!disp[r.fecha]) disp[r.fecha] = {};
        disp[r.fecha][r.patente] = {
          estado: r.estado||'',
          conductor: r.conductor||'',
          tipoMant: r.tipo_mant||'',
          mantManual: r.mant_manual||''
        };
      });
      appData.disponibilidad = disp;
      saveData();
    }
  } catch(e) { console.warn('Error sync disponibilidad:', e); }
}

async function upsertDisponibilidadSupabase(fecha, patente, datos) {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('disponibilidad').upsert({
      id: `${fecha}_${patente}`,
      fecha, patente,
      estado: datos.estado||'',
      conductor: datos.conductor||'',
      tipo_mant: datos.tipoMant||'',
      mant_manual: datos.mantManual||''
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error upsert disponibilidad:', e); }
}

// ── SYNC CONFIG PANEL SUPABASE ─────────────────────────────
async function syncConfigPanel() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('config_panel').select('*').eq('id', 'main').single();
    if (error || !data) {
      await pushConfigPanel();
    } else {
      if (data.data && data.data.fases) {
        appData.fases = data.data.fases;
        _deduplicarFases();
        saveData();
      }
    }
  } catch(e) { console.warn('Error sync config panel:', e); }
}

function _deduplicarFases() {
  (appData.fases||[]).forEach(f => {
    if (!f.rutinarias) return;
    // Deduplicar por flag de sistema
    const flags = ['facturaTask','costosTask','cajaTask','liquidacionTask','cierreServicioTask','rendicionTask','pipelineTask','rendimientoCombTask'];
    flags.forEach(flag => {
      let cnt = 0;
      f.rutinarias = f.rutinarias.filter(r => r[flag] ? ++cnt <= 1 : true);
    });
    // Eliminar tareas manuales con títulos duplicados de tareas de sistema
    const titulosEliminar = ['facturación y cobro','facturacion y cobro','cuentas por cobrar','bancarización global solutions','bancarizacion global solutions','control de caja y presupuesto'];
    const tieneSistema = { facturaTask: f.rutinarias.some(r=>r.facturaTask) };
    f.rutinarias = f.rutinarias.filter(r => {
      const titulo = (r.titulo||'').toLowerCase().trim();
      // Si es tarea de sistema con flag, la conservamos
      if (flags.some(fl => r[fl])) return true;
      // Si el título coincide con uno de sistema y ya existe la versión con flag, eliminar
      if (titulo.includes('facturación y cobro') || titulo.includes('facturacion y cobro')) return !tieneSistema.facturaTask;
      if (titulo === 'cuentas por cobrar' || r.cuentasCobrarTask) return false;
      return true;
    });
  });
  saveData();
}

async function pushConfigPanel() {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('config_panel').upsert({
      id: 'main',
      data: { fases: appData.fases },
      updated_at: new Date().toISOString()
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error push config panel:', e); }
}

  return `<div style="padding:10px 4px">
    <div style="margin-bottom:10px;flex-wrap:wrap;display:flex;gap:4px;align-items:center">
      <span style="font-size:10px;font-weight:800;color:#888;letter-spacing:1px;margin-right:4px">PIPELINE:</span>
      ${resumen || '<span style="font-size:11px;color:#bbb">Sin clientes aún</span>'}
    </div>
    ${filas}
    ${addForm}
  </div>`;
}

async function guardarPipeline(ci) {
  if (!appData.pipeline) appData.pipeline = [];
  const item = appData.pipeline[ci];
  const notasExistentes = item.notasMultiples || [];
  appData.pipeline[ci] = {
    id: item.id || '',
    cliente: document.getElementById(`pip_cliente_${ci}`)?.value.trim() || item.cliente,
    contacto: '',
    contactos: item.contactos || [],
    categoria: document.getElementById(`pip_cat_${ci}`)?.value || item.categoria || '',
    etapa: document.getElementById(`pip_etapa_${ci}`)?.value || 'prospecto',
    proximaAccion: document.getElementById(`pip_accion_${ci}`)?.value.trim() || '',
    notas: item.notas || '',
    ultimaGestion: item.ultimaGestion || '',
    notasMultiples: notasExistentes,
    rut: (uiState.pip_form_vals&&uiState.pip_form_vals[ci]&&uiState.pip_form_vals[ci].rut!==undefined)?uiState.pip_form_vals[ci].rut:(document.getElementById(`pip_rut_${ci}`)?.value.trim()||item.rut||''),
    emailFactura: (uiState.pip_form_vals&&uiState.pip_form_vals[ci]&&uiState.pip_form_vals[ci].email_factura!==undefined)?uiState.pip_form_vals[ci].email_factura:(document.getElementById(`pip_email_factura_${ci}`)?.value.trim()||item.emailFactura||''),
    tipoCliente: document.getElementById(`pip_tipo_${ci}`)?.value || item.tipoCliente || 'directo',
    condicionPago: document.getElementById(`pip_pago_${ci}`)?.value || item.condicionPago || '30',
    requiereAprobacion: !!(document.getElementById('pip_aprueba_'+ci)?.checked),
  };
  delete uiState[`pip_edit_${ci}`];
  if(uiState.pip_form_vals) delete uiState.pip_form_vals[ci];
  await guardarPipelineSupabase(appData.pipeline[ci]);
  saveData(); render();
  showToastGeneral('✅ Cliente guardado correctamente');
}

function renderInformes() {
  const informesVista = uiState.informes_vista || 'kpis';
  const periodo = uiState.informe_periodo || 'mes';
  const ambitoSel = uiState.informe_ambito || 'comercial';
  const servicios = appData.servicios || [];

  // ── INFORME 1: REGISTRO DE SERVICIOS ──────────────────────────────────────
  function informeRegistroServicios() {
    const MNOMBRES_L = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const MNOMBRES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const hoyObj = new Date();

    // ── Filtro: tipo de período ──
    const tipoPeriodo = uiState.inf1_tipo || 'mes';

    // ── Semana: lunes de la semana seleccionada (ISO date string YYYY-MM-DD) ──
    function lunesDeHoy() {
      const d = new Date(hoyObj); const dow = d.getDay();
      d.setDate(d.getDate() - (dow===0?6:dow-1)); return d.toISOString().split('T')[0];
    }
    const lunesISO = uiState.inf1_lunes || lunesDeHoy();
    const lunesObj = new Date(lunesISO+'T00:00:00');
    const domingoObj = new Date(lunesObj); domingoObj.setDate(lunesObj.getDate()+6);
    function fmtISO(d){ return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
    function isoToDate(s){ const p=s.split('-'); return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); }
    function moverSemana(n){ const d=isoToDate(lunesISO); d.setDate(d.getDate()+n*7); uiState.inf1_lunes=d.toISOString().split('T')[0]; render(); }
    window.moverSemanaInf=moverSemana;

    // ── Mes selector ──
    const mesesDisp = [...new Set(servicios.map(s=>`${s.anio}-${s.mes}`))].filter(m=>m&&!m.includes('undefined')).sort().reverse();
    const defMes = `${hoyObj.getFullYear()}-${String(hoyObj.getMonth()+1).padStart(2,'0')}`;
    const mesSel = uiState.inf1_mes || (mesesDisp[0]||defMes);
    const [anioSel, mesSelPad] = mesSel.split('-');

    // ── Período libre ──
    const desde = uiState.inf1_desde || '';
    const hasta = uiState.inf1_hasta || '';

    // ── Otros filtros ──
    const clienteFiltro = uiState.inf1_cliente || 'todos';
    const patenteFiltro = uiState.inf1_patente || 'todos';
    const estadoFiltro  = uiState.inf1_estado  || 'todos';

    // ── Aplicar filtro de período ──
    function parseFecha(f){ if(!f)return null; const p=f.split('-'); if(p.length!==3)return null; return p[0].length===4?new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])):new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])); }
    let svcs = servicios.slice();
    if (tipoPeriodo==='semana') {
      svcs = svcs.filter(s=>{ const d=parseFecha(s.fecha); return d&&d>=lunesObj&&d<=domingoObj; });
    } else if (tipoPeriodo==='mes') {
      svcs = svcs.filter(s=>s.anio===anioSel&&s.mes===mesSelPad);
    } else if (tipoPeriodo==='libre') {
      if (desde) { const dObj=new Date(desde+'T00:00:00'); svcs=svcs.filter(s=>{ const d=parseFecha(s.fecha); return d&&d>=dObj; }); }
      if (hasta) { const hObj=new Date(hasta+'T23:59:59'); svcs=svcs.filter(s=>{ const d=parseFecha(s.fecha); return d&&d<=hObj; }); }
    }
    // ── Aplicar filtros secundarios ──
    if (clienteFiltro!=='todos') svcs=svcs.filter(s=>s.cliente===clienteFiltro);
    if (patenteFiltro!=='todos') svcs=svcs.filter(s=>s.patente===patenteFiltro);
    if (estadoFiltro==='cerrados') svcs=svcs.filter(s=>s.cerrado);
    else if (estadoFiltro==='pendientes') svcs=svcs.filter(s=>!s.cerrado);

    // ── Ordenar por fecha ──
    svcs=svcs.slice().sort((a,b)=>{ const da=parseFecha(a.fecha),db=parseFecha(b.fecha); return (da||0)-(db||0); });

    // ── Totales ──
    const totalKmInf = svcs.reduce((a,s)=>a+(s.km||0),0);
    const totalIngInf = svcs.filter(s=>s.cerrado).reduce((a,s)=>a+(s.precio||0),0);
    const promIngKm = totalKmInf>0 ? Math.round(totalIngInf/totalKmInf) : 0;

    // ── Listas para dropdowns ──
    const clientesDisp = [...new Set(servicios.map(s=>s.cliente).filter(Boolean))].sort();
    const flota = typeof getFlota==='function' ? getFlota().todas : (appData.patentes||[]);

    // ── Label período para display y PDF ──
    function labelPeriodo() {
      if (tipoPeriodo==='semana') return `Semana ${fmtISO(lunesObj)} — ${fmtISO(domingoObj)}`;
      if (tipoPeriodo==='mes') return `${MNOMBRES_L[parseInt(mesSelPad)-1]} ${anioSel}`;
      if (desde||hasta) return `${desde||'inicio'} al ${hasta||'hoy'}`;
      return 'Período libre';
    }
    function labelFiltros() {
      const f=[]; if(clienteFiltro!=='todos')f.push('Cliente: '+clienteFiltro); if(patenteFiltro!=='todos')f.push('Equipo: '+patenteFiltro); if(estadoFiltro!=='todos')f.push('Estado: '+estadoFiltro); return f.join(' | ')||'Sin filtros adicionales';
    }

    // ── Guardar snapshot para PDF ──
    window._inf1_snapshot = { svcs, labelPeriodo:labelPeriodo(), labelFiltros:labelFiltros(), totalKmInf, totalIngInf, promIngKm };

    // ── Selector de período ──
    const selStyle = 'padding:6px 8px;border:1px solid #dde;border-radius:6px;font-size:11px;outline:none;background:white';
    const btnBase = (act)=>`padding:6px 10px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:700;background:${act?'#0B2545':'#ECEFF1'};color:${act?'white':'#455A64'}`;

    const periodoControls = tipoPeriodo==='semana' ? `
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <button onclick="moverSemanaInf(-1)" style="${btnBase(false)}">← Anterior</button>
        <span style="font-size:11px;font-weight:700;color:#0B2545;white-space:nowrap">${fmtISO(lunesObj)} — ${fmtISO(domingoObj)}</span>
        <button onclick="moverSemanaInf(1)" style="${btnBase(false)}">Siguiente →</button>
      </div>` :
    tipoPeriodo==='mes' ? `
      <select onchange="uiState.inf1_mes=this.value;render()" style="${selStyle}">
        ${mesesDisp.map(m=>{const[a,mm]=m.split('-');return`<option value="${m}" ${mesSel===m?'selected':''}>${MNOMBRES_C[parseInt(mm)-1]} ${a}</option>`;}).join('')}
      </select>` :
    `<input type="date" value="${desde}" onchange="uiState.inf1_desde=this.value;render()" style="${selStyle};width:120px">
     <span style="font-size:11px;color:#888">al</span>
     <input type="date" value="${hasta}" onchange="uiState.inf1_hasta=this.value;render()" style="${selStyle};width:120px">`;

    // ── Filas tabla ──
    const rowsHTML = svcs.length===0
      ? `<tr><td colspan="10" style="text-align:center;padding:24px;color:#aaa;font-size:11px">Sin servicios para los filtros seleccionados</td></tr>`
      : svcs.map((s,i)=>{
          const puntos=s.puntos||s.guias||[];
          const origen=puntos[0]?.origen||s.origen||'—';
          const destino=puntos[puntos.length-1]?.destino||'—';
          const guias=puntos.map(g=>g.num||g.guia).filter(Boolean).join(', ')||'—';
          const estado=s.cerrado?'Cerrado':(s.estado==='borrador'?'Borrador':'Pendiente');
          const ec=s.cerrado?'#2E7D32':(s.estado==='borrador'?'#1565C0':'#888');
          return `<tr style="background:${i%2===0?'#fafbfc':'white'};border-bottom:1px solid #eee">
            <td style="padding:6px 8px;font-size:10px;font-weight:700;color:#0B2545;white-space:nowrap">${s.id}</td>
            <td style="padding:6px 8px;font-size:10px;white-space:nowrap">${s.fecha||'—'}</td>
            <td style="padding:6px 8px;font-size:10px;font-weight:600">${s.cliente||'—'}</td>
            <td style="padding:6px 8px;font-size:10px">${s.conductor||'—'}</td>
            <td style="padding:6px 8px;font-size:10px;font-weight:700">${s.patente||'—'}</td>
            <td style="padding:6px 8px;font-size:10px">${origen} → ${destino}</td>
            <td style="padding:6px 8px;font-size:10px">${guias}</td>
            <td style="padding:6px 8px;font-size:10px;text-align:right">${(s.km||0).toLocaleString('es-CL')}</td>
            <td style="padding:6px 8px;font-size:10px;text-align:right;font-weight:700;color:${s.cerrado?'#2E7D32':'#999'}">${s.precio?'$'+s.precio.toLocaleString('es-CL'):'—'}</td>
            <td style="padding:6px 8px;font-size:10px;font-weight:700;color:${ec}">${estado}</td>
          </tr>`;
        }).join('');

    return `
    <!-- FILTROS -->
    <div style="background:#F5F7FA;border:1px solid #E0E4EA;border-radius:10px;padding:10px 12px;margin-bottom:10px">

      <!-- Fila 1: PERÍODO tipo -->
      <div style="margin-bottom:8px">
        <div style="font-size:9px;font-weight:700;color:#607D8B;letter-spacing:0.5px;margin-bottom:5px">PERÍODO</div>
        <div style="display:flex;gap:4px">
          ${[['semana','Semana'],['mes','Mes'],['libre','Libre']].map(([v,l])=>`<button onclick="uiState.inf1_tipo='${v}';render()" style="${btnBase(tipoPeriodo===v)}">${l}</button>`).join('')}
        </div>
      </div>

      <!-- Fila 2: selector según tipo -->
      <div style="margin-bottom:8px">
        ${periodoControls}
      </div>

      <!-- Fila 3: CLIENTE -->
      <div style="margin-bottom:8px">
        <div style="font-size:9px;font-weight:700;color:#607D8B;letter-spacing:0.5px;margin-bottom:5px">CLIENTE</div>
        <select onchange="uiState.inf1_cliente=this.value;render()" style="width:100%;${selStyle}">
          <option value="todos" ${clienteFiltro==='todos'?'selected':''}>Todos los clientes</option>
          ${clientesDisp.map(c=>`<option value="${c}" ${clienteFiltro===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>

      <!-- Fila 4: EQUIPO + ESTADO en dos columnas -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:9px;font-weight:700;color:#607D8B;letter-spacing:0.5px;margin-bottom:5px">EQUIPO</div>
          <select onchange="uiState.inf1_patente=this.value;render()" style="width:100%;${selStyle}">
            <option value="todos" ${patenteFiltro==='todos'?'selected':''}>Todos</option>
            ${flota.map(p=>`<option value="${p}" ${patenteFiltro===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:#607D8B;letter-spacing:0.5px;margin-bottom:5px">ESTADO</div>
          <div style="display:flex;gap:3px;flex-wrap:wrap">
            ${[['todos','Todos'],['cerrados','Cerr.'],['pendientes','Pend.']].map(([v,l])=>`<button onclick="uiState.inf1_estado='${v}';render()" style="${btnBase(estadoFiltro===v)};font-size:9px;padding:5px 7px">${l}</button>`).join('')}
          </div>
        </div>
      </div>

      <!-- Fila 5: PDF -->
      <button onclick="imprimirInforme1()" style="width:100%;padding:9px;background:#0B2545;color:white;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">🖨️ Generar PDF</button>
    </div>

    <!-- RESUMEN -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
      <div style="background:#E3F2FD;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#888">SERVICIOS</div>
        <div style="font-size:20px;font-weight:900;color:#0B2545">${svcs.length}</div>
      </div>
      <div style="background:#E8F5E9;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#888">INGRESOS (cerr.)</div>
        <div style="font-size:14px;font-weight:900;color:#2E7D32">$${totalIngInf.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#EDE7F6;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#888">KM TOTALES</div>
        <div style="font-size:16px;font-weight:900;color:#4527A0">${totalKmInf.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#FFF8E1;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#888">PROM $/KM</div>
        <div style="font-size:14px;font-weight:900;color:#E65100">${promIngKm>0?'$'+promIngKm.toLocaleString('es-CL'):'—'}</div>
      </div>
    </div>

    <!-- TABLA -->
    <div style="overflow-x:auto;border-radius:8px;border:1px solid #dde">
      <table style="width:100%;border-collapse:collapse;font-family:inherit;min-width:700px">
        <thead>
          <tr style="background:#0B2545;color:white;position:sticky;top:0">

            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">FECHA</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">CLIENTE</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">CONDUCTOR</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">PATENTE</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">RUTA</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">N° GUÍA</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:right">KM</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:right">PRECIO NETO</th>
            <th style="padding:9px 8px;font-size:9px;font-weight:800;text-align:left">ESTADO</th>

        <tbody>${rowsHTML}</tbody>

            <td colspan="7" style="padding:8px 10px;font-size:10px;font-weight:700;color:#0B2545">${svcs.length} servicios · ${svcs.filter(s=>s.cerrado).length} cerrados · ${svcs.filter(s=>!s.cerrado).length} pendientes</td>
            <td style="padding:8px;font-size:11px;font-weight:900;text-align:right;color:#4527A0">${totalKmInf.toLocaleString('es-CL')}</td>
