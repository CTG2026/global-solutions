        <div style="font-size:14px;font-weight:900;color:#F9A825">${fmtPeso(totalCostos)}</div>
      </div>
      <div style="background:#F3E5F5;border-radius:8px;padding:10px">
        <div style="font-size:9px;color:#888;font-weight:700">COMBUSTIBLE</div>
        <div style="font-size:14px;font-weight:900;color:#6A1B9A">${fmtPeso(totalCombMonto)}</div>
      </div>
      <div style="background:#E8F5E9;border-radius:8px;padding:10px">
        <div style="font-size:9px;color:#888;font-weight:700">✅ COBRADO</div>
        <div style="font-size:14px;font-weight:900;color:#2E7D32">${fmtPeso(cobPagado)}</div>
      </div>
      <div style="background:#FFFDE7;border-radius:8px;padding:10px">
        <div style="font-size:9px;color:#888;font-weight:700">⏳ POR COBRAR</div>
        <div style="font-size:14px;font-weight:900;color:#F9A825">${fmtPeso(cobPendiente+cobFacturado)}</div>
      </div>
    </div>
    <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:8px;letter-spacing:0.5px">DETALLE POR SERVICIO</div>
    ${liquidados.length===0?`<div style="color:#aaa;font-size:12px;text-align:center;padding:10px">Sin servicios liquidados</div>`:
    liquidados.map(s=>`<div style="padding:8px 10px;background:#F8F9FA;border-radius:7px;margin-bottom:5px;border-left:3px solid #2E7D32">
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;font-weight:700;color:#333">${s.id} · ${s.patente||'—'}</span>
        <span style="font-size:11px;font-weight:700;color:#2E7D32">${fmtPeso(s.precio)}</span>
      </div>
      <div style="font-size:10px;color:#777">${s.fecha} · ${s.cliente||'—'} · ${s.margen||0}% margen</div>
    </div>`).join('')}`;
  }

  function contenidoDisponibilidad() {
    const disponibilidad = appData.disponibilidad || {};
    const FLOTA = ['WR9192','GKFD84','XR8555','GCFF12','BPBL35','XA1114','DSDV36'];
    const ESTADO_COLOR = {
      'Disponible':      { bg:'#E8F5E9', text:'#2E7D32' },
      'En servicio':     { bg:'#E3F2FD', text:'#1565C0' },
      'Mantención':      { bg:'#FFF3E0', text:'#E65100' },
      'Puesta en marcha':{ bg:'#F3E5F5', text:'#6A1B9A' },
    };

    const dias = Object.keys(disponibilidad).sort((a,b)=>{
      const pa=a.split('-'),pb=b.split('-');
      return new Date(pb[2],pb[1]-1,pb[0])-new Date(pa[2],pa[1]-1,pa[0]);
    });

    if (dias.length===0) return `<div style="text-align:center;color:#aaa;padding:20px;font-size:12px">Sin registros de disponibilidad</div>`;

    // Resumen por equipo en el período filtrado
    const resumenEquipos = {};
    FLOTA.forEach(p => { resumenEquipos[p] = { enServicio:0, disponible:0, mantencion:0, total:0 }; });
    dias.forEach(fecha => {
      const dd = disponibilidad[fecha]||{};
      FLOTA.forEach(p => {
        const e = dd[p]?.estado||'';
        resumenEquipos[p].total++;
        if (e==='En servicio') resumenEquipos[p].enServicio++;
        else if (e==='Disponible') resumenEquipos[p].disponible++;
        else if (e==='Mantención') resumenEquipos[p].mantencion++;
      });
    });

    return `<div style="font-size:9px;font-weight:700;color:#6A1B9A;margin-bottom:8px;letter-spacing:0.5px">RESUMEN POR EQUIPO (${dias.length} días)</div>
    ${FLOTA.map(p=>{
      const r=resumenEquipos[p];
      const ocup=r.total>0?Math.round((r.enServicio/r.total)*100):0;
      return `<div style="padding:10px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:6px;border-left:3px solid #6A1B9A">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:700;color:#333">${p}</span>
          <span style="font-size:11px;font-weight:700;color:#1565C0">${ocup}% ocupado</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span style="font-size:9px;background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:6px">${r.enServicio}d en serv.</span>
          <span style="font-size:9px;background:#E8F5E9;color:#2E7D32;padding:2px 6px;border-radius:6px">${r.disponible}d disp.</span>
          ${r.mantencion?`<span style="font-size:9px;background:#FFF3E0;color:#E65100;padding:2px 6px;border-radius:6px">${r.mantencion}d mant.</span>`:''}
        </div>
      </div>`;
    }).join('')}
    <div style="font-size:9px;font-weight:700;color:#6A1B9A;margin:12px 0 8px;letter-spacing:0.5px">DETALLE POR DÍA</div>
    ${dias.slice(0,10).map(fecha=>{
      const dd=disponibilidad[fecha]||{};
      const enServ=FLOTA.filter(p=>dd[p]?.estado==='En servicio').length;
      const ocup=FLOTA.length>0?Math.round((enServ/FLOTA.length)*100):0;
      return `<div style="padding:8px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:5px;border-left:3px solid #9C27B0">
        <div style="display:flex;justify-content:space-between">
          <span style="font-size:11px;font-weight:700;color:#333">📅 ${fecha}</span>
          <span style="font-size:11px;font-weight:700;color:#1565C0">${ocup}% ocupación</span>
        </div>
        <div style="font-size:10px;color:#777;margin-top:2px">${enServ} equipos en servicio de ${FLOTA.length}</div>
      </div>`;
    }).join('')}`;
  }

  function contenidoRRHH() {
    const servicios = appData.servicios || [];
    const filtrados = filtrarPeriodo(servicios);
    const porConductor = {};
    filtrados.forEach(s => {
      const c = s.conductor||'Sin asignar';
      if (!porConductor[c]) porConductor[c] = { servicios:0, km:0 };
      porConductor[c].servicios++;
      porConductor[c].km += s.km||0;
    });
    const conductoresActivos = Object.keys(porConductor).length;
    return `<div style="font-size:9px;font-weight:700;color:#5D4037;margin-bottom:8px;letter-spacing:0.5px">CARGA DE TRABAJO POR CONDUCTOR</div>
    ${conductoresActivos===0?'<div style="color:#aaa;font-size:12px;text-align:center;padding:10px">Sin datos</div>':
    Object.entries(porConductor).sort((a,b)=>b[1].servicios-a[1].servicios).map(([c,d])=>`
      <div style="padding:10px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:6px;border-left:3px solid #5D4037">
        <div style="display:flex;justify-content:space-between">
          <span style="font-size:12px;font-weight:700;color:#333">${c}</span>
          <span style="font-size:11px;color:#5D4037;font-weight:700">${d.servicios} servicio${d.servicios!==1?'s':''}</span>
        </div>
        ${d.km?`<div style="font-size:10px;color:#777;margin-top:2px">${d.km.toLocaleString()} km recorridos</div>`:''}
      </div>`).join('')}`;
  }

  function contenidoScalingUp() {
    const su = appData.scalingup || {};
    const fases = su.f6Items || [];
    const pendTotal = (appData.fases||[]).reduce((a,f)=>{
      return a + (f.pendientes||[]).filter(p=>!p.done).length;
    },0);
    return `<div style="font-size:9px;font-weight:700;color:#37474F;margin-bottom:8px;letter-spacing:0.5px">AVANCE ESCALAMIENTO</div>
    ${fases.length===0?'<div style="color:#aaa;font-size:12px;text-align:center;padding:10px">Sin fases configuradas</div>':
    fases.map((f,i)=>{
      const items = f.items||[];
      const done = items.filter(it=>it.done).length;
      const pct = items.length>0?Math.round((done/items.length)*100):0;
      return `<div style="padding:10px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:6px;border-left:3px solid #37474F">
        <div style="font-size:11px;font-weight:700;color:#333">Fase ${i+1} — ${f.titulo||''}</div>
        <div style="height:6px;background:#ECEFF1;border-radius:3px;margin-top:5px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:#37474F;border-radius:3px"></div>
        </div>
        <div style="font-size:9px;color:#888;margin-top:3px">${done}/${items.length} completados</div>
      </div>`;
    }).join('')}
    <div style="padding:10px 12px;background:#ECEFF1;border-radius:8px;margin-top:8px">
      <div style="font-size:11px;font-weight:700;color:#37474F">Pendientes totales del sistema</div>
      <div style="font-size:22px;font-weight:900;color:#37474F">${pendTotal}</div>
    </div>`;
  }

  const contenido = ambitoSel==='comercial' ? contenidoComercial() :
                    ambitoSel==='operacional' ? contenidoOperacional() :
                    ambitoSel==='financiero' ? contenidoFinanciero() :
                    ambitoSel==='rrhh' ? contenidoRRHH() :
                    contenidoScalingUp();

  return `<div style="padding:12px">
    ${periodoHTML}
    ${kpisHTML}
    ${ambitoHTML}
    <div>${contenido}</div>
  </div>`;
}

// ── MÓDULO AVANCE LIQUIDACIÓN ─────────────────────────────
function renderAvanceLiquidacion() {
  const servicios = appData.servicios || [];
  const pendientes = servicios.filter(s => !s.enLiquidacion && !s.liquidacionId);
  
  if (pendientes.length === 0) {
    return `<div style="text-align:center;padding:16px;color:#aaa;font-size:11px">Sin servicios pendientes de liquidar</div>`;
  }

  // Agrupar por TAG
  const porTag = {};
  pendientes.forEach(s => {
    const tag = s.tag || 'Sin TAG';
    if (!porTag[tag]) porTag[tag] = [];
    porTag[tag].push(s);
  });

  return `<div style="padding:2px">
    <div style="font-size:9px;font-weight:700;color:#546E7A;letter-spacing:0.5px;margin-bottom:8px">SERVICIOS PENDIENTES DE LIQUIDAR</div>
    ${Object.entries(porTag).map(([tag, svcs]) => {
      const total = svcs.reduce((a,s) => a+( s.precio||0), 0);
      const isOpen = !!uiState['avliq_tag_' + tag];
      return `<div style="border:1px solid #dde;border-radius:8px;margin-bottom:6px;overflow:hidden">
        <div onclick="uiState['avliq_tag_${tag}']=!uiState['avliq_tag_${tag}'];render()" 
             style="padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#F8F9FA">
          <div>
            <div style="font-size:11px;font-weight:700;color:#333">TAG: ${tag}</div>
            <div style="font-size:9px;color:#888;margin-top:1px">${svcs.length} servicio${svcs.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;font-weight:700;color:#546E7A">$${total.toLocaleString()}</span>
            <span style="font-size:10px;color:#aaa">${isOpen?'▲':'▼'}</span>
          </div>
        </div>
        ${isOpen ? `<div style="padding:8px 12px">
          ${svcs.map(s => {
            const guias = (s.guias||[]).map(g=>g.num).filter(Boolean).join(', ') || '—';
            return `<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:11px;font-weight:700;color:#333">${s.id} — ${s.cliente||'—'}</div>
                <div style="font-size:9px;color:#777">${s.fecha} · ${s.patente} · Guías: ${guias}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:11px;font-weight:700;color:#546E7A">$${(s.precio||0).toLocaleString()}</div>
                <div style="font-size:9px;color:${s.tag?'#2E7D32':'#E65100'}">${s.tag?'TAG: '+s.tag:'Sin TAG'}</div>
              </div>
            </div>`;
          }).join('')}
          <div style="margin-top:8px">
            <button onclick="prepararCierreLiquidacion('${tag}')" 
                    style="width:100%;padding:9px;background:#546E7A;color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">
              → Crear liquidación con este TAG
            </button>
          </div>
        </div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

// ── MÓDULO CIERRE LIQUIDACIÓN ──────────────────────────────
function renderCierreLiquidacion() {
  if (!appData.liquidaciones) appData.liquidaciones = [];
  const lf = uiState.liq_form || {};
  const liquidaciones = appData.liquidaciones;
  const servicios = appData.servicios || [];

  // Generar número de liquidación
  const nextNum = 'LIQ-' + String(liquidaciones.length + 1).padStart(3, '0');
  const hoyISO = (() => { const h=new Date(); return `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`; })();

  // Servicios disponibles para adjuntar
  const disponibles = servicios.filter(s => !s.liquidacionId);
  const adjuntados = (lf.serviciosIds||[]).map(id => servicios.find(s=>s.id===id)).filter(Boolean);
  const totalLiq = adjuntados.reduce((a,s)=>a+(s.precio||0),0);

  const svcOpts = disponibles.map(s => {
    const guias = (s.guias||[]).map(g=>g.num).filter(Boolean).join(',') || '—';
    return `<option value="${s.id}">${s.id} — ${s.cliente||'—'} — Guía ${guias} — $${(s.precio||0).toLocaleString()}</option>`;
  }).join('');

  const formHTML = `<div style="padding:10px 12px;background:#f4f6f8;border-radius:10px;border:1px solid #dde4e8;margin-bottom:12px">
    <div style="font-size:10px;font-weight:700;color:#546E7A;letter-spacing:1px;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #CFD8DC">
      NUEVA LIQUIDACIÓN — ${nextNum}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div>
        <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">FECHA</div>
        <input id="liq_fecha_nueva" type="date" value="${lf.fecha||hoyISO}" 
               onchange="uiState.liq_form=uiState.liq_form||{};uiState.liq_form.fecha=this.value"
               style="width:100%;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;background:white">
      </div>
      <div>
        <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">EMAIL CLIENTE</div>
        <input id="liq_email" type="email" value="${lf.email||''}" placeholder="cliente@empresa.cl"
               onchange="uiState.liq_form=uiState.liq_form||{};uiState.liq_form.email=this.value"
               style="width:100%;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;background:white">
      </div>
    </div>

    <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:4px">ADJUNTAR SERVICIO POR ID O GUÍA</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <select id="liq_svc_select" style="flex:1;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:11px;outline:none;font-family:inherit;background:white;-webkit-appearance:auto">
        <option value="">Seleccionar servicio...</option>
        ${svcOpts}
      </select>
      <button onclick="adjuntarServicioLiq()" 
              style="background:#546E7A;color:white;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">+ Agregar</button>
    </div>

    ${adjuntados.length > 0 ? `
    <div style="background:white;border:1px solid #dde;border-radius:8px;margin-bottom:8px;overflow:hidden">
      <div style="font-size:9px;font-weight:700;color:#546E7A;padding:6px 10px;background:#ECEFF1;letter-spacing:0.5px">SERVICIOS ADJUNTADOS</div>
      ${adjuntados.map(s => {
        const guias = (s.guias||[]).map(g=>g.num).filter(Boolean).join(', ') || '—';
        const gdFd=(s.guias||[]).map(g=>g.fecha_descarga).filter(Boolean).join(', ')||'—';
        const gdDst=(s.guias||[]).map(g=>g.destino).filter(Boolean).join(' / ')||'—';
        return `<div style="padding:7px 10px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:11px;font-weight:800;color:#455A64">${s.id} <span style="color:#222;font-weight:700">${s.cliente||'—'}</span></div>

            <div style="font-size:10px;color:#777">${s.fecha} · Descarga: ${gdFd}</div>

  ${liquidaciones.length === 0 ? '<div style="text-align:center;color:#aaa;font-size:11px;padding:12px">Sin liquidaciones creadas aún</div>' :

      'enviada':   { bg:'#E3F2FD', text:'#1565C0', label:'📤 Enviada' },
      'facturada': { bg:'#F3E5F5', text:'#6A1B9A', label:'🧾 Facturada' },
      'pagada':    { bg:'#E8F5E9', text:'#2E7D32', label:'✅ Pagada' },

          <div style="font-size:9px;color:#888">${liq.fecha} · ${svcsLiq.length} servicio${svcsLiq.length!==1?'s':''}</div>

function descargarRespaldo() {
  const fecha = new Date();
  const nombreArchivo = `GS_Respaldo_${String(fecha.getDate()).padStart(2,'0')}-${String(fecha.getMonth()+1).padStart(2,'0')}-${fecha.getFullYear()}.json`;
  const datos = JSON.stringify(appData, null, 2);
  const blob = new Blob([datos], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo; a.click();
  URL.revokeObjectURL(url);

function adjuntarServicioLiq() {
  const sel = document.getElementById('liq_svc_select');
  if (!sel || !sel.value) return;
  if (!uiState.liq_form) uiState.liq_form = {};
  if (!uiState.liq_form.serviciosIds) uiState.liq_form.serviciosIds = [];
  if (!uiState.liq_form.serviciosIds.includes(sel.value)) {
    uiState.liq_form.serviciosIds.push(sel.value);
  }
  render();
}

function quitarServicioLiq(svcId) {
  if (!uiState.liq_form || !uiState.liq_form.serviciosIds) return;
  uiState.liq_form.serviciosIds = uiState.liq_form.serviciosIds.filter(id => id !== svcId);
  render();
}

function prepararCierreLiquidacion(tag) {
  // Pre-cargar servicios del TAG en el formulario de cierre
  const servicios = (appData.servicios||[]).filter(s => s.tag === tag && !s.liquidacionId);
  uiState.liq_form = { serviciosIds: servicios.map(s=>s.id), fecha: null, email: '' };
  // Abrir tarea Cierre Liquidación
  const fase = appData.fases.find(f => f.id === 'financiero');
  if (fase) {
    const idx = fase.rutinarias.findIndex(r => r.cierreLiquidacion);
    if (idx !== -1) {
      uiState['acord_financiero_' + idx] = true;
    }
  }
  render();
}

function crearLiquidacion() {
  const lf = uiState.liq_form || {};
  if (!lf.serviciosIds || lf.serviciosIds.length === 0) return alert('Agrega al menos un servicio');
  if (!appData.liquidaciones) appData.liquidaciones = [];
  
  const fecha = document.getElementById('liq_fecha_nueva')?.value || new Date().toISOString().split('T')[0];
  const email = document.getElementById('liq_email')?.value || '';
  const p = fecha.split('-');
  const fechaStr = `${p[2]}-${p[1]}-${p[0]}`;
  const id = 'LIQ-' + String(appData.liquidaciones.length + 1).padStart(3,'0');
  const servicios = appData.servicios || [];
  const total = lf.serviciosIds.reduce((a,sid) => {
    const s = servicios.find(sv=>sv.id===sid);
    return a + (s?s.precio||0:0);
  }, 0);

  const nuevaLiq = { id, fecha: fechaStr, email, serviciosIds: [...lf.serviciosIds], total, estado: 'creada', nFactura: '' };
  appData.liquidaciones.push(nuevaLiq);

  // Marcar servicios como liquidados
  lf.serviciosIds.forEach(sid => {
    const s = servicios.find(sv=>sv.id===sid);
    if (s) { s.liquidacionId = id; upsertServicioSupabase(s); }
  });

  uiState.liq_form = {};
  saveData();
  render();
  alert('✅ Liquidación ' + id + ' creada correctamente');
}

function cambiarEstadoLiq(liqId, nuevoEstado) {
  const liq = (appData.liquidaciones||[]).find(l=>l.id===liqId);
  if (!liq) return;
  liq.estado = nuevoEstado;

}

function _armarTextoLiquidacion(liq) {
  const servicios = appData.servicios || [];
  const svcs = (liq.serviciosIds||[]).map(id => servicios.find(s=>s.id===id)).filter(Boolean);
  let lineas = `LIQUIDACIÓN ${liq.id}\nFecha: ${liq.fecha}\n\n`;
  lineas += `DETALLE DE SERVICIOS:\n`;
  svcs.forEach(s => {
    const guias = (s.guias||[]).map(g=>g.num).filter(Boolean).join(', ')||'—';
    lineas += `• ${s.id} | ${s.cliente||'—'} | ${s.fecha} | Guías: ${guias} | $${(s.precio||0).toLocaleString()}\n`;
  });
  lineas += `\nTOTAL: $${(liq.total||0).toLocaleString()}\n`;
  if (liq.nFactura) lineas += `Factura N°: ${liq.nFactura}\n`;
  return lineas;
}

function guardarDisponibilidad() {
  const fecha = document.getElementById('disp_fecha')?.value;
  const patente = document.getElementById('disp_patente')?.value;
  const estado = document.getElementById('disp_estado')?.value;
  const conductor = document.getElementById('disp_conductor')?.value||'';
  const tipoMant = document.getElementById('disp_tipo_mant')?.value||'';
  const mantManual = document.getElementById('disp_mant_manual')?.value||'';

  if (!patente || !estado || !fecha) return alert('Completa fecha, patente y estado');

  // Convertir fecha ISO a dd-mm-yyyy
  const p = fecha.split('-');
  const fechaKey = `${p[2]}-${p[1]}-${p[0]}`;

  if (!appData.disponibilidad) appData.disponibilidad = {};
  if (!appData.disponibilidad[fechaKey]) appData.disponibilidad[fechaKey] = {};
  const registroDisp = { estado, conductor, tipoMant, mantManual };
  appData.disponibilidad[fechaKey][patente] = registroDisp;
  uiState.disp_form = {};
  saveData();
  upsertDisponibilidadSupabase(fechaKey, patente, registroDisp);
  render();
}

function saveDisp(patente, campo, valor) {
  const hoy = new Date();
  const fechaHoy = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  if (!appData.disponibilidad) appData.disponibilidad = {};
  if (!appData.disponibilidad[fechaHoy]) appData.disponibilidad[fechaHoy] = {};
  if (!appData.disponibilidad[fechaHoy][patente]) appData.disponibilidad[fechaHoy][patente] = {};
  appData.disponibilidad[fechaHoy][patente][campo] = valor;
  if (campo==='estado') {
    appData.disponibilidad[fechaHoy][patente].conductor = '';
    appData.disponibilidad[fechaHoy][patente].tipoMant = '';
    appData.disponibilidad[fechaHoy][patente].mantManual = '';
  }
  saveData(); render();
}

function saveTipoMant(patente, valor) {
  const hoy = new Date();
  const fechaHoy = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  if (!appData.disponibilidad) appData.disponibilidad = {};
  if (!appData.disponibilidad[fechaHoy]) appData.disponibilidad[fechaHoy] = {};
  if (!appData.disponibilidad[fechaHoy][patente]) appData.disponibilidad[fechaHoy][patente] = {};
  appData.disponibilidad[fechaHoy][patente].tipoMant = valor;
  saveData(); render();
}

    accion: "filtrar('financiero')"

  // Liquidaciones enviadas sin facturar

function agregarPrioManual() {
  const input = document.getElementById('prio_manual_input');
  const texto = input?.value.trim();
  if (!texto) return;
  if (!appData.priosManuales) appData.priosManuales = [];
  appData.priosManuales.push({texto, done:false, fecha: new Date().toLocaleDateString('es-CL')});
  input.value = '';
  saveData(); render();
}
function togglePrioManual(i) {
  if (!appData.priosManuales) return;
  appData.priosManuales[i].done = !appData.priosManuales[i].done;
  saveData(); render();
}
function delPrioManual(i) {
  if (!appData.priosManuales) return;
  appData.priosManuales.splice(i, 1);
  saveData(); render();
}

function setPrioridad(faseId, pendIdx, valor) {
  if (!appData.prioridades) appData.prioridades = {};
  const key = `${faseId}::${pendIdx}`;
  if (valor === 0) delete appData.prioridades[key];
  else appData.prioridades[key] = valor;
  saveData(); render();
}

function agregarFoco(faseId, faseNombre, pendIdx) {
  if (!appData.midia_foco) appData.midia_foco = [];
  const fase = appData.fases.find(f => f.id === faseId);
  if (!fase) return;
  const pend = fase.pendientes[pendIdx];
  if (!pend) return;
  const key = faseId + '::' + pend.texto;
  const yaEsta = appData.midia_foco.findIndex(f => f.faseId + '::' + f.texto === key);
  if (yaEsta >= 0) appData.midia_foco.splice(yaEsta, 1);
  else appData.midia_foco.push({ faseId, faseNombre, texto: pend.texto, done: false });
  saveData(); render();
}

function quitarFoco(fi) {
  if (!appData.midia_foco) return;
  appData.midia_foco.splice(fi, 1);
  saveData(); render();
}

function toggleFocoDone(fi) {
  if (!appData.midia_foco) return;
  appData.midia_foco[fi].done = !appData.midia_foco[fi].done;
  saveData(); render();
}

function toggleMidiaAmb(faseId) {
  if (!appData.midia_open) appData.midia_open = {};
  appData.midia_open[faseId] = !appData.midia_open[faseId];
  saveData(); render();
}

function editPersonalInline(el, pi) {
  if (el.isContentEditable) return;
  el.contentEditable = true; el.style.outline = '1px solid #aaa'; el.focus();
  const range = document.createRange(); range.selectNodeContents(el);
  const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  const guardar = () => {
    el.contentEditable = false; el.style.outline = '';
    const val = el.innerText.trim();
    if (val) { const f = appData.fases.find(f=>f.id==='control'); if(f.personalPendientes) f.personalPendientes[pi].texto = val; saveData(); }
    else render();
  };
  el.onblur = guardar;
  el.onkeydown = (e) => { if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape')render(); };
}

function liquidarServicio(id) {
  const idx = (appData.servicios||[]).findIndex(s => s.id === id);
  if (idx === -1) return;
  const precio     = parseInt(document.getElementById(`liq_precio_${id}`)?.value) || 0;
  const km         = parseInt(document.getElementById(`liq_km_${id}`)?.value) || 0;
  const viaticos   = parseInt(document.getElementById(`liq_viaticos_${id}`)?.value) || 0;
  const petroleo   = parseInt(document.getElementById(`liq_petroleo_${id}`)?.value) || 0;
  const litros     = parseFloat(document.getElementById(`liq_litros_${id}`)?.value) || 0;
  const montoComb  = parseInt(document.getElementById(`liq_monto_comb_${id}`)?.value) || 0;
  const adicional  = parseInt(document.getElementById(`liq_adicional_${id}`)?.value) || 0;
  const peajes     = parseInt(document.getElementById(`liq_peajes_${id}`)?.value) || appData.servicios[idx].peajes || 0;
  const cobro      = uiState[`cobro_${id}`] || 'pendiente';

  const rendimiento = (litros > 0 && km > 0) ? Math.round((km / litros) * 10) / 10 : 0;
  const costoTotal = petroleo + montoComb + viaticos + peajes + adicional;
  const margen = precio > 0 ? Math.round(((precio - costoTotal) / precio) * 100) : 0;
  const esLiquidado = (precio > 0);

  Object.assign(appData.servicios[idx], {
    precio, km, viaticos, petroleo, litros, montoComb, adicional, peajes,
    cobro, rendimiento, costoTotal, margen,
    liquidado: esLiquidado
  });

  appData.dashboard.ventas_mes = (appData.servicios||[]).filter(s=>s.liquidado).reduce((a,s)=>a+(s.precio||0),0);
  uiState.liquidando_id = null;
  upsertServicioSupabase(appData.servicios[idx]);

  saveData(); render();
  mostrarToastServicio(supaConectado);
}

function copiarResumen() {
  let txt = `PANEL DE GESTIÓN — GLOBAL SOLUTIONS\n${new Date().toLocaleDateString('es-CL')}\n\n`;
  appData.fases.forEach(fase => {
    const activos = fase.pendientes.filter(p=>!p.done);
    const urgentes = activos.filter(p=>p.badge==='hoy');
    if (activos.length === 0) return;
    txt += `═══ ${fase.nombre} ═══\n`;
    if (urgentes.length) { txt += `HOY:\n`; urgentes.forEach(p => txt += `  • ${p.texto}\n`); }
    const resto = activos.filter(p=>p.badge!=='hoy');
    if (resto.length) { txt += `Pendientes:\n`; resto.forEach(p => txt += `  • ${p.badge?'['+p.badge.toUpperCase()+'] ':''}${p.texto}\n`); }
    txt += '\n';
  });
  const suActivos = appData.scalingup.rocks.filter(r=>!r.done);
  if (suActivos.length) {
    txt += `═══ SCALING UP — ROCKS ═══\n`;
    suActivos.forEach(r => txt += `  • [${r.pillar}] ${r.texto}\n`);
  }
  const btn = document.getElementById('copyBtn');
  const doCopiado = () => { btn.textContent = '✓ Copiado'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋 Copiar resumen'; btn.classList.remove('copied'); }, 2000); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(doCopiado).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); doCopiado();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); doCopiado();
  }
}

function fmtPeso(n) {
  if (!n || n === 0) return '$0';
  return '$' + Math.round(n).toLocaleString('es-CL');
}

function fmtPesoCompacto(n) {
  // Cifras completas — sin abreviar
  return fmtPeso(n);
}

function renderDashboard() {
  const d = appData.dashboard;
  const hoy = new Date();
  const metaVentas = d.meta_pe || 20320000;
  const costosFijos = d.gasto_meta || 5080000;
  const presupuesto = d.presupuesto_mes || 0;
  const mesPadded = String(hoy.getMonth()+1).padStart(2,'0');
  const anioStr = String(hoy.getFullYear());
  const serviciosMesArr = (appData.servicios||[]).filter(s => {
    if (s.mes && s.anio) return s.mes === mesPadded && s.anio === anioStr;
    if (!s.fecha) return false;
    const parts = s.fecha.split('-');
    return parts.length===3 && parseInt(parts[1])===hoy.getMonth()+1 && parseInt(parts[2])===hoy.getFullYear();
  });
  const serviciosMes = serviciosMesArr.length;
  const ventasCerradas = serviciosMesArr.filter(s => s.cerrado && s.precio).reduce((a,s) => a + (s.precio||0), 0);
  const ventasBorrador = serviciosMesArr.filter(s => !s.cerrado && s.estado === 'borrador' && s.precio).reduce((a,s) => a + (s.precio||0), 0);
  const ventas = ventasCerradas + ventasBorrador;
  // Calcular costos live desde el módulo de costos
  const gastoManuales = (appData.costos||[]).filter(c => c.mes===mesPadded && c.anio===anioStr).reduce((a,c) => a + (c.total||0), 0);
  const gastoCombustible = (appData.copec||[]).filter(c => c.mes===mesPadded && c.anio===anioStr).reduce((a,c) => a + (c.monto||0), 0);
  const gasto = gastoManuales + gastoCombustible;
  const caja = d.caja || 0;
  const resultado = ventas - gasto;
  const resultadoPct = metaVentas > 0 ? Math.min(100, Math.round(ventas/metaVentas*100)) : 0;
  const peAlcanzado = ventas >= metaVentas;
  const gastoPct = presupuesto > 0 ? Math.min(100, Math.round(gasto/presupuesto*100)) : (costosFijos > 0 ? Math.min(100, Math.round(gasto/costosFijos*100)) : 0);
  const gastoBase = presupuesto > 0 ? presupuesto : costosFijos;
  const gastoAlerta = gastoPct > 90;
  const dispPct = (d.flota_total||9) > 0 ? Math.round((d.flota_disponible||0)/(d.flota_total||9)*100) : 0;
  const ocupPct = (d.flota_disponible||0) > 0 ? Math.round((d.flota_ocupada||0)/(d.flota_disponible||1)*100) : 0;
  // Calcular servicios de la semana actual live desde appData.servicios
  const dayOfWeek = hoy.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const lunesSemana = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() + mondayOffset);
  const domingoSemana = new Date(lunesSemana.getTime() + 6 * 86400000);
  const serviciosSemana = (appData.servicios||[]).filter(s => {
    if (!s.fecha) return false;
    const p = s.fecha.split('-');
    if (p.length !== 3) return false;
    const fd = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    return fd >= lunesSemana && fd <= domingoSemana;
  }).length;
  const serviciosSemanaPresup = d.servicios_semana_presup || 0;
  const facturasCobrar = d.facturas_cobrar || 0;
  const semanaActual = Math.ceil(hoy.getDate()/7);

  function bar(pct, color, h) {
    h = h || 8;
    return `<div style="height:${h}px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;margin:6px 0 4px">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width 0.4s"></div></div>`;
  }
  function eBtn(field, label, val) {
    return `<button class="dash-edit-btn" style="font-size:9px;padding:0;margin-top:3px" onclick="openDashSingle('${field}','${label}',${val})">✎ editar</button>`;
  }

  // ── 1. RESULTADO ──
  const resColor = resultado >= 0 ? '#81C784' : '#EF9A9A';
  const resBlock = `
    <div style="background:#1a3d6b;border-radius:10px;padding:14px 16px;margin-bottom:8px">
      <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,0.5);margin-bottom:6px">RESULTADO DEL MES</div>
      <div style="font-size:36px;font-weight:900;color:${resColor};line-height:1;letter-spacing:-1px">${resultado>=0?'+':''}${fmtPesoCompacto(resultado)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:3px">Ventas ${fmtPesoCompacto(ventas)} − Gasto ${fmtPesoCompacto(gasto)}</div>
      ${bar(resultadoPct, peAlcanzado?'#81C784':'rgba(255,255,255,0.6)')}
      <div style="font-size:11px;font-weight:700;color:${peAlcanzado?'#81C784':'rgba(255,255,255,0.8)'}">${peAlcanzado?'✓ PE ALCANZADO':'Faltan '+fmtPesoCompacto(metaVentas-ventas)+' para el PE'}</div>
    </div>`;

  // ── 2. VENTAS vs COSTOS ──
  const ingcosBlock = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div style="background:#1a3d6b;border-radius:10px;padding:12px 14px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,0.5);margin-bottom:4px">VENTAS</div>
        <div style="font-size:26px;font-weight:900;color:white;line-height:1">${fmtPesoCompacto(ventas)}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:2px">${ventasBorrador>0?'✓ '+fmtPesoCompacto(ventasCerradas)+' + ~'+fmtPesoCompacto(ventasBorrador)+' borr.':'✓ '+fmtPesoCompacto(ventasCerradas)+' cerrados'}</div>
        ${bar(resultadoPct,'rgba(255,255,255,0.7)',6)}
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.8)">${resultadoPct}% del PE</div>
      </div>
      <div style="background:#1a3d6b;border-radius:10px;padding:12px 14px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,0.5);margin-bottom:4px">COSTOS</div>
        <div style="font-size:26px;font-weight:900;color:${gastoAlerta?'#EF9A9A':'white'};line-height:1">${fmtPesoCompacto(gasto)}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:2px">${gastoManuales>0||gastoCombustible>0?fmtPesoCompacto(gastoManuales)+' costos + '+fmtPesoCompacto(gastoCombustible)+' comb.':(presupuesto>0?'presup. '+fmtPesoCompacto(presupuesto):'CF '+fmtPesoCompacto(costosFijos))}</div>
        ${bar(gastoPct, gastoAlerta?'#EF9A9A':'rgba(255,255,255,0.7)',6)}
        <div style="font-size:10px;font-weight:700;color:${gastoAlerta?'#EF9A9A':'rgba(255,255,255,0.8)'}">${gastoPct}% ejecutado${gastoAlerta?' ⚠':''}</div>
      </div>
    </div>`;

  // ── 3. OPERACIONAL + CAJA ──
  const opsBlock = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="background:#1a3d6b;border-radius:10px;padding:10px 12px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:4px">FLOTA</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.6)">Disp.</div>
        <div style="font-size:22px;font-weight:900;color:white;line-height:1">${dispPct}%</div>
        ${bar(dispPct,'rgba(255,255,255,0.7)',5)}
        <div style="font-size:11px;color:rgba(255,255,255,0.6)">Ocup.</div>
        <div style="font-size:22px;font-weight:900;color:white;line-height:1">${ocupPct}%</div>
        ${bar(ocupPct,'rgba(255,255,255,0.7)',5)}
        ${eBtn('flota_disponible','Camiones disponibles hoy',d.flota_disponible||0)}
      </div>
      <div style="background:#1a3d6b;border-radius:10px;padding:10px 12px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:4px">SERVICIOS</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.6)">Esta sem.</div>
        <div style="font-size:22px;font-weight:900;color:white;line-height:1">${serviciosSemana}<span style="font-size:11px;color:rgba(255,255,255,0.4)">/${serviciosSemanaPresup||'?'}</span></div>
        <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:4px">Sem ${semanaActual} del mes</div>
        <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);margin-top:2px">${serviciosMes} en el mes</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.4);margin-top:3px">auto desde sistema</div>
      </div>
      <div style="background:#1a3d6b;border-radius:10px;padding:10px 12px">
        <div style="font-size:9px;font-weight:800;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:4px">CAJA</div>
        <div style="font-size:20px;font-weight:900;color:white;line-height:1.1;margin-top:4px">${fmtPesoCompacto(caja)}</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:6px">x cobrar</div>
        <div style="font-size:16px;font-weight:800;color:rgba(255,255,255,0.85)">${fmtPesoCompacto(facturasCobrar)}</div>
        ${eBtn('caja','Caja disponible ($)',caja)}
      </div>
    </div>`;

  document.getElementById('dashboard-container').innerHTML = `
    <div class="dash-wrap" style="padding:10px;background:#163557;border-radius:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:900;color:white;letter-spacing:2px">DASHBOARD</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5)">${hoy.toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'long'})}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:rgba(255,255,255,0.4);font-weight:700">COSTOS FIJOS</div>
          <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.8)">${fmtPesoCompacto(costosFijos)} <span style="font-size:9px;cursor:pointer;text-decoration:underline;color:rgba(255,255,255,0.5)" onclick="openDashSingle('gasto_meta','Costos fijos ($)',${costosFijos})">editar</span></div>
        </div>
      </div>
      ${resBlock}${ingcosBlock}${opsBlock}
    </div>`;
}

let _dashField = null;
function openDashSingle(field, label, valor) {
  _dashField = field;
  document.getElementById('dash-modal-title').textContent = label;
  document.getElementById('dash-modal-label').textContent = label;
  const inp = document.getElementById('dash-modal-input');
  inp.value = valor || '';
  inp.placeholder = valor || '';
  document.getElementById('dash-modal').classList.add('open');
  setTimeout(()=>{ inp.focus(); inp.select(); }, 80);
}
function openDashModal() { openDashSingle('ventas','Ventas del mes ($)', appData.dashboard.ventas_mes||0); }

function closeDashModal() {
  document.getElementById('dash-modal').classList.remove('open');
  _dashField = null;
}

function saveDashSingle() {
  if (!_dashField) return;
  const val = parseInt(document.getElementById('dash-modal-input').value);
  if (isNaN(val)) { closeDashModal(); return; }
  const d = appData.dashboard;
  if (_dashField === 'ventas') d.ventas_mes = val;
  else if (_dashField === 'caja') d.caja = val;
  else if (_dashField === 'meta_pe') d.meta_pe = val;
  else if (_dashField === 'gasto_real') d.gasto_real = val;
  else if (_dashField === 'gasto_meta') d.gasto_meta = val;
  else if (_dashField === 'flota_disponible') d.flota_disponible = val;
  else if (_dashField === 'flota_ocupada') d.flota_ocupada = val;
  else d[_dashField] = val;
  closeDashModal();
  saveData(); render();
}

function render() {
  _deduplicarFases();
  const dashEl = document.getElementById('dashboard-container');
  // Ocultar dashboard cuando se filtra por un ámbito específico
  if (vistaActual !== 'todas') {
    dashEl.style.display = 'none';
  } else {
    dashEl.style.display = '';
    renderDashboard();
  }
  const container = document.getElementById('fases');
  if (vistaActual === 'scalingup') {
    container.innerHTML = renderScalingUp();
    return;
  }
  const filtered = vistaActual==='todas' ? appData.fases : appData.fases.filter(f=>f.id===vistaActual);
  container.innerHTML = filtered.map(renderFase).join('') + (vistaActual==='todas' ? renderScalingUp() : '');
}

// ============ SISTEMA DE LOGIN ============
const ROLES = [
  { id: 'cgestion',   nombre: 'Controler',     pin: '0001', acceso: 'all' },
  { id: 'coordinador',nombre: 'Coordinador',   pin: '0002', acceso: 'all' },
  { id: 'mantenimiento', nombre: 'Mantenimiento', pin: '0003', acceso: 'disponibilidad' },
  { id: 'admin',      nombre: 'Administrativo',pin: '0004', acceso: 'all' },
  { id: 'conductor',  nombre: 'Conductor',     pin: null,   acceso: 'conductor' },
];

const CONDUCTORES_PINS = {};
let sessionRol = null;
let sessionConductor = null;
let pinIngresado = '';
let pinTarget = null;

function iniciarLogin() {
  // Siempre mostrar pantalla de seleccion de perfil al abrir
  mostrarLogin();
}

function mostrarLogin() {
  document.getElementById('login-screen').style.display = 'block';
  document.querySelector('.container').style.display = 'none';
  mostrarPasoRol();
}

function mostrarPasoRol() {
  document.getElementById('login-step-rol').style.display = 'block';
  document.getElementById('login-step-conductor').style.display = 'none';
  document.getElementById('login-step-pin').style.display = 'none';
  const lista = document.getElementById('roles-list');
  lista.innerHTML = ROLES.map(r => `
    <button class="rol-btn" onclick="seleccionarRol('${r.id}')">${r.nombre}</button>
  `).join('');
}

function seleccionarRol(rolId) {
  const rol = ROLES.find(r => r.id === rolId);
  if (rolId === 'conductor') {
    mostrarPasoConductor();
  } else {
    pinTarget = rol;
    sessionConductor = null;
    mostrarPasoPin(rol.nombre);
  }
}

function mostrarPasoConductor() {
  document.getElementById('login-step-rol').style.display = 'none';
  document.getElementById('login-step-conductor').style.display = 'block';
  const conductores = appData.conductores || ['Manuel Madrid','Felipe Vidal','Felipe Madariaga','Sebastián Zúñiga','Pablo Riquelme'];
  const lista = document.getElementById('conductores-list-login');
  lista.innerHTML = conductores.map((c,i) => `
    <button class="rol-btn" onclick="seleccionarConductor('${c}', ${i})">${c}</button>
  `).join('');
}

function seleccionarConductor(nombre, idx) {
  const pin = String(5 + idx).padStart(4, '0');
  pinTarget = { id: 'conductor', nombre: 'Conductor', pin, acceso: 'conductor' };
  sessionConductor = nombre;
  mostrarPasoPin(nombre);
}

function mostrarPasoPin(nombre) {
  document.getElementById('login-step-rol').style.display = 'none';
  document.getElementById('login-step-conductor').style.display = 'none';
  document.getElementById('login-step-pin').style.display = 'block';
  document.getElementById('login-quien').textContent = nombre;
  pinIngresado = '';
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function pinPress(val) {
  if (pinIngresado.length < 4) {
    pinIngresado += String(val);
  }
  actualizarDots();
  if (pinIngresado.length === 4) {
    setTimeout(validarPin, 150);
  }
}

function pinBorrar() {
  pinIngresado = pinIngresado.slice(0, -1);
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function actualizarDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) => {
    d.classList.toggle('filled', i < pinIngresado.length);
  });
}

function validarPin() {
  if (pinIngresado === pinTarget.pin) {
    sessionRol = pinTarget;
    localStorage.setItem('gs_session', JSON.stringify({ rol: pinTarget, conductor: sessionConductor }));
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.container').style.display = 'block';
    aplicarAcceso();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Intenta de nuevo.';
    pinIngresado = '';
    actualizarDots();
  }
}

function loginVolverRol() {
  pinIngresado = '';
  sessionConductor = null;
  mostrarPasoRol();
}

function cerrarSesion() {
  localStorage.removeItem('gs_session');
  sessionRol = null;
  // Restaurar todos los botones de filtro
  document.querySelectorAll('.filter-btn').forEach(b => b.style.display = '');
  sessionConductor = null;
  mostrarLogin();
}

function aplicarAcceso() {
  if (!sessionRol) { mostrarLogin(); return; }

  // Mostrar panel, ocultar login
  document.getElementById('login-screen').style.display = 'none';
  document.querySelector('.container').style.display = 'block';

  // Mostrar nombre en topbar
  const info = document.getElementById('session-info');
  if (info) info.textContent = (sessionConductor || sessionRol.nombre).toUpperCase();

  const acceso = sessionRol.acceso;

  if (acceso === 'conductor') {
    // Conductor: solo Registro de Servicio
    vistaActual = 'operacional';
    render();
    setTimeout(() => {
      document.querySelectorAll('.filter-btn').forEach(b => b.style.display = 'none');
      const dash = document.getElementById('dashboard-container');
      if (dash) dash.style.display = 'none';
      const abrirBtn = document.querySelector('button[onclick="abrirEnChrome()"]');
      if (abrirBtn) abrirBtn.parentElement.style.display = 'none';
      const fase = appData.fases.find(f => f.id === 'operacional');
      if (fase) {
        fase.rutinarias.forEach((r,i) => { uiState['acord_operacional_'+i] = false; });
        const idx = fase.rutinarias.findIndex(r => r.registroServicio);
        if (idx !== -1) { uiState['acord_operacional_' + idx] = true; }
        render();

      }
    }, 150);

  } else if (acceso === 'disponibilidad') {
    // Mantenimiento: solo módulo Disponibilidad
    vistaActual = 'operacional';
    render();
    setTimeout(() => {
      document.querySelectorAll('.filter-btn').forEach(b => b.style.display = 'none');
      const dash = document.getElementById('dashboard-container');
      if (dash) dash.style.display = 'none';
      const abrirBtn = document.querySelector('button[onclick="abrirEnChrome()"]');
      if (abrirBtn && abrirBtn.parentElement) abrirBtn.parentElement.style.display = 'none';
      const fase = appData.fases.find(f => f.id === 'operacional');
      if (fase) {
        fase.rutinarias.forEach((r,i) => { uiState['acord_operacional_'+i] = false; });
        const idx = fase.rutinarias.findIndex(r => r.disponibilidadDiaria);
        if (idx !== -1) { uiState['acord_operacional_' + idx] = true; }
        render();

      }
    }, 150);

  } else if (acceso === 'all') {
    // Acceso total: mostrar todo
    vistaActual = 'todas';
    render();
    setTimeout(() => {
      document.querySelectorAll('.filter-btn').forEach(b => b.style.display = '');
    }, 50);

  } else {
    // Acceso parcial: mostrar solo ámbitos permitidos
    const permitidos = acceso.split(',').map(a => a.trim());
    vistaActual = 'todas';
    render();
    setTimeout(() => {
      document.querySelectorAll('.filter-btn').forEach(b => {
        const oc = b.getAttribute('onclick') || '';
        const m = oc.match(/filtrar\('([^']+)'/);
        const v = m ? m[1] : null;
        // Siempre mostrar Todos y Control
        if (!v || v === 'todas' || v === 'control' || v === 'scalingup') {
          b.style.display = '';
        } else if (permitidos.includes(v)) {
          b.style.display = '';
        } else {
          b.style.display = 'none';
        }
      });
    }, 50);
  }
}

// ── AUTO-REFRESCO v37: cada 3 minutos ──────────────────
setInterval(async () => {
  if (!supaConectado || !supa) return;
  // No interrumpir si el usuario está llenando un formulario activo
  const formulariosActivos = [
    'srv_fecha', 'srv_conductor', 'srv_patente', 'srv_cliente',
    'pip_new_cliente', 'disp_fecha', 'liq_fecha_v2',
    'ren_fecha', 'ren_responsable', 'ren_descripcion'
  ];
  const hayFormAbierto = formulariosActivos.some(id => document.getElementById(id) !== null);
  if (hayFormAbierto) return;
  try {
    await syncServiciosDesdeSupabase();
    await syncDisponibilidadDesdeSupabase();
    render();
  } catch(e) {}
}, 1 * 60 * 1000); // 1 minuto

// ── PULL TO REFRESH móvil ───────────────────────────────
let _ptY = 0;
document.addEventListener('touchstart', e => { _ptY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', async e => {
  const dy = e.changedTouches[0].clientY - _ptY;
  if (dy > 80 && window.scrollY === 0 && supaConectado) {
    const formulariosActivos = ['srv_fecha','srv_conductor','srv_patente','srv_cliente','pip_new_cliente','disp_fecha','liq_fecha_v2','ren_fecha','ren_responsable','ren_descripcion'];
    if (formulariosActivos.some(id => document.getElementById(id) !== null)) return;
    const el = document.getElementById('save-indicator');
    if (el) { el.textContent = '↻ Actualizando...'; el.classList.add('show'); }
    await syncServiciosDesdeSupabase();
    await syncDisponibilidadDesdeSupabase();
    render();
    if (el) { el.textContent = '✓ Actualizado'; setTimeout(() => el.classList.remove('show'), 2000); }
  }
}, {passive:true});

    regs.forEach(reg => reg.unregister());
  });

  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
// Limpiar localStorage de servicios al arrancar — Supabase es la única fuente
try {
  const raw = localStorage.getItem('gs_panel_v5');
  if (raw) {
    const parsed = JSON.parse(raw);
    if (parsed.servicios && parsed.servicios.length > 0) {
      parsed.servicios = [];
      localStorage.setItem('gs_panel_v5', JSON.stringify(parsed));
    }
  }
} catch(e) {}
</script>
