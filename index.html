function generarIdServicio(servicios, fechaStr) {
  let d;
  if (fechaStr) {
    const p = fechaStr.split('-');
    if (p.length === 3) d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));

  const anioStr = String(d.getFullYear()).slice(2);
  const num = String((servicios||[]).length + 1).padStart(2,'0');
  return num + anioStr + mesStr;
}

let appData;
let uiState = {};
let vistaActual = "todas";
let historialAcciones = [];
const MAX_HISTORIAL = 20;

function registrarAccion(descripcion, fnDeshacer) {
  historialAcciones.push({ descripcion, fnDeshacer });
  if (historialAcciones.length > MAX_HISTORIAL) historialAcciones.shift();
  actualizarBotonDeshacer();
}
function deshacer() {
  if (historialAcciones.length === 0) return;
  const accion = historialAcciones.pop();
  accion.fnDeshacer();
  actualizarBotonDeshacer();
  saveData(); render();
}
function actualizarBotonDeshacer() {
  const btn = document.getElementById('btn-deshacer');
  if (!btn) return;
  btn.style.opacity = historialAcciones.length > 0 ? '1' : '0.35';
  btn.title = historialAcciones.length > 0 ? 'Deshacer: ' + historialAcciones[historialAcciones.length-1].descripcion : 'Sin acciones para deshacer';
}
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); deshacer(); }
});

  const checksCon = `
    <label style="${lblSt}"><input type="checkbox" style="${chkSt}" ${todosConductSel?'checked':''} onchange="uiState.rcFiltCon={};render()"> <span style="font-weight:700">Todos</span></label>

  const sec4 = `<div style="background:#E3F2FD;border-radius:10px;padding:12px;margin-bottom:10px">

  return `<div style="padding:2px">${sec1}${sec2}${sec3}${sec4}</div>`;
}

function crearRegistroRC() {
  const fechaISO  = document.getElementById('rc_fecha')?.value;
  const patente   = document.getElementById('rc_patente')?.value;
  const conductor = document.getElementById('rc_conductor')?.value;
  const litros    = parseFloat(document.getElementById('rc_litros')?.value)||0;
  const monto     = parseInt(document.getElementById('rc_monto')?.value)||0;
  const kmIni     = parseInt(document.getElementById('rc_km_ini')?.value)||0;
  if (!patente) return alert('Selecciona la patente');
  if (!litros)  return alert('Ingresa los litros cargados');
  if (!appData.rendimientoComb) appData.rendimientoComb = [];
  const fecha = _rcFmtISO(fechaISO);
  const p = fechaISO.split('-');
  const cerradoAlInstante = kmIni > 0;
  const rendimiento = cerradoAlInstante ? +(kmIni / litros).toFixed(2) : 0;
  const nuevo = {
    id: _rcNextId(), fecha, patente, conductor, litros, monto,
    km: kmIni, rendimiento,
    estado: cerradoAlInstante ? 'cerrado' : 'abierto',
    mes: p[1], anio: p[0],
    fechaCierre: cerradoAlInstante ? fecha : ''
  };
  appData.rendimientoComb.push(nuevo);
  saveData();
  upsertRendimientoCombSupabase(nuevo);
  render();
}

function cerrarTurnoRC(idx) {
  const r = appData.rendimientoComb[idx];
  if (!r) return;
  const km = parseInt(document.getElementById('rc_km_'+idx)?.value)||0;
  if (!km) return alert('Ingresa los km recorridos');
  const hoy = new Date();
  r.km = km;
  r.rendimiento = +(km / r.litros).toFixed(2);
  r.estado = 'cerrado';
  r.fechaCierre = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  saveData();
  upsertRendimientoCombSupabase(r);
  render();
}

function eliminarTurnoRC(idx) {
  if (!confirm('¿Eliminar este registro?')) return;
  appData.rendimientoComb.splice(idx, 1);
  saveData(); render();
}

function eliminarRegistroRC(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  appData.rendimientoComb = appData.rendimientoComb.filter(r=>r.id!==id);
  saveData(); render();
}

function guardarEdicionRC(id) {
  const r = (appData.rendimientoComb||[]).find(x=>x.id===id);
  if (!r) return;
  const fecha    = document.getElementById('rce_fecha')?.value||r.fecha;
  const patente  = document.getElementById('rce_patente')?.value||r.patente;
  const conductor= document.getElementById('rce_conductor')?.value||'';
  const litros   = parseFloat(document.getElementById('rce_litros')?.value)||0;
  const monto    = parseInt(document.getElementById('rce_monto')?.value)||0;
  const km       = parseInt(document.getElementById('rce_km')?.value)||0;
  if (!litros) return alert('Los litros no pueden ser 0');
  r.fecha     = fecha;
  r.patente   = patente;
  r.conductor = conductor;
  r.litros    = litros;
  r.monto     = monto;
  r.km        = km;
  r.rendimiento = km>0 && litros>0 ? +(km/litros).toFixed(2) : 0;
  const p = fecha.split('-');
  if (p.length===3) { r.mes=p[1]; r.anio=p[2]; }
  uiState.rcEditId = null;
  saveData();
  upsertRendimientoCombSupabase(r);
  render();
}

function imprimirInformeRC() {
  const desdeISO = document.getElementById('rci_desde')?.value;
  const hastaISO = document.getElementById('rci_hasta')?.value;
  const hoyFmt = new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'});

  function parseISO(s){ if(!s)return null; const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  function parseDD(s){ if(!s)return null; const p=s.split('-'); return new Date(+p[2],+p[1]-1,+p[0]); }

  const dDesde = parseISO(desdeISO);
  const dHasta = parseISO(hastaISO);

  const selPat = uiState.rcFiltPat || {};
  const selCon = uiState.rcFiltCon || {};
  const todosPatSel = Object.keys(selPat).length === 0;
  const todosConductSel = Object.keys(selCon).length === 0;

  const registros = (appData.rendimientoComb||[])
    .filter(r => r.estado==='cerrado')
    .filter(r => {
      const d = parseDD(r.fecha);
      if (!d) return false;
      if (dDesde && d < dDesde) return false;
      if (dHasta && d > dHasta) return false;
      if (!todosPatSel && !selPat[r.patente]) return false;
      if (!todosConductSel && !selCon[r.conductor||'Sin asignar']) return false;
      return true;
    })
    .sort((a,b) => { const da=parseDD(a.fecha),db=parseDD(b.fecha); return da-db; });

  if (!registros.length) return alert('No hay registros cerrados en el período seleccionado');

  const totalLitros = registros.reduce((s,r)=>s+(r.litros||0),0);
  const totalKm     = registros.reduce((s,r)=>s+(r.km||0),0);
  const totalMonto  = registros.reduce((s,r)=>s+(r.monto||0),0);
  const rendProm    = totalKm>0&&totalLitros>0 ? (totalKm/totalLitros).toFixed(2) : '—';

  // Subtotales por equipo
  const porPatente = {};
  registros.forEach(r=>{
    if(!porPatente[r.patente]) porPatente[r.patente]={regs:0,litros:0,km:0};
    porPatente[r.patente].regs++;
    porPatente[r.patente].litros += r.litros||0;
    porPatente[r.patente].km    += r.km||0;
  });

  // Subtotales por conductor
  const porConductor = {};
  registros.forEach(r=>{
    const c = r.conductor||'Sin asignar';
    if(!porConductor[c]) porConductor[c]={regs:0,litros:0,km:0};
    porConductor[c].regs++;
    porConductor[c].litros += r.litros||0;
    porConductor[c].km    += r.km||0;
  });

  const periodoLabel = (desdeISO?_rcFmtISO(desdeISO):'inicio')+' al '+(hastaISO?_rcFmtISO(hastaISO):'hoy');

  const filasDetalle = registros.map((r,i)=>`
    <tr style="background:${i%2===0?'white':'#F4F6F8'}">
      <td style="padding:6px 8px">${r.fecha}</td>
      <td style="padding:6px 8px;font-weight:700">${r.patente}</td>
      <td style="padding:6px 8px">${r.conductor||'—'}</td>
      <td style="padding:6px 8px;text-align:right">${r.litros}L</td>
      <td style="padding:6px 8px;text-align:right">${r.monto?'$'+r.monto.toLocaleString('es-CL'):'—'}</td>
      <td style="padding:6px 8px;text-align:right">${r.km} km</td>
      <td style="padding:6px 8px;text-align:right;font-weight:800;color:#1B5E20">${r.rendimiento} km/L</td>
    </tr>`).join('');

  const filasPatente = Object.entries(porPatente).map(([p,d])=>`
    <tr>
      <td style="padding:6px 8px;font-weight:700">${p}</td>
      <td style="padding:6px 8px;text-align:right">${d.regs}</td>
      <td style="padding:6px 8px;text-align:right">${d.litros}</td>
      <td style="padding:6px 8px;text-align:right">${d.km}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:800;color:#1B5E20">${d.km>0&&d.litros>0?(d.km/d.litros).toFixed(2)+' km/L':'—'}</td>
    </tr>`).join('');

  const filasConductor = Object.entries(porConductor).map(([c,d])=>`
    <tr>
      <td style="padding:6px 8px">${c}</td>
      <td style="padding:6px 8px;text-align:right">${d.regs}</td>
      <td style="padding:6px 8px;text-align:right">${d.litros}</td>
      <td style="padding:6px 8px;text-align:right">${d.km}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:800;color:#1B5E20">${d.km>0&&d.litros>0?(d.km/d.litros).toFixed(2)+' km/L':'—'}</td>
    </tr>`).join('');

  const th = 'padding:7px 8px;text-align:left;font-size:9px;font-weight:800';

    .logo{font-size:20px;font-weight:900;color:#0B2545}.logo .sub{font-size:9px;color:#546E7A;font-weight:400;display:block}
    .meta .title{font-size:15px;font-weight:900;color:#0B2545;text-align:right}.meta .row{font-size:9px;color:#546E7A;margin-top:2px;text-align:right}
    .resumen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
    .res-box{background:#0B2545;color:white;padding:10px;border-radius:6px;text-align:center}
    .res-box .rl{font-size:8px;opacity:0.7;font-weight:700;text-transform:uppercase}.res-box .rv{font-size:18px;font-weight:900}
    .sec-title{font-size:10px;font-weight:900;color:#0B2545;letter-spacing:0.5px;margin:12px 0 6px;text-transform:uppercase}
    table{width:100%;border-collapse:collapse;margin-bottom:10px}
    thead tr{background:#0B2545;color:white}
    th{${th}}
    td{padding:6px 8px;border-bottom:1px solid #E8EDF3;font-size:9.5px}

  </style>
  </head><body>

function _leerCamposCierre(id, idx) {
  const s = appData.servicios[idx];
  return {
    precio: parseInt(document.getElementById('cs_precio_'+id)?.value)||0,
    km: parseInt(document.getElementById('cs_km_'+id)?.value)||s?.km||0,
    tag: document.getElementById('cs_tag_'+id)?.value.trim()||s?.tag||'',
    oc: document.getElementById('cs_oc_'+id)?.value.trim()||s?.oc||'',
    peajes: parseInt(document.getElementById('cs_peajes_'+id)?.value)||s?.peajes||0,
    viaticos: parseInt(document.getElementById('cs_via_'+id)?.value)||s?.viaticos||0,
    adicional: parseInt(document.getElementById('cs_adic_'+id)?.value)||s?.adicional||0,
    litros: parseInt(document.getElementById('cs_litros_'+id)?.value)||s?.litros||0,
    petroleo: parseInt(document.getElementById('cs_petroleo_'+id)?.value)||s?.petroleo||0,
    cfProrrateado: parseInt(document.getElementById('cs_cf_'+id)?.value)||s?.cfProrrateado||50800,
  };
}

async function guardarBorradorCierre(id) {
  const idx=appData.servicios.findIndex(s=>s.id===id);
  if(idx===-1)return;
  const d=_leerCamposCierre(id,idx);
  const copiaAntes = JSON.parse(JSON.stringify(appData.servicios[idx]));
  const comisionConductor=d.precio?Math.round(d.precio*0.10):0;
  registrarAccion(`Borrador servicio ${id}`, () => {
    const i=appData.servicios.findIndex(s=>s.id===id);
    if(i!==-1){Object.assign(appData.servicios[i],copiaAntes);upsertServicioSupabase(appData.servicios[i]);}
  });
  Object.assign(appData.servicios[idx],{
    precio: d.precio, km: d.km, tag: d.tag, oc: d.oc,
    peajes: d.peajes, viaticos: d.viaticos, adicional: d.adicional,
    litros: d.litros, petroleo: d.petroleo, cfProrrateado: d.cfProrrateado,
    comisionConductor, cerrado: false, estado: 'borrador'
  });
  // Preservar valores en uiState para que no se borren al render
  const _s2 = appData.servicios[idx];
  uiState['cs_precio_'+id] = _s2.precio||'';
  uiState['cs_km_'+id] = _s2.km||'';
  uiState['cs_tag_'+id] = _s2.tag||'';
  uiState['cs_oc_'+id] = _s2.oc||'';
  uiState['cs_peajes_'+id] = _s2.peajes||'';
  uiState['cs_via_'+id] = _s2.viaticos||'';
  uiState['cs_adic_'+id] = _s2.adicional||'';
  uiState['cs_litros_'+id] = _s2.litros||'';
  uiState['cs_petroleo_'+id] = _s2.petroleo||'';
  uiState['cs_cf_'+id] = _s2.cfProrrateado||50800;
  saveData();
  await upsertServicioSupabase(appData.servicios[idx]);
  showToastGeneral('💾 Borrador guardado correctamente','#E65100');
  render();
}

async function guardarCierre(id) {
  const idx=appData.servicios.findIndex(s=>s.id===id);
  if(idx===-1)return;
  const d=_leerCamposCierre(id,idx);
  if(!d.precio) { alert('⚠️ El precio neto es obligatorio para cerrar el servicio.'); return; }
  if(!d.km) { if(!confirm('⚠️ Los kilómetros están en 0. ¿Deseas continuar de todas formas?')) return; }
  if(!d.petroleo && !d.litros) { if(!confirm('⚠️ El combustible está en 0. ¿Deseas continuar de todas formas?')) return; }
  if(!confirm(`¿Cerrar definitivamente el servicio ${id}?\nPrecio: $${d.precio.toLocaleString('es-CL')}\nEsta acción no se puede deshacer.`)) return;
  const comisionConductor=Math.round(d.precio*0.10);
  Object.assign(appData.servicios[idx],{
    precio: d.precio, km: d.km, tag: d.tag, oc: d.oc,
    peajes: d.peajes, viaticos: d.viaticos, adicional: d.adicional,
    litros: d.litros, petroleo: d.petroleo, cfProrrateado: d.cfProrrateado,
    comisionConductor, cerrado: true, estado: 'cerrado'
  });
  appData.dashboard.ventas_mes=(appData.servicios||[]).filter(s=>s.cerrado&&s.precio).reduce((a,s)=>a+(s.precio||0),0);
  uiState['cs_'+id]=false;
  saveData();
  await upsertServicioSupabase(appData.servicios[idx]);
  showToastGeneral('✅ Servicio cerrado correctamente','#2E7D32');
  render();
}

function agregarFotoServicio(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const MAX = 400;
      const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const idx = appData.servicios.findIndex(s=>s.id===id);
      if (idx === -1) return;
      if (!appData.servicios[idx].fotos) appData.servicios[idx].fotos = [];
      appData.servicios[idx].fotos.push(dataUrl);
      saveData();
      input.value = '';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function eliminarFotoServicio(id, fi) {
  const idx = appData.servicios.findIndex(s=>s.id===id);
  if (idx === -1) return;
  appData.servicios[idx].fotos.splice(fi, 1);
  saveData();
  render();
}

function nextRendicionId() {
  if (!appData.rendiciones) appData.rendiciones = [];
  if (!appData.facturas) appData.facturas = [];
  return 'REN-' + String(appData.rendiciones.length + 1).padStart(3,'0');
}

function agregarLineaRendicion() {
  if (!uiState.ren_lineas) uiState.ren_lineas = [];
  uiState.ren_lineas.push({fecha:'',categoria:'Combustible',descripcion:'',patente:'',monto:''});
  render();
}
function eliminarLineaRendicion(li) {
  if (!uiState.ren_lineas || uiState.ren_lineas.length <= 1) return;
  uiState.ren_lineas.splice(li,1);
  render();
}
function updLineaRen(li, campo, valor) {
  if (!uiState.ren_lineas) return;
  uiState.ren_lineas[li][campo] = valor;
}

function crearRendicion() {
  const responsable = document.getElementById('ren_responsable')?.value.trim();
  const descripcion = '';
  const fecha = document.getElementById('ren_fecha')?.value || new Date().toISOString().split('T')[0];
  if (!responsable) { alert('⚠️ Ingresa el nombre del responsable.'); return; }
  if (!uiState.ren_lineas || !uiState.ren_lineas.some(l=>l.monto)) { alert('⚠️ Agrega al menos una línea de gasto con monto.'); return; }
  if (!appData.rendiciones) appData.rendiciones = [];
  const p = fecha.split('-');
  const fechaStr = p.length===3&&p[0].length===4 ? `${p[2]}-${p[1]}-${p[0]}` : fecha;
  const lineas = uiState.ren_lineas.filter(l=>l.monto||l.descripcion).map(l=>({...l, monto: parseInt(l.monto)||0}));
  const total = lineas.reduce((a,l)=>a+(l.monto||0),0);
  const id = nextRendicionId();
  appData.rendiciones.push({ id, fecha: fechaStr, responsable, descripcion: descripcion||'', lineas, total, estado:'borrador', observaciones:'' });
  uiState.ren_lineas = [{fecha:'',categoria:'Combustible',descripcion:'',patente:'',monto:''}];
  uiState.ren_form_open = false; uiState.ren_preview = false; uiState.ren_ui_fecha=''; uiState.ren_ui_resp='';
  registrarAccion(`Crear rendición ${id}`, () => {
    appData.rendiciones = appData.rendiciones.filter(r=>r.id!==id);
  });
  saveData();
  upsertRendicionSupabase(appData.rendiciones[appData.rendiciones.length-1]);
  render();
  showToastGeneral('✅ '+id+' creada — Total: $'+total.toLocaleString('es-CL'),'#2E7D32');
}

function guardarObsRendicion(id) {
  const ren = (appData.rendiciones||[]).find(r=>r.id===id);
  if (!ren) return;
  ren.observaciones = document.getElementById('ren_obs_'+id)?.value||'';
  saveData();
  upsertRendicionSupabase(ren);
  showToastGeneral('💾 Observaciones guardadas','#607D8B');
}

function cambiarEstadoRendicion(id, estado) {
  const ren = (appData.rendiciones||[]).find(r=>r.id===id);
  if (!ren) return;
  ren.estado = estado;
  saveData();
  upsertRendicionSupabase(ren);
  render();
}

function eliminarRendicion(id) {
  if (!confirm(`¿Eliminar rendición ${id}? Esta acción no se puede deshacer.`)) return;
  appData.rendiciones = (appData.rendiciones||[]).filter(r=>r.id!==id);
  saveData(); render();
  showToastGeneral('Rendición eliminada','#607D8B');
}

function nextFacturaId() {
  if (!appData.facturas) appData.facturas = [];
  return 'FAC-' + String(appData.facturas.length + 1).padStart(3,'0');
}

function crearFactura() {
  const f = uiState.fac_form_data || {};
  const numero   = (document.getElementById('fac_numero')?.value || f.numero || '').trim();
  const fecha    = document.getElementById('fac_fecha')?.value || f.fecha || '';
  const clienteV = (document.getElementById('fac_cliente')?.value || f.cliente || '').trim();
  const liqId    = (document.getElementById('fac_liq')?.value || f.liq || '').trim();
  const montoNeto = parseInt(document.getElementById('fac_monto_neto')?.value || f.monto_neto) || 0;
  if (!numero)   { alert('⚠️ Ingresa el número de factura.'); return; }
  if (!fecha)    { alert('⚠️ Ingresa la fecha de emisión.'); return; }
  if (!clienteV) { alert('⚠️ Ingresa el cliente.'); return; }
  if (!montoNeto){ alert('⚠️ Ingresa el monto neto de la factura.'); return; }
  if (!appData.facturas) appData.facturas = [];
  const p=fecha.split('-');
  const fechaStr=p.length===3&&p[0].length===4?`${p[2]}-${p[1]}-${p[0]}`:fecha;
  const iva = Math.round(montoNeto * 0.19);
  const monto = montoNeto + iva;
  if ((appData.facturas||[]).some(x=>x.id===numero)) { alert('⚠️ Ya existe una factura con el número '+numero+'.'); return; }
  const id = numero;
  const factura = { id, numero, fecha:fechaStr, cliente:clienteV, liquidacionId:liqId||'', monto_neto:montoNeto, iva, monto, estado:'emitida', factoring:false, factoringEmpresa:'', factoringFechaAnticipo:'', factoringMonto:0, factoringComision:0, factoringFechaLiquidacion:'', observaciones:'' };
  appData.facturas.push(factura);
  uiState.fac_form_open = false;
  uiState.fac_form_data = {};
  saveData();
  upsertFacturaSupabase(factura);
  render();
  showToastGeneral('✅ '+id+' registrada — $'+monto.toLocaleString('es-CL'),'#2E7D32');
}

function cambiarEstadoFactura(id, estado) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.estado=estado;
  saveData(); upsertFacturaSupabase(f); render();
}

function toggleFactoring(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.factoring=!f.factoring;
  if (f.factoring && f.estado==='emitida') f.estado='en_factoring';
  saveData(); upsertFacturaSupabase(f); render();
}

function guardarFactoring(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  const ft = uiState['fac_ft_'+id] || {};
  const p=document.getElementById('fac_fact_fecha_'+id)?.value||ft.fecha_anticipo||'';
  const pStr=p?p.split('-').reverse().join('-'):'';
  const pl=document.getElementById('fac_fact_liq_'+id)?.value||ft.fecha_liq||'';
  const plStr=pl?pl.split('-').reverse().join('-'):'';
  const pv=document.getElementById('fac_fact_vcto_'+id)?.value||ft.fecha_vcto||'';
  const pvStr=pv?pv.split('-').reverse().join('-'):'';
  f.factoringEmpresa=document.getElementById('fac_fact_empresa_'+id)?.value||ft.empresa||f.factoringEmpresa;
  f.factoringFechaAnticipo=pStr||f.factoringFechaAnticipo;
  f.factoringFechaVencimiento=pvStr||f.factoringFechaVencimiento||'';
  f.factoringMonto=parseInt(document.getElementById('fac_fact_monto_'+id)?.value||ft.monto)||f.factoringMonto;
  f.factoringComision=parseInt(document.getElementById('fac_fact_comision_'+id)?.value||ft.comision)||f.factoringComision;
  f.factoringCostoOp=parseInt(document.getElementById('fac_fact_costo_op_'+id)?.value||ft.costo_op)||f.factoringCostoOp||0;
  f.factoringCostoMora=parseInt(document.getElementById('fac_fact_costo_mora_'+id)?.value||ft.costo_mora)||f.factoringCostoMora||0;
  f.factoringOtrosCostos=parseInt(document.getElementById('fac_fact_otros_'+id)?.value||ft.otros_costos)||f.factoringOtrosCostos||0;
  f.factoringMontoGirado=parseInt(document.getElementById('fac_fact_girado_'+id)?.value||ft.monto_girado)||f.factoringMontoGirado||0;
  f.factoringFechaLiquidacion=plStr||f.factoringFechaLiquidacion;
  delete uiState['fac_ft_'+id];
  saveData(); upsertFacturaSupabase(f);
  showToastGeneral('💾 Factoring guardado','#1565C0');
}

function guardarObsFactura(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.observaciones=document.getElementById('fac_obs_'+id)?.value||'';
  saveData(); upsertFacturaSupabase(f);
  showToastGeneral('💾 Observaciones guardadas','#607D8B');
}

function eliminarFactura(id) {
  if (!confirm('¿Eliminar factura '+id+'? Esta acción no se puede deshacer.')) return;
  appData.facturas=(appData.facturas||[]).filter(f=>f.id!==id);
  saveData(); render();
  if (supaConectado && supa) supa.from('facturas').delete().eq('id',id).then(()=>{});
  showToastGeneral('Factura eliminada','#607D8B');
}

async function pushCostosSupabase() {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('config_panel').upsert({
      id: 'costos',
      data: { costos: appData.costos||[], copec: appData.copec||[], cartola: appData.cartola||[] },
      updated_at: new Date().toISOString()
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error sync costos Supabase:', e); }
}

async function syncCostosDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('config_panel').select('*').eq('id','costos').single();
    if (!error && data?.data) {
      if (Array.isArray(data.data.costos)) appData.costos = data.data.costos;
      if (Array.isArray(data.data.copec)) appData.copec = data.data.copec;
      if (Array.isArray(data.data.cartola)) appData.cartola = data.data.cartola;
      saveData();
    }
  } catch(e) { console.warn('Error sync costos desde Supabase:', e); }
}

async function upsertRemuneracionSupabase(liq, empleadoId) {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('remuneraciones').upsert({
      id: liq.id,
      empleado_id: empleadoId,
      mes: liq.mes,
      anio: liq.anio,
      datos: liq,
      estado: liq.estado || 'pendiente',
      fecha_pago: liq.fechaPago || ''
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error upsert remuneración Supabase:', e); }
}
async function syncRemuneracionesDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('remuneraciones').select('*');
    if (!error && data && data.length > 0) {
      if (!appData.remuneraciones) appData.remuneraciones = JSON.parse(JSON.stringify(DEFAULT_DATA.remuneraciones));
      data.forEach(row => {
        const emp = (appData.remuneraciones||[]).find(e => e.id === row.empleado_id);
        if (emp) {
          if (!emp.liquidaciones) emp.liquidaciones = [];
          const idx = emp.liquidaciones.findIndex(l => l.id === row.id);
          if (idx >= 0) emp.liquidaciones[idx] = row.datos;
          else emp.liquidaciones.push(row.datos);
        }
      });
      saveData();
    }
  } catch(e) { console.warn('Error sync remuneraciones desde Supabase:', e); }
}

  const p = f.fecha.split('-');
  const mes = p.length===3 ? (p[0].length===4 ? p[1] : p[1]) : String(new Date().getMonth()+1).padStart(2,'0');
  const anio = p.length===3 ? (p[0].length===4 ? p[0] : p[2]) : String(new Date().getFullYear());

function leerImagenCopec(input) {
  const apiKey = appData.config && appData.config.anthropicApiKey;
  if (!apiKey) { showToastGeneral('⚠️ Configura tu API key de Anthropic en Ajustes para usar lectura automática','#E65100'); return; }
  const file = input.files[0]; if (!file) return;
  showToastGeneral('🔍 Analizando imagen...','#1565C0');
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const base64 = e.target.result.split(',')[1];
      const resp = await fetch('https://api.anthropic.com/v1/messages', { method:'POST', headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json'}, body:JSON.stringify({ model:'claude-opus-4-6', max_tokens:256, messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:base64}},{type:'text',text:'Imagen de carga COPEC. Extrae: patente, fecha (DD-MM-YYYY), litros, monto en pesos chilenos. Responde SOLO JSON: {"patente":"","fecha":"","litros":0,"monto":0}'}]}] }) });
      const data = await resp.json();
      const json = JSON.parse(data.content[0].text.match(/\{[\s\S]*\}/)[0]);

  };

// Columnas esperadas: Fecha | Empresa | Monto neto | Equipo | Categoría | Tipo | Descripción
function importarCostosDesdeExcel(input) {
  const file = input.files[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { showToastGeneral('⚠️ Librería Excel no disponible, recarga la página','#E65100'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      const dataRows = (rows[0] && typeof rows[0][0]==='string' && isNaN(rows[0][0])) ? rows.slice(1) : rows;
      const hoy = new Date();
      const preview = [];
      dataRows.forEach((row) => {
        if (!row || row.every(c=>!c)) return;
        const fechaRaw = String(row[0]||'').trim();
        const empresa  = String(row[1]||'').trim();
        const montoRaw = parseFloat(String(row[2]||'').replace(/\./g,'').replace(',','.')) || 0;
        const equipo   = String(row[3]||'flota_completa').trim() || 'flota_completa';
        const categoria= String(row[4]||'administrativo').trim().toLowerCase() || 'administrativo';
        const tipoCosto= String(row[5]||'').trim();
        const desc     = String(row[6]||'').trim();
        if (!empresa && !montoRaw) return;
        let fecha = fechaRaw.includes('/') ? fechaRaw.replace(/\//g,'-') : fechaRaw;
        if (/^\d{5}$/.test(fecha)) { const d=new Date((parseInt(fecha)-25569)*86400*1000); fecha=`${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
        if (!fecha) fecha=`${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
        const p=fecha.split('-');
        const mes=p.length===3?(p[0].length===4?p[1]:p[1]):String(hoy.getMonth()+1).padStart(2,'0');
        const anio=p.length===3?(p[0].length===4?p[0]:p[2]):String(hoy.getFullYear());
        const montoNeto=Math.round(montoRaw);
        preview.push({ id:_genIdCosto(), fecha, empresa:empresa||'(sin nombre)', monto_neto:montoNeto, iva:Math.round(montoNeto*0.19), total:montoNeto+Math.round(montoNeto*0.19), equipo, categoria, tipo_costo:tipoCosto, descripcion:desc, mes, anio });
      });
      if (!preview.length) { showToastGeneral('⚠️ No se encontraron datos válidos en el Excel','#E65100'); return; }
      uiState.costosExcelPreview = preview;
      uiState.costoTab = 'historial';
      render();
    } catch(err) { showToastGeneral('❌ Error leyendo Excel: '+err.message,'#C62828'); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── PARSER COMPARTIDO CARTOLA BANCARIA ───────────────────────────────────────
function _parsearArchivoBancario(rows) {
  if (!rows || !rows.length) return [];
  // Detectar fila de encabezado (primera con texto)
  var headerIdx = 0;
  for (var i = 0; i < Math.min(8, rows.length); i++) {
    if (rows[i].some(function(c){ return typeof c==='string' && c.trim().length>1; })) { headerIdx=i; break; }
  }
  var norm = function(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); };
  var header = rows[headerIdx].map(norm);
  // Detección por nombre (partial match)
  var findCol = function(terms, skip) {
    for (var ti=0;ti<terms.length;ti++) {
      for (var hi=0;hi<header.length;hi++) {
        if (hi===skip) continue;
        if (header[hi]===terms[ti]||header[hi].includes(terms[ti])) return hi;
      }
    }
    return -1;
  };
  var iF  = findCol(['fecha'],-1); if (iF<0)  iF=0;
  var iG  = findCol(['descripcion','glosa','detalle','concepto'],-1); if (iG<0) iG=1;
  var iGD = findCol(['glosa','detalle'],iG); // segunda columna con "glosa" o "detalle"
  var iEg = findCol(['cargo','debito','egreso'],-1); if (iEg<0) iEg=2;
  var iIn = findCol(['abono','credito','ingreso'],-1); if (iIn<0) iIn=3;
  var iSa = findCol(['saldo'],-1); if (iSa<0) iSa=4;
  var iCT = findCol(['comentario','referencia'],-1);
  var parseNum = function(v) {
    return Math.abs(parseFloat(String(v||'').replace(/\s/g,'').replace(/\./g,'').replace(',','.'))||0);
  };
  var parseDate = function(v) {
    if (typeof v==='number' && v>40000) {
      var d=new Date((v-25569)*86400*1000);
      return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
    }
    var s=String(v||'').trim().replace(/\//g,'-');
    return s;
  };
  var getMesAnio = function(fecha) {
    var p=String(fecha||'').split('-'); var hoy=new Date();
    if (p.length===3&&p[0].length===4) return {mes:p[1],anio:p[0]};
    if (p.length===3&&p[2].length===4) return {mes:p[1],anio:p[2]};
    return {mes:String(hoy.getMonth()+1).padStart(2,'0'),anio:String(hoy.getFullYear())};
  };
  var items=[]; var ts=Date.now(); var cnt=0;
  rows.slice(headerIdx+1).forEach(function(row) {
    if (!row||!row.length) return;
    var fecha=parseDate(row[iF]);
    if (!fecha||fecha.length<4||fecha==='-') return; // requiere fecha válida
    var glosa   = norm(row[iG]) ? String(row[iG]||'').trim() : '';
    var glosaD  = iGD>=0 ? String(row[iGD]||'').trim() : '';
    var egreso  = parseNum(row[iEg]);
    var ingreso = parseNum(row[iIn]);
    var saldo   = parseNum(row[iSa]);
    var coment  = iCT>=0 ? String(row[iCT]||'').trim() : '';
    // Glosa completa = glosa principal + detalle si existe
    var glosaFull = glosa+(glosaD&&glosaD!==glosa?' | '+glosaD:'');
    var tipo=ingreso>0?'Abono':'Cargo';
    var ma=getMesAnio(fecha); cnt++;
    items.push({
      id:'car_'+ts+'_'+(cnt)+'_'+Math.random().toString(36).substr(2,4),
      fecha:fecha, mes:ma.mes, anio:ma.anio,
      glosa:glosaFull, tipo:tipo,
      ingreso:ingreso, egreso:egreso, saldo:saldo,
      nombre:coment, comentario:'', categoria:'', equipo:'', revisado:false
    });
  });
  return items;
}

function _genIdLiqRem(empId, mes, anio) { return `${empId}-${mes}-${anio}`; }

function _getLiqRem(empId, mes, anio) {
  const emp = (appData.remuneraciones||[]).find(e=>e.id===empId);
  if (!emp) return null;
  return (emp.liquidaciones||[]).find(l=>l.mes===mes&&l.anio===anio) || null;
}

function _getOrCreateLiqRem(empId, mes, anio) {
  const emp = (appData.remuneraciones||[]).find(e=>e.id===empId);
  if (!emp) return null;
  if (!emp.liquidaciones) emp.liquidaciones = [];
  let liq = emp.liquidaciones.find(l=>l.mes===mes&&l.anio===anio);
  if (!liq) {
    liq = { id:_genIdLiqRem(empId,mes,anio), mes, anio, sueldoBase:0, horasExtra:0, bono:0, comision:0, descuentos:0, afp:0, salud:0,
      anticipos:[{numero:1,fecha:'',monto:0},{numero:2,fecha:'',monto:0},{numero:3,fecha:'',monto:0},{numero:4,fecha:'',monto:0}],
      totalAnticipos:0, totalHaberes:0, totalDescuentos:0, liquidoAPagar:0, estado:'pendiente', fechaPago:'', observaciones:'' };
    emp.liquidaciones.push(liq);
  }
  return liq;
}

function guardarLiquidacionRem() {
  const empId = uiState.remEmpId;
  const mes   = uiState.remMes  || String(new Date().getMonth()+1).padStart(2,'0');
  const anio  = uiState.remAnio || String(new Date().getFullYear());
  const f     = uiState.remForm || {};
  const emp   = (appData.remuneraciones||[]).find(e=>e.id===empId);
  if (!emp) return;
  if (!emp.liquidaciones) emp.liquidaciones = [];
  const sueldoBase  = parseInt(f.sueldoBase)||0;
  const horasExtra  = parseInt(f.horasExtra)||0;
  const bono        = parseInt(f.bono)||0;
  const comision    = parseInt(f.comision)||0;
  const afp         = parseInt(f.afp)||0;
  const salud       = parseInt(f.salud)||0;
  const descuentos  = parseInt(f.descuentos)||0;
  const ants = [1,2,3,4].map(n=>({ numero:n, fecha:(f['ant'+n+'fecha']||''), monto:parseInt(f['ant'+n+'monto'])||0 }));
  const totalHaberes    = sueldoBase + horasExtra + bono + comision;
  const totalDescuentos = afp + salud + descuentos;
  const totalAnticipos  = ants.reduce((a,x)=>a+x.monto,0);
  const liquidoAPagar   = totalHaberes - totalDescuentos;
  const liqId = _genIdLiqRem(empId, mes, anio);
  const idx = emp.liquidaciones.findIndex(l=>l.id===liqId);
  const correlativo = (idx>=0 && emp.liquidaciones[idx].correlativo) ? emp.liquidaciones[idx].correlativo : _genCorrelativoRem(mes, anio);
  uiState.remCreando = true;
  const liq = { id:liqId, correlativo, mes, anio, sueldoBase, horasExtra, bono, comision, afp, salud, descuentos,
    anticipos:ants, totalAnticipos, totalHaberes, totalDescuentos, liquidoAPagar,
    estado: f.estado||'pendiente', fechaPago: f.fechaPago||'', observaciones: f.observaciones||'' };
  if (idx>=0) emp.liquidaciones[idx]=liq; else emp.liquidaciones.push(liq);
  saveData();
  upsertRemuneracionSupabase(liq, empId);
  showToastGeneral('✅ Liquidación guardada','#2E7D32');
  render();
}

function marcarPagadaRem(empId, mes, anio) {
  const emp=(appData.remuneraciones||[]).find(e=>e.id===empId); if(!emp)return;
  const liq=emp.liquidaciones.find(l=>l.mes===mes&&l.anio===anio); if(!liq)return;
  liq.estado='pagado'; liq.fechaPago=new Date().toLocaleDateString('es-CL');
  saveData(); upsertRemuneracionSupabase(liq,empId);
  showToastGeneral('✅ Marcada como pagada','#2E7D32'); render();
}

function abrirFormRem(empId) {
  const mes  = uiState.remMes  || String(new Date().getMonth()+1).padStart(2,'0');
  const anio = uiState.remAnio || String(new Date().getFullYear());
  const liq  = _getLiqRem(empId, mes, anio);
  uiState.remEmpId = empId;
  uiState.remCreando = !!liq;
  if (liq) {
    uiState.remForm = { sueldoBase:liq.sueldoBase, horasExtra:liq.horasExtra, bono:liq.bono, comision:liq.comision,
      afp:liq.afp, salud:liq.salud, descuentos:liq.descuentos,
      ant1fecha:liq.anticipos[0]?.fecha||'', ant1monto:liq.anticipos[0]?.monto||0,
      ant2fecha:liq.anticipos[1]?.fecha||'', ant2monto:liq.anticipos[1]?.monto||0,
      ant3fecha:liq.anticipos[2]?.fecha||'', ant3monto:liq.anticipos[2]?.monto||0,
      ant4fecha:liq.anticipos[3]?.fecha||'', ant4monto:liq.anticipos[3]?.monto||0,
      estado:liq.estado, fechaPago:liq.fechaPago, observaciones:liq.observaciones };
  } else {
    uiState.remForm = {};
  }
  render();
}

function cerrarFormRem() { uiState.remEmpId=null; uiState.remForm={}; uiState.remCreando=false; render(); }

function _onRemMesChange(tipo, valor) {
  if (tipo==='mes') uiState.remMes=valor; else uiState.remAnio=valor;
  uiState.remCreando = false;
  if (uiState.remEmpId) {
    const mes  = uiState.remMes  || String(new Date().getMonth()+1).padStart(2,'0');
    const anio = uiState.remAnio || String(new Date().getFullYear());
    const liq  = _getLiqRem(uiState.remEmpId, mes, anio);
    if (liq) {
      uiState.remCreando = true;
      uiState.remForm = { sueldoBase:liq.sueldoBase, horasExtra:liq.horasExtra, bono:liq.bono, comision:liq.comision,
        afp:liq.afp, salud:liq.salud, descuentos:liq.descuentos,
        ant1fecha:liq.anticipos[0]?.fecha||'', ant1monto:liq.anticipos[0]?.monto||0,
        ant2fecha:liq.anticipos[1]?.fecha||'', ant2monto:liq.anticipos[1]?.monto||0,
        ant3fecha:liq.anticipos[2]?.fecha||'', ant3monto:liq.anticipos[2]?.monto||0,
        ant4fecha:liq.anticipos[3]?.fecha||'', ant4monto:liq.anticipos[3]?.monto||0,
        estado:liq.estado, fechaPago:liq.fechaPago, observaciones:liq.observaciones };
    } else {
      uiState.remForm = {};
    }
  } else {
    uiState.remForm = {};
  }
  render();
}

function _cargarMesHistorial(empId, mes, anio) {
  uiState.remMes = mes; uiState.remAnio = anio; uiState.remCreando = true;
  const liq = _getLiqRem(empId, mes, anio);
  if (liq) {
    uiState.remForm = { sueldoBase:liq.sueldoBase, horasExtra:liq.horasExtra, bono:liq.bono, comision:liq.comision,
      afp:liq.afp, salud:liq.salud, descuentos:liq.descuentos,
      ant1fecha:liq.anticipos[0]?.fecha||'', ant1monto:liq.anticipos[0]?.monto||0,
      ant2fecha:liq.anticipos[1]?.fecha||'', ant2monto:liq.anticipos[1]?.monto||0,
      ant3fecha:liq.anticipos[2]?.fecha||'', ant3monto:liq.anticipos[2]?.monto||0,
      ant4fecha:liq.anticipos[3]?.fecha||'', ant4monto:liq.anticipos[3]?.monto||0,
      estado:liq.estado, fechaPago:liq.fechaPago, observaciones:liq.observaciones };
  } else { uiState.remForm = {}; }
  render();
}

function _genCorrelativoRem(mes, anio) {
  let total = 0;
  (appData.remuneraciones||[]).forEach(emp=>{
    (emp.liquidaciones||[]).forEach(l=>{ if(l.correlativo) total++; });
  });
  return 'LIQ-REM-'+mes+'-'+anio+'-'+String(total+1).padStart(3,'0');
}

          <div style="font-size:9px;font-weight:700;color:#546E7A;margin-bottom:3px">ESTADO</div>

      <div style="font-size:9px;font-weight:700;color:#546E7A;margin-bottom:3px">OBSERVACIONES</div>

    </div>

    <!-- MOVIMIENTOS CARTOLA VINCULADOS -->
    ${(function(){
      var empNombre = emp.nombre || '';
      var palabras = empNombre.toLowerCase().split(' ').filter(function(p){ return p.length > 2; });
      var movs = (appData.cartola||[]).filter(function(c){
        if (c.mes !== remMes || c.anio !== remAnio) return false;
        var glosa   = (c.glosa  ||'').toLowerCase();
        var nombre  = (c.nombre ||'').toLowerCase();
        var categ   = (c.categoria||'').toLowerCase();
        var coincideNombre = palabras.some(function(p){ return glosa.includes(p) || nombre.includes(p); });
        var coincideCateg  = categ === 'remuneraciones';
        return coincideNombre || (coincideCateg && nombre.includes(palabras[0]||'___'));
      });
      if (!movs.length) return '<div style="margin-top:10px;padding:10px;background:#F9F9F9;border:1px dashed #ddd;border-radius:8px;text-align:center;font-size:10px;color:#aaa">Sin movimientos de cartola vinculados para este período</div>';
      var totalEg = movs.reduce(function(a,c){ return a+(c.egreso||0); },0);
      var totalIn = movs.reduce(function(a,c){ return a+(c.ingreso||0); },0);
      var filas = movs.map(function(c){
        var monto = c.egreso ? '-$'+c.egreso.toLocaleString('es-CL') : '+$'+(c.ingreso||0).toLocaleString('es-CL');
        var color = c.egreso ? '#C62828' : '#2E7D32';
        return '<div style="display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0">'
          +'<div style="font-size:9px;color:#888;white-space:nowrap">'+( c.fecha||'' )+'</div>'
          +'<div style="font-size:10px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(c.glosa||'')+'">'+( c.glosa||'' )+'</div>'
          +'<div style="font-size:11px;font-weight:700;color:'+color+';white-space:nowrap">'+monto+'</div>'
          +'</div>';
      }).join('');
      return '<div style="margin-top:12px;background:#EDE7F6;border-radius:10px;padding:12px">'
        +'<div style="font-size:10px;font-weight:800;color:#4A148C;letter-spacing:0.5px;margin-bottom:8px;border-bottom:2px solid #CE93D8;padding-bottom:4px">CARTOLA VINCULADA — '+mesLabelRem+'</div>'
        + filas
        +'<div style="margin-top:6px;display:flex;justify-content:space-between;padding:5px 0">'
        +(totalIn>0?'<span style="font-size:10px;font-weight:700;color:#2E7D32">Ingresos: +$'+totalIn.toLocaleString('es-CL')+'</span>':'<span></span>')
        +(totalEg>0?'<span style="font-size:10px;font-weight:700;color:#C62828">Egresos: -$'+totalEg.toLocaleString('es-CL')+'</span>':'<span></span>')
        +'</div></div>';
    })()}
    ${_histHtml}`;
  }

  // ── VISTA LISTA ──
  const totalMes = empleados.filter(e=>e.activo).reduce((a,emp)=>{
    const liq=_getLiqRem(emp.id,remMes,remAnio); return a+(liq?liq.liquidoAPagar:0); }, 0);
  const mesLabel = `${MNOMBRES[parseInt(remMes)-1]} ${remAnio}`;

  return `
  ${mesSel}
  <div style="padding:6px 10px;background:#E3F2FD;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:10px;font-weight:700;color:#1565C0">${mesLabel} · ${empleados.filter(e=>e.activo).length} empleados activos</span>
    <span style="font-size:12px;font-weight:900;color:#0B2545">Total: $${totalMes.toLocaleString('es-CL')}</span>
  </div>
  ${empleados.filter(e=>e.activo).map(emp=>{
    const liq = _getLiqRem(emp.id, remMes, remAnio);
    const liquido  = liq ? liq.liquidoAPagar  : 0;
    const anticipos= liq ? liq.totalAnticipos : 0;
    const saldo    = liquido - anticipos;
    const pagado   = liq && liq.estado==='pagado';
    return `<div style="background:white;border:1px solid ${pagado?'#A5D6A7':'#e0e0e0'};border-left:4px solid ${pagado?'#2E7D32':'#0B2545'};border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <div style="font-size:12px;font-weight:800;color:#0B2545">${emp.nombre}</div>
          <div style="font-size:10px;color:#777">${emp.cargo} · ${emp.area}</div>
        </div>
        <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:${pagado?'#E8F5E9':'#FFF3E0'};color:${pagado?'#2E7D32':'#E65100'}">${pagado?'✅ Pagado':'⏳ Pendiente'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
        <div style="background:#F4F6F8;border-radius:7px;padding:6px;text-align:center">
          <div style="font-size:8px;font-weight:700;color:#888">LÍQUIDO</div>
          <div style="font-size:12px;font-weight:900;color:#0B2545">${liquido>0?'$'+liquido.toLocaleString('es-CL'):'—'}</div>
        </div>
        <div style="background:#FFF3E0;border-radius:7px;padding:6px;text-align:center">
          <div style="font-size:8px;font-weight:700;color:#888">ANTICIPOS</div>
          <div style="font-size:12px;font-weight:900;color:#E65100">${anticipos>0?'$'+anticipos.toLocaleString('es-CL'):'—'}</div>
        </div>
        <div style="background:${saldo>=0?'#E8F5E9':'#FFEBEE'};border-radius:7px;padding:6px;text-align:center">
          <div style="font-size:8px;font-weight:700;color:#888">SALDO</div>
          <div style="font-size:12px;font-weight:900;color:${saldo>=0?'#2E7D32':'#C62828'}">${liq?(saldo>=0?'$'+saldo.toLocaleString('es-CL'):'−$'+Math.abs(saldo).toLocaleString('es-CL')):'—'}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <button onclick="abrirFormRem('${emp.id}')" style="padding:8px;background:${liq?'#0B2545':'#1565C0'};color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">${liq?'✏️ Ver / Editar':'+ Crear liquidación'}</button>
        ${liq?`<button onclick="imprimirLiquidacionRem('${emp.id}','${remMes}','${remAnio}')" style="padding:8px;background:#546E7A;color:white;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">🖨️ PDF</button>`:'<span></span>'}
      </div>
    </div>`;
  }).join('')}`;
}

// ─── PDF LIQUIDACIÓN REMUNERACIÓN ─────────────────────────────────────────────
function imprimirLiquidacionRem(empId, remMes, remAnio) {
  const MNOMBRES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const emp = (appData.remuneraciones||[]).find(e=>e.id===empId);
  if (!emp) return alert('Empleado no encontrado');
  const liq = _getLiqRem(empId, remMes, remAnio);
  if (!liq) return alert('Guarda la liquidación antes de generar el PDF');
  const mesLabel = `${MNOMBRES[parseInt(remMes)-1]} ${remAnio}`;
  const hoyFmt = new Date().toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'});
  const nCorr = liq.correlativo || `LIQ-REM-${remMes}-${remAnio}-${empId}`;
  const ants = (liq.anticipos||[]).filter(a=>a.monto>0);
  const antFilas = ants.map(a=>`<tr><td>Anticipo ${a.numero}${a.fecha?' — '+a.fecha:''}</td><td class="r">$${a.monto.toLocaleString('es-CL')}</td></tr>`).join('');

    <title>Liquidación ${emp.nombre} — ${mesLabel}</title>

      @media print{body{padding:0}}

      .logo{font-size:22px;font-weight:900;color:#0B2545;letter-spacing:0.5px}
      .logo .sub{font-size:10px;color:#546E7A;font-weight:400;display:block;margin-top:2px}

      .emp-box{background:#F4F6F8;border-left:4px solid #0B2545;padding:8px 12px;margin-bottom:14px;border-radius:3px}
      .emp-box .nm{font-size:14px;font-weight:900;color:#0B2545}
      .emp-box .inf{font-size:9px;color:#546E7A;margin-top:2px}
      .section-title{font-size:10px;font-weight:900;color:#0B2545;letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase}
      table{width:100%;border-collapse:collapse;margin-bottom:12px}
      th{background:#0B2545;color:white;padding:7px 10px;font-size:9px;font-weight:800;text-align:left}
      th.r{text-align:right}
      td{padding:6px 10px;border-bottom:1px solid #E8EDF3;font-size:9.5px}
      td.r{text-align:right;font-weight:700}
      tr.total td{background:#E8EDF3;font-weight:800;font-size:10px}
      tr.total td.r{color:#0B2545}
      .hab-desc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
      .resumen{background:#0B2545;color:white;padding:14px 16px;border-radius:6px;margin-bottom:14px}
      .resumen .row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px}
      .resumen .row span:last-child{font-weight:700}
      .resumen .sep{border-top:1px solid rgba(255,255,255,0.2);margin:8px 0}
      .resumen .big{font-size:15px;font-weight:900}
      .resumen .saldo{font-size:22px;font-weight:900}
      .obs{background:#F4F6F8;padding:10px 12px;border-radius:4px;font-size:9.5px;color:#546E7A;margin-bottom:14px}
      .firmas{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:20px}

      .firma-line .label{font-size:9px;font-weight:700;color:#0B2545}
      .firma-line .name{font-size:10px;color:#333;margin-top:2px}
      .firma-line .sub{font-size:8.5px;color:#777;margin-top:1px}
      .footer{text-align:center;font-size:8px;color:#aaa;border-top:1px solid #eee;padding-top:8px;margin-top:16px}
    </style>
  </head><body>
    <div class="header">
      <div class="logo">Global Solutions SpA<span class="sub">Transporte de Carga · RUT: ___________</span></div>
      <div class="meta">
        <div class="title">LIQUIDACIÓN DE SUELDO</div>
        <div class="row">N° ${nCorr}</div>

            <tr><td>AFP</td><td class="r">$${liq.afp.toLocaleString('es-CL')}</td></tr>
            <tr><td>Salud</td><td class="r">$${liq.salud.toLocaleString('es-CL')}</td></tr>
            ${liq.descuentos>0?`<tr><td>Otros descuentos</td><td class="r">$${liq.descuentos.toLocaleString('es-CL')}</td></tr>`:''}
            <tr class="total"><td>TOTAL DESCUENTOS</td><td class="r">$${liq.totalDescuentos.toLocaleString('es-CL')}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    ${ants.length>0?`<div class="section-title">Anticipos</div>
    <table><thead><tr><th>Detalle</th><th class="r">Monto</th></tr></thead>
    <tbody>${antFilas}<tr class="total"><td>TOTAL ANTICIPOS</td><td class="r">$${liq.totalAnticipos.toLocaleString('es-CL')}</td></tr></tbody></table>`:''}
    <div class="resumen">
      <div class="row"><span>Total haberes</span><span>$${liq.totalHaberes.toLocaleString('es-CL')}</span></div>
      <div class="row"><span>Total descuentos</span><span style="color:#EF9A9A">−$${liq.totalDescuentos.toLocaleString('es-CL')}</span></div>
      <div class="sep"></div>
      <div class="row"><span class="big">Líquido a pagar</span><span class="big" style="color:#81C784">$${liq.liquidoAPagar.toLocaleString('es-CL')}</span></div>
      <div class="row"><span>Total anticipos</span><span style="color:#FFD54F">−$${liq.totalAnticipos.toLocaleString('es-CL')}</span></div>
      <div class="sep"></div>
      <div class="row"><span class="saldo">SALDO FINAL A PAGAR</span><span class="saldo" style="color:${(liq.liquidoAPagar-liq.totalAnticipos)>=0?'#81C784':'#EF9A9A'}">$${Math.abs(liq.liquidoAPagar-liq.totalAnticipos).toLocaleString('es-CL')}</span></div>
      ${liq.estado==='pagado'?`<div class="row" style="margin-top:8px"><span style="opacity:0.7">Fecha de pago</span><span style="color:#81C784">${liq.fechaPago}</span></div>`:''}
    </div>
    ${liq.observaciones?`<div class="obs"><strong>Observaciones:</strong> ${liq.observaciones}</div>`:''}
    <div class="firmas">

        </div>

        <div class="firma-line">
          <div class="label">Firma Empleador</div>
          <div class="name">Global Solutions SpA</div>
          <div class="sub">Fecha: ${hoyFmt}</div>

    <script>window.onload=function(){window.print();}<\/script>
  </body></html>`;
  const w = window.open('','_blank');
  if (w) { w.document.write(html); w.document.close(); }
}

// ─── TAB COPEC ────────────────────────────────────────────────────────────────
function _costoTabCopec(mes, anio, flota) {
  const f = uiState.copecForm || {};
  const apiKey = appData.config && appData.config.anthropicApiKey;
  const copecMes = (appData.copec||[]).filter(c=>c.mes===mes&&c.anio===anio);

      <button onclick="document.getElementById('copec_img_cam').click()" style="padding:9px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">📷 Tomar foto</button>
      <button onclick="document.getElementById('copec_img_lib').click()" style="padding:9px;background:#F3E5F5;color:#6A1B9A;border:1px solid #E1BEE7;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">🖼️ Elegir imagen</button>
    </div>

  <div style="background:#F8F9FA;border-radius:10px;padding:12px;margin-bottom:10px">

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">

        <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:3px">LITROS</div>

  ${copecMes.length?`

// ─── CARTOLA SUPABASE ─────────────────────────────────────────────────────────
// SQL (ejecutar en Supabase si la tabla no existe):
// CREATE TABLE IF NOT EXISTS cartola (
//   id TEXT PRIMARY KEY, fecha TEXT DEFAULT '', tipo TEXT DEFAULT '',
//   glosa TEXT DEFAULT '', ingreso NUMERIC DEFAULT 0, egreso NUMERIC DEFAULT 0,
//   saldo NUMERIC DEFAULT 0, nombre TEXT DEFAULT '', comentario TEXT DEFAULT '',
//   categoria TEXT DEFAULT '', equipo TEXT DEFAULT '',
//   revisado BOOLEAN DEFAULT false, mes TEXT DEFAULT '', anio TEXT DEFAULT '',
//   created_at TIMESTAMP DEFAULT NOW()
// );
// ALTER TABLE cartola ADD COLUMN IF NOT EXISTS revisado BOOLEAN DEFAULT false;
// ALTER TABLE cartola ADD COLUMN IF NOT EXISTS mes TEXT DEFAULT '';
// ALTER TABLE cartola ADD COLUMN IF NOT EXISTS anio TEXT DEFAULT '';

async function upsertCartolaSupabase(tx) {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('cartola').upsert({
      id:          tx.id,
      fecha:       tx.fecha       || '',
      tipo:        tx.tipo        || '',
      glosa:       tx.glosa       || '',
      ingreso:     tx.ingreso     || 0,
      egreso:      tx.egreso      || 0,
      saldo:       tx.saldo       || 0,
      nombre:      tx.nombre      || '',
      comentario:  tx.comentario  || '',
      categoria:   tx.categoria   || '',
      equipo:      tx.equipo      || '',
      revisado:    tx.revisado    || false,
      mes:         tx.mes         || '',
      anio:        tx.anio        || '',
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error upsert cartola Supabase:', e); }
}

async function upsertCartolaRowsSupabase(rows) {
  if (!rows || !rows.length) return;
  for (var i = 0; i < rows.length; i++) {
    await upsertCartolaSupabase(rows[i]);
  }
}

async function syncCartolaDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    var result = await supa.from('cartola').select('*').order('fecha');
    if (!result.error && result.data && result.data.length > 0) {
      appData.cartola = result.data.map(function(r) {
        return {
          id:         r.id,
          fecha:      r.fecha      || '',
          tipo:       r.tipo       || '',
          glosa:      r.glosa      || '',
          ingreso:    r.ingreso    || 0,
          egreso:     r.egreso     || 0,
          saldo:      r.saldo      || 0,
          nombre:     r.nombre     || '',
          comentario: r.comentario || '',
          categoria:  r.categoria  || '',
          equipo:     r.equipo     || '',
          revisado:   r.revisado   || false,
          mes:        r.mes        || '',
          anio:       r.anio       || '',
        };
      });
      saveData();
    }
  } catch(e) { console.warn('Error sync cartola desde Supabase:', e); }
}

// ─── CATEGORIZACIÓN IA ────────────────────────────────────────────────────────
async function categorizarConIA() {
  var apiKey = appData.config && appData.config.anthropicApiKey;
  if (!apiKey) { showToastGeneral('⚠️ Configura tu API key de Anthropic en Ajustes','#E65100'); return; }
  var sinCat = (appData.cartola||[]).filter(function(t){ return !t.categoria || t.categoria===''; });
  if (!sinCat.length) { showToastGeneral('✅ Todas las transacciones ya tienen categoría','#2E7D32'); return; }
  var lotes = [];
  for (var i=0; i<sinCat.length; i+=20) lotes.push(sinCat.slice(i,i+20));
  var resumen = sinCat.length+' transacciones sin categoría\nLotes: '+lotes.length+' (máx 20 c/u)\n\n¿Continuar?';
  if (!confirm('🤖 Categorizar con IA\n\n'+resumen)) return;
  uiState.categorizandoIA = true; render();
  var categorizados = 0;
  for (var li=0; li<lotes.length; li++) {
    var lote = lotes[li];
    try {
      var resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:2000,
          messages:[{role:'user',content:
            'Eres un categorizador de transacciones bancarias para Global Solutions SpA, empresa de transporte de carga agroindustrial Chile.\n\n'+
            'Flota: GKFD84, WR9192, XR8555, GCFF12, BPBL35, XA1114, DSDV36\n\n'+
            'Categorías disponibles:\n'+CATEGORIAS_CARTOLA.join(', ')+'\n\n'+
            'Para cada transacción asigna:\n'+
            '1. categoria: una de las categorías listadas\n'+
            '2. equipo: patente si el gasto es de un equipo específico, "Distribución" si es de toda la flota, "N/A" si no aplica\n\n'+
            'Transacciones a categorizar:\n'+
            JSON.stringify(lote.map(function(t){return {id:t.id,glosa:t.glosa,nombre:t.nombre,comentario:t.comentario,ingreso:t.ingreso,egreso:t.egreso};}))+
            '\n\nResponde SOLO con JSON array sin markdown:\n[{"id":"...","categoria":"...","equipo":"..."}]'
          }]
        })
      });
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      var json = await resp.json();
      var txt = json.content[0].text.trim().replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'');
      var resultados = JSON.parse(txt);
      resultados.forEach(function(r){
        var idx = (appData.cartola||[]).findIndex(function(t){return t.id===r.id;});
        if (idx!==-1) {
          appData.cartola[idx].categoria = r.categoria||'';
          appData.cartola[idx].equipo = r.equipo||'N/A';
          appData.cartola[idx].revisado = false;
          categorizados++;
        }
      });
    } catch(err) { console.warn('Error lote IA cartola lote '+li+':', err); }
  }
  uiState.categorizandoIA = false;
  saveData();
  // sync por fila para no sobreescribir datos de otros con blob completo
  var categorizadas = (appData.cartola||[]).filter(function(t){return t.categoria;});
  upsertCartolaRowsSupabase(categorizadas);
  showToastGeneral('✅ '+categorizados+' transacciones categorizadas con IA','#2E7D32');
  render();
}

// ─── CARTOLA INFORMES ─────────────────────────────────────────────────────────
function _cartolaInformes() {
  var toda    = (appData.cartola||[]).filter(function(c){return c.revisado;});
  var inpS    = 'width:100%;padding:5px 7px;border:1px solid #dde;border-radius:6px;font-size:11px;background:white;box-sizing:border-box';
  var fDesde  = uiState.cInfDesde || '';
  var fHasta  = uiState.cInfHasta || '';
  var fCat    = uiState.cInfCat   || '';
  var fEq     = uiState.cInfEq    || '';

  if (!toda.length) return `
  <div style="border-top:2px solid #E8EAF6;margin-top:14px;padding-top:10px">
    <div style="font-size:11px;font-weight:800;color:#37474F;margin-bottom:6px">📊 INFORMES</div>
    <div style="text-align:center;color:#aaa;font-size:11px;padding:14px">Sin transacciones revisadas — marca como revisadas para generar informes</div>
  </div>`;

  function parseFechaNum(s) {
    if (!s) return 0;
    var p = String(s).replace(/\//g,'-').split('-');
    if (p.length !== 3) return 0;
    return p[0].length===2 ? parseInt(p[2]+p[1]+p[0]) : parseInt(p[0]+p[1]+p[2]);
  }
  var dDesde = fDesde ? parseInt(fDesde.replace(/-/g,'')) : 0;
  var dHasta = fHasta ? parseInt(fHasta.replace(/-/g,'')) : 0;

  var datos = toda.filter(function(c){
    var fd = parseFechaNum(c.fecha);
    if (dDesde && fd < dDesde) return false;
    if (dHasta && fd > dHasta) return false;
    if (fCat && c.categoria !== fCat) return false;
    if (fEq  && c.equipo    !== fEq)  return false;
    return true;
  });

  function egreso(c) { return (c.egreso||0) + (c.monto&&!c.ingreso&&!c.egreso ? c.monto : 0); }

  var totalIng  = datos.reduce(function(a,c){return a+(c.ingreso||0);},0);
  var totalEg   = datos.reduce(function(a,c){return a+egreso(c);},0);
  var saldoNeto = totalIng - totalEg;

  // Informe 1 – flujo por día
  var flujoDias = {};
  datos.forEach(function(c){
    var k = c.fecha||'sin fecha';
    if (!flujoDias[k]) flujoDias[k]={ing:0,eg:0};
    flujoDias[k].ing += c.ingreso||0;
    flujoDias[k].eg  += egreso(c);
  });
  var diasOrden = Object.keys(flujoDias).sort(function(a,b){return parseFechaNum(a)-parseFechaNum(b);});
  var saldoAcum = 0;
  var flujoRows = diasOrden.map(function(d){
    saldoAcum += flujoDias[d].ing - flujoDias[d].eg;
    return {fecha:d, ing:flujoDias[d].ing, eg:flujoDias[d].eg, saldo:saldoAcum};
  });

  // Informe 2 – por categoría
  var porCat = {};
  datos.forEach(function(c){
    var eg = egreso(c); if (!eg) return;
    var k = c.categoria||'Sin categoría';
    if (!porCat[k]) porCat[k]={n:0,total:0};
    porCat[k].n++; porCat[k].total += eg;
  });
  var catRows = Object.keys(porCat).map(function(k){return {cat:k,n:porCat[k].n,total:porCat[k].total};});
  catRows.sort(function(a,b){return b.total-a.total;});

  // Informe 3 – por equipo
  var porEq = {};

    var k = c.equipo||'N/A';

  });
  var eqRows = Object.keys(porEq).map(function(k){return {eq:k,n:porEq[k].n,total:porEq[k].total};});
  eqRows.sort(function(a,b){return b.total-a.total;});

  var top3Cat = catRows.slice(0,3);

  var thS = 'padding:5px 7px;text-align:left;font-size:9px;font-weight:700;color:#888;border-bottom:1px solid #eee;background:#FAFAFA';

  // Período del informe
  var hoyEmision = (function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear(); })();
  var periodoStr = (fDesde||fHasta) ? ((fDesde||'inicio')+' al '+(fHasta||'hoy')) : (datos.length ? (function(){
    var fechas = datos.map(function(c){return c.fecha||'';}).filter(Boolean).sort();
    return fechas[0]+' al '+fechas[fechas.length-1];
  })() : 'Sin datos');
  // Nombre del mes si todos son del mismo mes
  var mesesInf = {}; datos.forEach(function(c){if(c.mes&&c.anio) mesesInf[c.anio+'/'+c.mes]=true;});
  var MNOM=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var mesNombreStr = Object.keys(mesesInf).length===1 ? (function(){var p=Object.keys(mesesInf)[0].split('/'); return MNOM[parseInt(p[1])-1]+' '+p[0];})()+' · ' : '';

  return `
  <div style="border-top:2px solid #E8EAF6;margin-top:14px;padding-top:10px">

    <div style="background:#F8F9FA;border:1px solid #ECEFF1;border-radius:8px;padding:8px;margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:5px">FILTROS DE PERÍODO</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        <div><div style="font-size:9px;color:#666;margin-bottom:2px">Desde</div><input type="date" value="${fDesde}" onchange="uiState.cInfDesde=this.value;render()" style="${inpS}"></div>
        <div><div style="font-size:9px;color:#666;margin-bottom:2px">Hasta</div><input type="date" value="${fHasta}" onchange="uiState.cInfHasta=this.value;render()" style="${inpS}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <select onchange="uiState.cInfCat=this.value;render()" style="${inpS}">
          <option value="">Todas las categorías</option>
          ${CATEGORIAS_CARTOLA.map(function(c){return '<option value="'+c+'" '+(fCat===c?'selected':'')+'>'+c+'</option>';}).join('')}
        </select>
        <select onchange="uiState.cInfEq=this.value;render()" style="${inpS}">
          <option value="">Todos los equipos</option>
          ${EQUIPOS_CARTOLA.map(function(e){return '<option value="'+e+'" '+(fEq===e?'selected':'')+'>'+e+'</option>';}).join('')}
        </select>
      </div>
    </div>

    <!-- RESUMEN EJECUTIVO -->
    <div style="background:white;border:1px solid #E8EAF6;border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:10px;font-weight:800;color:#1565C0">📋 RESUMEN EJECUTIVO${filtBadge}</div>
        <button onclick="imprimirInformeCartola('resumen')" style="padding:4px 10px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer">🖨️ PDF</button>
      </div>
      <div style="font-size:9px;color:#888;margin-bottom:8px">
        <span style="font-weight:700;color:#37474F">${mesNombreStr}Período:</span> ${periodoStr} &nbsp;|&nbsp;
        <span style="font-weight:700;color:#37474F">Emitido:</span> ${hoyEmision}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px">
        <div style="background:#E8F5E9;border-radius:6px;padding:7px;text-align:center">
          <div style="font-size:9px;color:#2E7D32;font-weight:700">INGRESOS</div>
          <div style="font-size:12px;font-weight:800;color:#2E7D32">$${totalIng.toLocaleString('es-CL')}</div>
        </div>
        <div style="background:#FFEBEE;border-radius:6px;padding:7px;text-align:center">
          <div style="font-size:9px;color:#C62828;font-weight:700">EGRESOS</div>
          <div style="font-size:12px;font-weight:800;color:#C62828">$${totalEg.toLocaleString('es-CL')}</div>
        </div>
        <div style="background:${saldoNeto>=0?'#E8F5E9':'#FFEBEE'};border-radius:6px;padding:7px;text-align:center">
          <div style="font-size:9px;font-weight:700;color:${saldoNeto>=0?'#2E7D32':'#C62828'}">SALDO NETO</div>
          <div style="font-size:12px;font-weight:800;color:${saldoNeto>=0?'#2E7D32':'#C62828'}">${saldoNeto>=0?'+':''}$${saldoNeto.toLocaleString('es-CL')}</div>
        </div>
      </div>
      ${top3Cat.length?'<div style="margin-bottom:5px"><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">TOP CATEGORÍAS GASTO</div>'+top3Cat.map(function(r,i){return '<div style="font-size:10px;padding:2px 0">'+(i+1)+'. '+r.cat+' — $'+r.total.toLocaleString('es-CL')+'</div>';}).join('')+'</div>'  :''}
      ${top3Eq.length?'<div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">TOP EQUIPOS GASTO</div>'+top3Eq.map(function(r,i){return '<div style="font-size:10px;padding:2px 0">'+(i+1)+'. '+r.eq+' — $'+r.total.toLocaleString('es-CL')+'</div>';}).join('')+'</div>':''}
    </div>

    <!-- FLUJO DE CAJA -->
    ${flujoRows.length?`
    <div style="background:white;border:1px solid #E8EAF6;border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:10px;font-weight:800;color:#1565C0">💵 FLUJO DE CAJA</div>
        <button onclick="imprimirInformeCartola('flujo')" style="padding:4px 10px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer">🖨️ PDF</button>
      </div>
      <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:300px">
        <tr><th style="${thS}">FECHA</th><th style="${thS};text-align:right">INGRESOS</th><th style="${thS};text-align:right">EGRESOS</th><th style="${thS};text-align:right">SALDO</th></tr>
        ${flujoRows.map(function(r){return '<tr><td style="'+tdS+'">'+r.fecha+'</td><td style="'+tdS+';text-align:right;color:'+(r.ing>0?'#2E7D32':'#aaa')+'">'+(r.ing>0?'$'+r.ing.toLocaleString('es-CL'):'—')+'</td><td style="'+tdS+';text-align:right;color:'+(r.eg>0?'#C62828':'#aaa')+'">'+(r.eg>0?'$'+r.eg.toLocaleString('es-CL'):'—')+'</td><td style="'+tdS+';text-align:right;font-weight:700;color:'+(r.saldo>=0?'#2E7D32':'#C62828')+'">$'+r.saldo.toLocaleString('es-CL')+'</td></tr>';}).join('')}
        <tr style="background:#F8F9FA"><td style="${tdS};font-weight:700">TOTAL</td><td style="${tdS};text-align:right;font-weight:700;color:#2E7D32">$${totalIng.toLocaleString('es-CL')}</td><td style="${tdS};text-align:right;font-weight:700;color:#C62828">$${totalEg.toLocaleString('es-CL')}</td><td style="${tdS};text-align:right;font-weight:700;color:${saldoNeto>=0?'#2E7D32':'#C62828'}">${saldoNeto>=0?'+':''}$${saldoNeto.toLocaleString('es-CL')}</td></tr>
      </table></div>
    </div>`:''}

    <!-- GASTOS POR CATEGORÍA -->
    ${catRows.length?`
    <div style="background:white;border:1px solid #E8EAF6;border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:10px;font-weight:800;color:#1565C0">🏷️ GASTOS POR CATEGORÍA</div>
        <button onclick="imprimirInformeCartola('categorias')" style="padding:4px 10px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer">🖨️ PDF</button>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <tr><th style="${thS}">CATEGORÍA</th><th style="${thS};text-align:center">N°</th><th style="${thS};text-align:right">TOTAL ($)</th><th style="${thS};text-align:right">%</th></tr>
        ${catRows.map(function(r){var pct2=totalEg?Math.round(r.total/totalEg*100):0;var barW=maxCat?Math.round(r.total/maxCat*100):0;return '<tr><td style="'+tdS+'"><div>'+r.cat+'</div><div style="background:#EEE;border-radius:2px;height:4px;margin-top:3px;overflow:hidden"><div style="background:#1565C0;height:100%;width:'+barW+'%"></div></div></td><td style="'+tdS+';text-align:center;color:#888">'+r.n+'</td><td style="'+tdS+';text-align:right;font-weight:700;color:#C62828">$'+r.total.toLocaleString('es-CL')+'</td><td style="'+tdS+';text-align:right;color:#888">'+pct2+'%</td></tr>';}).join('')}
      </table>
    </div>`:''}

    <!-- GASTOS POR EQUIPO -->
    ${eqRows.length?`
    <div style="background:white;border:1px solid #E8EAF6;border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:10px;font-weight:800;color:#1565C0">🚛 GASTOS POR EQUIPO</div>
        <button onclick="imprimirInformeCartola('equipos')" style="padding:4px 10px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer">🖨️ PDF</button>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <tr><th style="${thS}">EQUIPO</th><th style="${thS};text-align:center">N° TX</th><th style="${thS};text-align:right">TOTAL GASTOS ($)</th></tr>
        ${eqRows.map(function(r){return '<tr><td style="'+tdS+';font-weight:700">'+r.eq+'</td><td style="'+tdS+';text-align:center;color:#888">'+r.n+'</td><td style="'+tdS+';text-align:right;font-weight:700;color:#C62828">$'+r.total.toLocaleString('es-CL')+'</td></tr>';}).join('')}
      </table>
    </div>`:''}
  </div>`;
}

function imprimirInformeCartola(tipo) {
  var toda   = (appData.cartola||[]).filter(function(c){return c.revisado;});
  var fDesde = uiState.cInfDesde || '';
  var fHasta = uiState.cInfHasta || '';
  var fCat   = uiState.cInfCat   || '';
  var fEq    = uiState.cInfEq    || '';

  function parseFechaNum(s) {
    if (!s) return 0;
    var p = String(s).replace(/\//g,'-').split('-');
    if (p.length!==3) return 0;
    return p[0].length===2 ? parseInt(p[2]+p[1]+p[0]) : parseInt(p[0]+p[1]+p[2]);
  }
  var dDesde = fDesde ? parseInt(fDesde.replace(/-/g,'')) : 0;
  var dHasta = fHasta ? parseInt(fHasta.replace(/-/g,'')) : 0;

  var datos = toda.filter(function(c){
    var fd = parseFechaNum(c.fecha);
    if (dDesde && fd < dDesde) return false;
    if (dHasta && fd > dHasta) return false;
    if (fCat && c.categoria!==fCat) return false;
    if (fEq  && c.equipo!==fEq)     return false;
    return true;
  });

  function egreso(c){return (c.egreso||0)+(c.monto&&!c.ingreso&&!c.egreso?c.monto:0);}
  var totalIng = datos.reduce(function(a,c){return a+(c.ingreso||0);},0);
  var totalEg  = datos.reduce(function(a,c){return a+egreso(c);},0);
  var saldoNeto = totalIng - totalEg;
  var periodoTxt = (fDesde||'inicio')+' al '+(fHasta||'hoy');
  var hoy = new Date().toLocaleDateString('es-CL');
  var filtros = [fCat,fEq].filter(Boolean).join(' · ');

  var titulos = {resumen:'Resumen Ejecutivo',flujo:'Flujo de Caja',categorias:'Gastos por Categoría',equipos:'Gastos por Equipo'};
  var titulo = titulos[tipo]||'Informe';

  // Resumen para confirm
  var resumen = titulo+'\n\nPeríodo: '+periodoTxt+(filtros?'\nFiltros: '+filtros:'')+'\nTransacciones: '+datos.length+'\nIngresos: $'+totalIng.toLocaleString('es-CL')+'\nEgresos:  $'+totalEg.toLocaleString('es-CL')+'\n\n¿Imprimir / guardar PDF?';
  if (!confirm(resumen)) return;

  var css = 'body{font-family:"Segoe UI",Arial,sans-serif;color:#222;margin:0;padding:24px;font-size:12px}h1{font-size:16px;font-weight:800;color:#0B2545;margin-bottom:2px}h2{font-size:12px;font-weight:700;color:#1565C0;margin:14px 0 6px}p{font-size:10px;color:#888;margin-bottom:12px}table{border-collapse:collapse;width:100%;margin-bottom:12px}th{background:#0B2545;color:white;padding:6px 8px;text-align:left;font-size:10px}td{padding:5px 8px;font-size:11px;border-bottom:1px solid #EEE}.kpi{display:inline-block;min-width:140px;background:#F5F5F5;border-radius:6px;padding:8px 12px;margin:4px;text-align:center}.kpi-v{font-size:16px;font-weight:800}.green{color:#2E7D32}.red{color:#C62828}.bar-bg{background:#EEE;border-radius:2px;height:6px;overflow:hidden;margin-top:3px}.bar-fill{background:#1565C0;height:100%}@media print{.no-print{display:none!important}body{padding:10px}}';
  var header = '<h1>Global Solutions SpA — '+titulo+'</h1><p>Período: '+periodoTxt+(filtros?' &nbsp;|&nbsp; '+filtros:'')+' &nbsp;|&nbsp; Emisión: '+hoy+'</p>';

  var body = '';
  if (tipo==='resumen') {
    body = '<div style="display:flex;flex-wrap:wrap;margin-bottom:14px">'
      +'<div class="kpi"><div style="font-size:10px;color:#555">Ingresos</div><div class="kpi-v green">$'+totalIng.toLocaleString('es-CL')+'</div></div>'
      +'<div class="kpi"><div style="font-size:10px;color:#555">Egresos</div><div class="kpi-v red">$'+totalEg.toLocaleString('es-CL')+'</div></div>'
      +'<div class="kpi"><div style="font-size:10px;color:#555">Saldo Neto</div><div class="kpi-v '+(saldoNeto>=0?'green':'red')+'">'+(saldoNeto>=0?'+':'')+'$'+saldoNeto.toLocaleString('es-CL')+'</div></div>'
      +'</div>';
    var porCat2={};datos.forEach(function(c){var eg=egreso(c);if(!eg)return;var k=c.categoria||'Sin categoría';if(!porCat2[k])porCat2[k]=0;porCat2[k]+=eg;});
    var catArr=Object.keys(porCat2).map(function(k){return {cat:k,total:porCat2[k]};}).sort(function(a,b){return b.total-a.total;}).slice(0,5);
    var porEq2={};datos.forEach(function(c){var eg=egreso(c);if(!eg)return;var k=c.equipo||'N/A';if(!porEq2[k])porEq2[k]=0;porEq2[k]+=eg;});
    var eqArr=Object.keys(porEq2).map(function(k){return {eq:k,total:porEq2[k]};}).sort(function(a,b){return b.total-a.total;}).slice(0,5);
    if (catArr.length) { body+='<h2>Top Categorías de Gasto</h2><table><tr><th>Categoría</th><th style="text-align:right">Total ($)</th></tr>'+catArr.map(function(r){return '<tr><td>'+r.cat+'</td><td style="text-align:right">$'+r.total.toLocaleString('es-CL')+'</td></tr>';}).join('')+'</table>'; }
    if (eqArr.length) { body+='<h2>Top Equipos</h2><table><tr><th>Equipo</th><th style="text-align:right">Total ($)</th></tr>'+eqArr.map(function(r){return '<tr><td>'+r.eq+'</td><td style="text-align:right">$'+r.total.toLocaleString('es-CL')+'</td></tr>';}).join('')+'</table>'; }
  } else if (tipo==='flujo') {
    var flujoDias2={};datos.forEach(function(c){var k=c.fecha||'—';if(!flujoDias2[k])flujoDias2[k]={ing:0,eg:0};flujoDias2[k].ing+=c.ingreso||0;flujoDias2[k].eg+=egreso(c);});
    var dias2=Object.keys(flujoDias2).sort(function(a,b){return parseFechaNum(a)-parseFechaNum(b);});
    var sAcum=0;
    body='<table><tr><th>Fecha</th><th style="text-align:right">Ingresos</th><th style="text-align:right">Egresos</th><th style="text-align:right">Saldo</th></tr>'
      +dias2.map(function(d){sAcum+=flujoDias2[d].ing-flujoDias2[d].eg;return '<tr><td>'+d+'</td><td style="text-align:right;color:'+(flujoDias2[d].ing?'#2E7D32':'#aaa')+'">'+(flujoDias2[d].ing?'$'+flujoDias2[d].ing.toLocaleString('es-CL'):'—')+'</td><td style="text-align:right;color:'+(flujoDias2[d].eg?'#C62828':'#aaa')+'">'+(flujoDias2[d].eg?'$'+flujoDias2[d].eg.toLocaleString('es-CL'):'—')+'</td><td style="text-align:right;font-weight:700;color:'+(sAcum>=0?'#2E7D32':'#C62828')+'">$'+sAcum.toLocaleString('es-CL')+'</td></tr>';}).join('')
      +'<tr style="background:#F5F5F5"><td><strong>TOTAL</strong></td><td style="text-align:right;color:#2E7D32;font-weight:700">$'+totalIng.toLocaleString('es-CL')+'</td><td style="text-align:right;color:#C62828;font-weight:700">$'+totalEg.toLocaleString('es-CL')+'</td><td style="text-align:right;font-weight:700;color:'+(saldoNeto>=0?'#2E7D32':'#C62828')+'">'+(saldoNeto>=0?'+':'')+'$'+saldoNeto.toLocaleString('es-CL')+'</td></tr></table>';
  } else if (tipo==='categorias') {
    var porCat3={};datos.forEach(function(c){var eg=egreso(c);if(!eg)return;var k=c.categoria||'Sin categoría';if(!porCat3[k])porCat3[k]={n:0,total:0};porCat3[k].n++;porCat3[k].total+=eg;});
    var catArr3=Object.keys(porCat3).map(function(k){return {cat:k,n:porCat3[k].n,total:porCat3[k].total};}).sort(function(a,b){return b.total-a.total;});
    var mxCat3=catArr3.length?catArr3[0].total:1;
    body='<table><tr><th>Categoría</th><th style="text-align:center">N°</th><th style="text-align:right">Total ($)</th><th style="text-align:right">%</th></tr>'
      +catArr3.map(function(r){var pct2=totalEg?Math.round(r.total/totalEg*100):0;var bw=Math.round(r.total/mxCat3*100);return '<tr><td><div>'+r.cat+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+bw+'%"></div></div></td><td style="text-align:center">'+r.n+'</td><td style="text-align:right;color:#C62828;font-weight:700">$'+r.total.toLocaleString('es-CL')+'</td><td style="text-align:right">'+pct2+'%</td></tr>';}).join('')
      +'</table>';
  } else if (tipo==='equipos') {
    var porEq3={};datos.forEach(function(c){var eg=egreso(c);if(!eg)return;var k=c.equipo||'N/A';if(!porEq3[k])porEq3[k]={n:0,total:0};porEq3[k].n++;porEq3[k].total+=eg;});
    var eqArr3=Object.keys(porEq3).map(function(k){return {eq:k,n:porEq3[k].n,total:porEq3[k].total};}).sort(function(a,b){return b.total-a.total;});
    body='<table><tr><th>Equipo</th><th style="text-align:center">N° TX</th><th style="text-align:right">Total Gastos ($)</th></tr>'
      +eqArr3.map(function(r){return '<tr><td style="font-weight:700">'+r.eq+'</td><td style="text-align:center">'+r.n+'</td><td style="text-align:right;font-weight:700;color:#C62828">$'+r.total.toLocaleString('es-CL')+'</td></tr>';}).join('')
      +'</table>';
  }

  var btn = '<div class="no-print" style="margin-bottom:16px"><button onclick="window.print()" style="background:#0B2545;color:white;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Imprimir / Guardar PDF</button></div>';
  var w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+titulo+'</title><style>'+css+'</style></head><body>'+btn+header+body+'<script>setTimeout(function(){window.print();},500);<\/script></body></html>');
  w.document.close();
}

function _costoTabManual(mes, anio, flota) {
  const f = uiState.costoForm || {};
  const editId = uiState.costoEditId || null;
  const montoNeto = parseInt(f.monto_neto) || 0;
  const iva = Math.round(montoNeto * 0.19);
  const total = montoNeto + iva;
