function generarIdServicio(servicios, fechaStr) {
  let d;
  if (fechaStr) {
    const p = fechaStr.split('-');
    if (p.length === 3) d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));

  const num = String((servicios||[]).length + 1).padStart(2,'0');
  return num + anioStr + mesStr;
}

let appData;
let uiState = {};
let vistaActual = "todas";
let historialAcciones = [];
const MAX_HISTORIAL = 20;

function registrarAccion(descripcion, fnDeshacer) {
  historialAcciones.push({ descripcion, fnDeshacer });
  if (historialAcciones.length > MAX_HISTORIAL) historialAcciones.shift();
  actualizarBotonDeshacer();
}
function deshacer() {
  if (historialAcciones.length === 0) return;
  const accion = historialAcciones.pop();
  accion.fnDeshacer();
  actualizarBotonDeshacer();
  saveData(); render();
}
function actualizarBotonDeshacer() {
  const btn = document.getElementById('btn-deshacer');
  if (!btn) return;
  btn.style.opacity = historialAcciones.length > 0 ? '1' : '0.35';
  btn.title = historialAcciones.length > 0 ? 'Deshacer: ' + historialAcciones[historialAcciones.length-1].descripcion : 'Sin acciones para deshacer';
}
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); deshacer(); }
});

function registrarSalidaComb() {
  const fecha=document.getElementById('rc_fecha')?.value;
  const patente=document.getElementById('rc_patente')?.value;
  const litros=parseFloat(document.getElementById('rc_litros')?.value)||0;

  if (!appData.rendimientoComb) appData.rendimientoComb=[];
  const p=fecha.split('-');const fechaStr=`${p[2]}-${p[1]}-${p[0]}`;

function cerrarRendComb(idx) {

}

function _leerCamposCierre(id, idx) {
  const s = appData.servicios[idx];
  return {
    precio: parseInt(document.getElementById('cs_precio_'+id)?.value)||0,
    km: parseInt(document.getElementById('cs_km_'+id)?.value)||s?.km||0,
    tag: document.getElementById('cs_tag_'+id)?.value.trim()||s?.tag||'',
    oc: document.getElementById('cs_oc_'+id)?.value.trim()||s?.oc||'',
    peajes: parseInt(document.getElementById('cs_peajes_'+id)?.value)||s?.peajes||0,
    viaticos: parseInt(document.getElementById('cs_via_'+id)?.value)||s?.viaticos||0,
    adicional: parseInt(document.getElementById('cs_adic_'+id)?.value)||s?.adicional||0,
    litros: parseInt(document.getElementById('cs_litros_'+id)?.value)||s?.litros||0,
    petroleo: parseInt(document.getElementById('cs_petroleo_'+id)?.value)||s?.petroleo||0,
    cfProrrateado: parseInt(document.getElementById('cs_cf_'+id)?.value)||s?.cfProrrateado||50800,
  };
}

async function guardarBorradorCierre(id) {
  const idx=appData.servicios.findIndex(s=>s.id===id);
  if(idx===-1)return;
  const d=_leerCamposCierre(id,idx);
  const copiaAntes = JSON.parse(JSON.stringify(appData.servicios[idx]));
  const comisionConductor=d.precio?Math.round(d.precio*0.10):0;
  registrarAccion(`Borrador servicio ${id}`, () => {
    const i=appData.servicios.findIndex(s=>s.id===id);
    if(i!==-1){Object.assign(appData.servicios[i],copiaAntes);upsertServicioSupabase(appData.servicios[i]);}
  });
  Object.assign(appData.servicios[idx],{
    precio: d.precio, km: d.km, tag: d.tag, oc: d.oc,
    peajes: d.peajes, viaticos: d.viaticos, adicional: d.adicional,
    litros: d.litros, petroleo: d.petroleo, cfProrrateado: d.cfProrrateado,
    comisionConductor, cerrado: false, estado: 'borrador'
  });
  // Preservar valores en uiState para que no se borren al render
  const _s2 = appData.servicios[idx];
  uiState['cs_precio_'+id] = _s2.precio||'';
  uiState['cs_km_'+id] = _s2.km||'';
  uiState['cs_tag_'+id] = _s2.tag||'';
  uiState['cs_oc_'+id] = _s2.oc||'';
  uiState['cs_peajes_'+id] = _s2.peajes||'';
  uiState['cs_via_'+id] = _s2.viaticos||'';
  uiState['cs_adic_'+id] = _s2.adicional||'';
  uiState['cs_litros_'+id] = _s2.litros||'';
  uiState['cs_petroleo_'+id] = _s2.petroleo||'';
  uiState['cs_cf_'+id] = _s2.cfProrrateado||50800;
  saveData();
  await upsertServicioSupabase(appData.servicios[idx]);
  showToastGeneral('💾 Borrador guardado correctamente','#E65100');
  render();
}

async function guardarCierre(id) {
  const idx=appData.servicios.findIndex(s=>s.id===id);
  if(idx===-1)return;
  const d=_leerCamposCierre(id,idx);
  if(!d.precio) { alert('⚠️ El precio neto es obligatorio para cerrar el servicio.'); return; }
  if(!d.km) { if(!confirm('⚠️ Los kilómetros están en 0. ¿Deseas continuar de todas formas?')) return; }
  if(!d.petroleo && !d.litros) { if(!confirm('⚠️ El combustible está en 0. ¿Deseas continuar de todas formas?')) return; }
  if(!confirm(`¿Cerrar definitivamente el servicio ${id}?\nPrecio: $${d.precio.toLocaleString('es-CL')}\nEsta acción no se puede deshacer.`)) return;
  const comisionConductor=Math.round(d.precio*0.10);
  Object.assign(appData.servicios[idx],{
    precio: d.precio, km: d.km, tag: d.tag, oc: d.oc,
    peajes: d.peajes, viaticos: d.viaticos, adicional: d.adicional,
    litros: d.litros, petroleo: d.petroleo, cfProrrateado: d.cfProrrateado,
    comisionConductor, cerrado: true, estado: 'cerrado'
  });
  appData.dashboard.ventas_mes=(appData.servicios||[]).filter(s=>s.cerrado&&s.precio).reduce((a,s)=>a+(s.precio||0),0);
  uiState['cs_'+id]=false;
  saveData();
  await upsertServicioSupabase(appData.servicios[idx]);
  showToastGeneral('✅ Servicio cerrado correctamente','#2E7D32');
  render();
}

function agregarFotoServicio(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const MAX = 400;
      const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const idx = appData.servicios.findIndex(s=>s.id===id);
      if (idx === -1) return;
      if (!appData.servicios[idx].fotos) appData.servicios[idx].fotos = [];
      appData.servicios[idx].fotos.push(dataUrl);
      saveData();
      input.value = '';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function eliminarFotoServicio(id, fi) {
  const idx = appData.servicios.findIndex(s=>s.id===id);
  if (idx === -1) return;
  appData.servicios[idx].fotos.splice(fi, 1);
  saveData();
  render();
}

function crearRendicion() {
  const responsable = document.getElementById('ren_responsable')?.value.trim();
  const descripcion = '';
  const fecha = document.getElementById('ren_fecha')?.value || new Date().toISOString().split('T')[0];
  if (!responsable) { alert('⚠️ Ingresa el nombre del responsable.'); return; }
  if (!uiState.ren_lineas || !uiState.ren_lineas.some(l=>l.monto)) { alert('⚠️ Agrega al menos una línea de gasto con monto.'); return; }
  if (!appData.rendiciones) appData.rendiciones = [];
  const p = fecha.split('-');
  const fechaStr = p.length===3&&p[0].length===4 ? `${p[2]}-${p[1]}-${p[0]}` : fecha;
  const lineas = uiState.ren_lineas.filter(l=>l.monto||l.descripcion).map(l=>({...l, monto: parseInt(l.monto)||0}));
  const total = lineas.reduce((a,l)=>a+(l.monto||0),0);
  const id = nextRendicionId();
  appData.rendiciones.push({ id, fecha: fechaStr, responsable, descripcion: descripcion||'', lineas, total, estado:'borrador', observaciones:'' });
  uiState.ren_lineas = [{fecha:'',categoria:'Combustible',descripcion:'',patente:'',monto:''}];
  uiState.ren_form_open = false;
  registrarAccion(`Crear rendición ${id}`, () => {
    appData.rendiciones = appData.rendiciones.filter(r=>r.id!==id);
  });
  saveData();
  upsertRendicionSupabase(appData.rendiciones[appData.rendiciones.length-1]);
  render();
  showToastGeneral('✅ '+id+' creada — Total: $'+total.toLocaleString('es-CL'),'#2E7D32');

function nextFacturaId() {

function crearFactura() {
  const numero   = document.getElementById('fac_numero')?.value.trim();
  const fecha    = document.getElementById('fac_fecha')?.value;
  const clienteV = document.getElementById('fac_cliente')?.value.trim();
  const liqId    = document.getElementById('fac_liq')?.value.trim();
  const monto    = parseInt(document.getElementById('fac_monto')?.value)||0;
  if (!numero)   { alert('⚠️ Ingresa el número de factura.'); return; }
  if (!fecha)    { alert('⚠️ Ingresa la fecha de emisión.'); return; }
  if (!clienteV) { alert('⚠️ Ingresa el cliente.'); return; }
  if (!monto)    { alert('⚠️ Ingresa el monto de la factura.'); return; }
  if (!appData.facturas) appData.facturas = [];
  const p=fecha.split('-');
  const fechaStr=p.length===3&&p[0].length===4?`${p[2]}-${p[1]}-${p[0]}`:fecha;
  const id = nextFacturaId();
  const factura = { id, numero, fecha:fechaStr, cliente:clienteV, liquidacionId:liqId||'', monto, estado:'emitida', factoring:false, factoringEmpresa:'', factoringFechaAnticipo:'', factoringMonto:0, factoringComision:0, factoringFechaLiquidacion:'', observaciones:'' };
  appData.facturas.push(factura);
  uiState.fac_form_open = false;
  saveData();
  upsertFacturaSupabase(factura);
  render();
  showToastGeneral('✅ '+id+' registrada — $'+monto.toLocaleString('es-CL'),'#2E7D32');
}

function cambiarEstadoFactura(id, estado) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.estado=estado;
  saveData(); upsertFacturaSupabase(f); render();
}

function toggleFactoring(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.factoring=!f.factoring;
  if (f.factoring && f.estado==='emitida') f.estado='en_factoring';
  saveData(); upsertFacturaSupabase(f); render();

function guardarFactoring(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  const p=document.getElementById('fac_fact_fecha_'+id)?.value||'';
  const pStr=p?p.split('-').reverse().join('-'):'';
  const pl=document.getElementById('fac_fact_liq_'+id)?.value||'';
  const plStr=pl?pl.split('-').reverse().join('-'):'';
  f.factoringEmpresa=document.getElementById('fac_fact_empresa_'+id)?.value.trim()||f.factoringEmpresa;
  f.factoringFechaAnticipo=pStr||f.factoringFechaAnticipo;
  f.factoringMonto=parseInt(document.getElementById('fac_fact_monto_'+id)?.value)||f.factoringMonto;
  f.factoringComision=parseInt(document.getElementById('fac_fact_comision_'+id)?.value)||f.factoringComision;
  f.factoringFechaLiquidacion=plStr||f.factoringFechaLiquidacion;
  saveData(); upsertFacturaSupabase(f);
  showToastGeneral('💾 Factoring guardado','#1565C0');
}

function guardarObsFactura(id) {
  const f=(appData.facturas||[]).find(x=>x.id===id);
  if (!f) return;
  f.observaciones=document.getElementById('fac_obs_'+id)?.value||'';

  if (!confirm('¿Eliminar factura '+id+'? Esta acción no se puede deshacer.')) return;
  appData.facturas=(appData.facturas||[]).filter(f=>f.id!==id);

}

async function pushCostosSupabase() {
  if (!supa || !supaConectado) return;
  try {
    await supa.from('config_panel').upsert({
      id: 'costos',
      data: { costos: appData.costos||[], copec: appData.copec||[], cartola: appData.cartola||[] },
      updated_at: new Date().toISOString()
    }, { onConflict: 'id' });
  } catch(e) { console.warn('Error sync costos Supabase:', e); }
}

async function syncCostosDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('config_panel').select('*').eq('id','costos').single();
    if (!error && data?.data) {
      if (Array.isArray(data.data.costos)) appData.costos = data.data.costos;
      if (Array.isArray(data.data.copec)) appData.copec = data.data.copec;
      if (Array.isArray(data.data.cartola)) appData.cartola = data.data.cartola;
      saveData();
    }
  } catch(e) { console.warn('Error sync costos desde Supabase:', e); }
}

function procesarCartolaExcel(input) {
  const file = input.files[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { showToastGeneral('⚠️ Librería Excel no disponible, recarga la página','#E65100'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const dataRows = (rows[0] && typeof rows[0][0]==='string' && isNaN(rows[0][0])) ? rows.slice(1) : rows;
      if (!appData.cartola) appData.cartola = [];
      const hoy = new Date(); let agregados = 0;
      dataRows.forEach(row => {
        if (!row || row.length < 3) return;
        const fechaRaw = String(row[0]||'').trim();
        const glosa = String(row[1]||'').trim();
        const montoRaw = parseFloat(String(row[2]||'').replace(/\./g,'').replace(',','.')) || 0;
        const categoria = String(row[3]||'').trim();
        if (!fechaRaw || !glosa || !montoRaw) return;
        let fecha = fechaRaw.includes('/') ? fechaRaw.replace(/\//g,'-') : fechaRaw;
        if (/^\d{5}$/.test(fecha)) { const d=new Date((parseInt(fecha)-25569)*86400*1000); fecha=`${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
        const p = fecha.split('-');
        const mes = p.length===3 ? p[1] : String(hoy.getMonth()+1).padStart(2,'0');
        const anio = p.length===3 ? p[2] : String(hoy.getFullYear());
        appData.cartola.push({ id:_genIdCartola(), fecha, glosa, monto:Math.abs(montoRaw), categoria, mes, anio, importado:false });
        agregados++;
      });
      saveData(); pushCostosSupabase();
      showToastGeneral(`✅ ${agregados} movimientos importados`,'#2E7D32'); render();
    } catch(err) { showToastGeneral('❌ Error leyendo Excel: '+err.message,'#C62828'); }
  };
  reader.readAsArrayBuffer(file);
}
function eliminarCartola(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  appData.cartola = (appData.cartola||[]).filter(x=>x.id!==id);

      const preview = [];
      dataRows.forEach((row) => {
        if (!row || row.every(c=>!c)) return;
        const fechaRaw = String(row[0]||'').trim();
        const empresa  = String(row[1]||'').trim();
        const montoRaw = parseFloat(String(row[2]||'').replace(/\./g,'').replace(',','.')) || 0;
        const equipo   = String(row[3]||'flota_completa').trim() || 'flota_completa';
        const categoria= String(row[4]||'administrativo').trim().toLowerCase() || 'administrativo';
        const tipoCosto= String(row[5]||'').trim();
        const desc     = String(row[6]||'').trim();
        if (!empresa && !montoRaw) return;
        let fecha = fechaRaw.includes('/') ? fechaRaw.replace(/\//g,'-') : fechaRaw;
        if (/^\d{5}$/.test(fecha)) { const d=new Date((parseInt(fecha)-25569)*86400*1000); fecha=`${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
        if (!fecha) fecha=`${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
        const p=fecha.split('-');
        const mes=p.length===3?(p[0].length===4?p[1]:p[1]):String(hoy.getMonth()+1).padStart(2,'0');
        const anio=p.length===3?(p[0].length===4?p[0]:p[2]):String(hoy.getFullYear());
        const montoNeto=Math.round(montoRaw);
        preview.push({ id:_genIdCosto(), fecha, empresa:empresa||'(sin nombre)', monto_neto:montoNeto, iva:Math.round(montoNeto*0.19), total:montoNeto+Math.round(montoNeto*0.19), equipo, categoria, tipo_costo:tipoCosto, descripcion:desc, mes, anio });
      });
      if (!preview.length) { showToastGeneral('⚠️ No se encontraron datos válidos en el Excel','#E65100'); return; }
      uiState.costosExcelPreview = preview;
      uiState.costoTab = 'historial';
      render();
    } catch(err) { showToastGeneral('❌ Error leyendo Excel: '+err.message,'#C62828'); }
  };
  reader.readAsArrayBuffer(file);
}

function confirmarImportacionCostos() {
  const preview = uiState.costosExcelPreview || [];
  if (!preview.length) return;
  if (!appData.costos) appData.costos = [];
  preview.forEach(c => appData.costos.push(c));
  uiState.costosExcelPreview = null;
  saveData(); pushCostosSupabase();
  showToastGeneral(`✅ ${preview.length} costos importados al historial`,'#2E7D32');
  render();
}

function cancelarImportacionCostos() {
  uiState.costosExcelPreview = null;
  render();
}

function _costoListaMes(mes, anio) {
  const costos = (appData.costos||[]).filter(c=>c.mes===mes&&c.anio===anio);
  if (!costos.length) return '<div style="text-align:center;color:#aaa;font-size:11px;padding:12px">Sin costos registrados este mes</div>';
  const total = costos.reduce((a,c)=>a+c.total,0);
  return `<div style="font-size:9px;font-weight:700;color:#888;margin-bottom:6px">COSTOS DEL MES — $${total.toLocaleString('es-CL')}</div>
  ${costos.slice().reverse().map(c=>`
  <div style="background:white;border:1px solid #eee;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:700;color:#333">${c.empresa}</div>
      <div style="font-size:10px;color:#888">${c.fecha} · ${c.equipo==='flota_completa'?'Flota completa':c.equipo} · ${c.tipo_costo||c.categoria}</div>
      ${c.descripcion?`<div style="font-size:10px;color:#aaa">${c.descripcion}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px;flex-shrink:0">
      <div style="font-size:13px;font-weight:900;color:#C62828">$${c.total.toLocaleString('es-CL')}</div>
      <div style="font-size:9px;color:#aaa">neto $${c.monto_neto.toLocaleString('es-CL')}</div>
      <button onclick="editarCosto('${c.id}')" style="font-size:10px;padding:3px 8px;background:#E3F2FD;color:#1565C0;border:1px solid #BBDEFB;border-radius:5px;cursor:pointer">✏️ Editar</button>
    </div>
  </div>`).join('')}`;
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function renderCostos() {
  const tab = uiState.costoTab || 'manual';
  const hoy = new Date();
  const mes = String(hoy.getMonth()+1).padStart(2,'0');
  const anio = String(hoy.getFullYear());
  const flota = getFlota();
  const tabs = [['manual','✏️ Manual'],['copec','⛽ Combustible'],['cartola','🏦 Cartola'],['historial','📋 Historial']];
  const nav = `<div style="display:flex;gap:4px;margin-bottom:10px;overflow-x:auto">${tabs.map(([id,lbl])=>`<button onclick="uiState.costoTab='${id}';render()" style="padding:7px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;${tab===id?'background:#1565C0;color:white;border:none':'background:#F5F5F5;color:#555;border:1px solid #dde'}">${lbl}</button>`).join('')}</div>`;
  let body = '';
  if (tab==='manual') body = _costoTabManual(mes, anio, flota);
  else if (tab==='copec') body = _costoTabCopec(mes, anio, flota);
  else if (tab==='cartola') body = _costoTabCartola(mes, anio);
  else if (tab==='historial') body = _costoTabHistorial(mes, anio, flota);
  return `<div style="padding:2px">${nav}${body}</div>`;
}

function renderCaja() {
  const facturas = appData.facturas || [];
  const rendiciones = appData.rendiciones || [];
  const liquidaciones = appData.liquidaciones || [];
  const hoy = new Date();
  const mesSel = String(hoy.getMonth()+1).padStart(2,'0');
  const anioSel = String(hoy.getFullYear());
  const parseFechaDDMMYYYY = f => { if(!f) return null; const p=f.split('-'); return p[0].length===2 ? new Date(p[2],p[1]-1,p[0]) : new Date(p[0],p[1]-1,p[2]); };
  const esMes = f => { const d=parseFechaDDMMYYYY(f); return d && d.getMonth()+1===parseInt(mesSel) && d.getFullYear()===parseInt(anioSel); };
  const facMes = facturas.filter(f=>esMes(f.fecha));
  const cobradoMes = facMes.filter(f=>f.estado==='cobrada').reduce((a,f)=>a+(f.monto||0),0);
  const porCobrar = facturas.filter(f=>f.estado!=='cobrada').reduce((a,f)=>a+(f.monto||0),0);
  const renMes = rendiciones.filter(r=>esMes(r.fecha));
  const egresosMes = renMes.reduce((a,r)=>a+(r.total||0),0);
  const saldoEstimado = cobradoMes - egresosMes;
  const montoPendFac = liquidaciones.filter(l=>l.estado==='enviada').reduce((a,l)=>a+(l.total||0),0);
  const ultFacCob = facMes.filter(f=>f.estado==='cobrada').slice(-5).reverse();
  const ultRen = renMes.slice(-5).reverse();
  return `<div style="padding:2px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="background:#E8F5E9;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#2E7D32;margin-bottom:2px">COBRADO MES</div>
        <div style="font-size:14px;font-weight:900;color:#2E7D32">$${cobradoMes.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#FFEBEE;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#C62828;margin-bottom:2px">EGRESOS MES</div>
        <div style="font-size:14px;font-weight:900;color:#C62828">$${egresosMes.toLocaleString('es-CL')}</div>
      </div>
    </div>
    <div style="background:${saldoEstimado>=0?'#E8F5E9':'#FFEBEE'};border-radius:8px;padding:10px;text-align:center;margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;color:${saldoEstimado>=0?'#2E7D32':'#C62828'};margin-bottom:2px">SALDO ESTIMADO MES</div>
      <div style="font-size:20px;font-weight:900;color:${saldoEstimado>=0?'#1B5E20':'#B71C1C'}">$${saldoEstimado.toLocaleString('es-CL')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
      <div style="background:#FFFDE7;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#F9A825;margin-bottom:2px">POR COBRAR</div>
        <div style="font-size:13px;font-weight:900;color:#F57F17">$${porCobrar.toLocaleString('es-CL')}</div>
      </div>
      <div style="background:#E8EAF6;border-radius:8px;padding:8px 10px;text-align:center">
        <div style="font-size:9px;font-weight:700;color:#3949AB;margin-bottom:2px">PEND. FACTURAR</div>
        <div style="font-size:13px;font-weight:900;color:#3949AB">$${montoPendFac.toLocaleString('es-CL')}</div>
      </div>
    </div>
    ${ultFacCob.length?`<div style="font-size:9px;font-weight:700;color:#888;letter-spacing:0.5px;margin-bottom:5px">ÚLTIMAS COBRADAS</div>${ultFacCob.map(f=>`<div style="display:flex;justify-content:space-between;padding:6px 10px;background:#F8F9FA;border-radius:7px;margin-bottom:4px;border-left:3px solid #2E7D32"><span style="font-size:11px;color:#555">${f.numero||f.id} · ${f.cliente||'—'}</span><span style="font-size:11px;font-weight:700;color:#2E7D32">$${(f.monto||0).toLocaleString('es-CL')}</span></div>`).join('')}`:''}
    ${ultRen.length?`<div style="font-size:9px;font-weight:700;color:#888;letter-spacing:0.5px;margin:6px 0 5px">ÚLTIMAS RENDICIONES</div>${ultRen.map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 10px;background:#F8F9FA;border-radius:7px;margin-bottom:4px;border-left:3px solid #C62828"><span style="font-size:11px;color:#555">${r.id} · ${r.descripcion||'—'}</span><span style="font-size:11px;font-weight:700;color:#C62828">$${(r.total||0).toLocaleString('es-CL')}</span></div>`).join('')}`:''}
    ${!ultFacCob.length&&!ultRen.length?'<div style="text-align:center;color:#aaa;font-size:11px;padding:12px">Sin movimientos en el mes actual</div>':''}
  </div>`;
}

function renderLiquidacionesV2() {

    if(!s.cerrado) return false;

            <span style="font-size:11px;font-weight:700;color:#546E7A">$${(s.precio||0).toLocaleString('es-CL')}</span>
          </div>`;
        }).join('')}
      </div>`:''}
    </div>`;
  }).join('');

  const selHTML=seleccionados.length?`

      <div style="display:flex;justify-content:space-between;align-items:center">

        <span style="font-size:14px;font-weight:900;color:#3949AB">$${totalSel.toLocaleString('es-CL')}</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">

              <div style="font-size:11px;color:#546E7A;font-weight:700;margin-top:2px">${svcsLiq[0]?.cliente||'—'}</div>

              <span style="font-size:10px;color:#aaa">${isOpen?'▲':'▼'}</span>

          <div style="margin-bottom:8px">

  const gdFechaGuia = puntos.map(g=>g.fecha_guia||g.fecha).filter(Boolean).slice(0,1)[0] || s.fecha || '—';

async function subirImagenEditGuia(event, pi) {
  const file = event.target.files[0];
  if (!file || !supaConectado || !supa) return;
  showToastGeneral('⏳ Subiendo imagen...','#1565C0');
  try {
    const ext = file.name.split('.').pop();
    const nombre = `guia_edit_${Date.now()}_${pi}.${ext}`;
    const { error } = await supa.storage.from('guias').upload(nombre, file, {upsert:true});
    if (error) { showToastGeneral('❌ Error al subir imagen','#C62828'); return; }
    const { data: urlData } = supa.storage.from('guias').getPublicUrl(nombre);
    if (!uiState.edit_srv_puntos) return;
    uiState.edit_srv_puntos[pi].imagen_url = urlData.publicUrl;
    showToastGeneral('✅ Imagen subida','#2E7D32');
    render();
  } catch(e) { showToastGeneral('❌ Error: '+e.message,'#C62828'); }
}
async function guardarEdicionServicio() {
  const id = uiState.editando_srv_id;
  if (!id) return;
  const idx = (appData.servicios||[]).findIndex(s=>s.id===id);
  if (idx===-1) return;
  const s = appData.servicios[idx];
  const fecha = document.getElementById('edit_srv_fecha')?.value||s.fecha;
  const conductor = document.getElementById('edit_srv_conductor')?.value||s.conductor;
  const patenteRaw = document.getElementById('edit_srv_patente')?.value||s.patente;
  const patente = patenteRaw==='__tercero__'
    ? (document.getElementById('edit_srv_patente_manual')?.value.trim().toUpperCase()||s.patente)
    : patenteRaw;
  const tipoEquipo = document.getElementById('edit_srv_tipo_equipo')?.value||s.tipoEquipo||'';
  const clienteSelect = document.getElementById('edit_srv_cliente')?.value||s.cliente;
  const cliente = clienteSelect==='__nuevo__'
    ? (document.getElementById('edit_srv_cliente_nuevo')?.value.trim()||s.cliente)
    : clienteSelect;
  if (!conductor) { alert('⚠️ Debes seleccionar un conductor.'); return; }
  if (!patente) { alert('⚠️ Debes seleccionar una patente.'); return; }
  if (!cliente) { alert('⚠️ Debes seleccionar un cliente.'); return; }
  const puntos = (uiState.edit_srv_puntos||[]);
  const origen = puntos.length ? puntos[0].origen : s.origen;
  // Convertir fecha
  const fechaFinal = fecha ? (()=>{const p=fecha.split('-');return p.length===3&&p[0].length===4?`${p[2]}-${p[1]}-${p[0]}`:fecha;})() : s.fecha;
  Object.assign(appData.servicios[idx], {fecha:fechaFinal, conductor, patente, tipoEquipo, cliente, origen, puntos, guias:puntos});
  delete uiState.editando_srv_id;
  delete uiState.edit_srv_puntos;
  await upsertServicioSupabase(appData.servicios[idx]);
  saveData(); render();
  showToastGeneral('✅ Servicio actualizado','#2E7D32');
}
function renderEditarServicio(id) {
  const s = (appData.servicios||[]).find(sv=>sv.id===id);
  if (!s) return '';
  const hoyISO=(()=>{const h=new Date();return h.getFullYear()+'-'+String(h.getMonth()+1).padStart(2,'0')+'-'+String(h.getDate()).padStart(2,'0');})();
  const fechaISO = s.fecha?(()=>{const p=s.fecha.split('-');return p.length===3&&p[0].length===2?`${p[2]}-${p[1]}-${p[0]}`:s.fecha;})():hoyISO;
  const conductoresLista = appData.conductores||['Manuel Madrid','Felipe Vidal','Felipe Madariaga','Sebastián Zúñiga','Pablo Riquelme','Tercero'];
  const patentesLista = appData.patentes||['WR9192','GKFD84','XR8555','GCFF12','BPBL35','XA1114','DSDV36'];
  const clientesDefault = (window.DEFAULT_DATA||{pipeline:[]}).pipeline.filter(c=>c.etapa==='activo').map(c=>c.cliente);
  const clientesLocal = (appData.pipeline||[]).filter(c=>c.etapa==='activo').map(c=>c.cliente);
  const clientesActivos = [...new Set([...clientesDefault,...clientesLocal])].sort();
  const puntos = uiState.edit_srv_puntos||[];

  const puntosHTML = puntos.map((p,pi)=>`

          <input value="${p.destino}" onchange="updEditPunto(${pi},'destino',this.value)" placeholder="ej: Marchigue" style="width:100%;border:1px solid #dde;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit"></div>
        <div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">N° GUÍA</div>
          <input value="${p.guia}" onchange="updEditPunto(${pi},'guia',this.value)" placeholder="ej: 123456" style="width:100%;border:1px solid #dde;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit"></div>
        <div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">KG TRASLADADOS</div>
          <input value="${p.kg||''}" onchange="updEditPunto(${pi},'kg',this.value)" type="number" placeholder="ej: 20000" style="width:100%;border:1px solid #dde;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit"></div>
        <div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">FECHA GUÍA</div>
          <input value="${p.fecha_guia}" onchange="updEditPunto(${pi},'fecha_guia',this.value)" type="date" style="width:100%;border:1px solid #dde;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit"></div>

          <input value="${p.fecha_descarga}" onchange="updEditPunto(${pi},'fecha_descarga',this.value)" type="date" style="width:100%;border:1px solid #dde;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit"></div>
        <div style="grid-column:1/-1">
          <div style="font-size:9px;font-weight:700;color:#888;margin-bottom:4px">📎 IMAGEN GUÍA</div>
          ${p.imagen_url
            ? `<div style="position:relative;display:inline-block;width:100%">
                <img src="${p.imagen_url}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;border:1px solid #dde" onclick="verImagenGuia('${p.imagen_url}')">
                <button onclick="updEditPunto(${pi},'imagen_url','');render()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer">×</button>
               </div>`
            : `<label style="display:flex;align-items:center;gap:6px;background:#f8f9fa;border:1px dashed #ccc;border-radius:6px;padding:8px 10px;cursor:pointer;font-size:11px;color:#607D8B">

  return `<div style="background:#EDE7F6;border:2px solid #7E57C2;border-radius:10px;padding:12px;margin-bottom:8px">
    <div style="font-size:10px;font-weight:800;color:#4527A0;letter-spacing:1px;margin-bottom:10px">✎ EDITANDO SERVICIO ${id}</div>

        <div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">TIPO EQUIPO</div>
          <select id="edit_srv_tipo_equipo" style="width:100%;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;background:white;-webkit-appearance:auto">

          </select></div>

          </select></div>
        <div><div style="font-size:9px;font-weight:700;color:#888;margin-bottom:2px">PATENTE</div>
          <select id="edit_srv_patente" onchange="(function(v){const m=document.getElementById('edit_srv_patente_manual');if(m)m.style.display=v==='__tercero__'?'block':'none';})(this.value)" style="width:100%;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;background:white;-webkit-appearance:auto">
            <option value="">Seleccionar...</option>
            ${patentesLista.map(p=>`<option value="${p}" ${s.patente===p?'selected':''}>${p}</option>`).join('')}
            <option value="__tercero__" ${s.patente==='TERCERO'?'selected':''}>Tercero</option>
          </select>
          <input id="edit_srv_patente_manual" value="${s.patente==='TERCERO'?s.patente:''}" placeholder="Ingresar patente..." style="display:${mostrarPatenteManual?'block':'none'};margin-top:4px;width:100%;border:1px solid #FFA726;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;text-transform:uppercase"></div>

        <select id="edit_srv_cliente" onchange="(function(v){const b=document.getElementById('edit_srv_cliente_nuevo_box');if(b)b.style.display=v==='__nuevo__'?'block':'none';})(this.value)" style="width:100%;border:1px solid #dde;border-radius:6px;padding:7px 9px;font-size:12px;outline:none;background:white;-webkit-appearance:auto">
          <option value="">Seleccionar cliente...</option>
          ${clientesActivos.map(cl=>`<option value="${cl}" ${s.cliente===cl?'selected':''}>${cl}</option>`).join('')}
          <option value="__nuevo__">+ Cliente no está en la lista...</option>
        </select>
        <div id="edit_srv_cliente_nuevo_box" style="display:none;margin-top:5px">

      <div style="font-size:9px;font-weight:800;color:#455A64;letter-spacing:1px;padding-top:8px;border-top:1px solid #D1C4E9">PUNTOS DE RUTA</div>
      ${puntosHTML}
      <button onclick="addEditPunto()" style="width:100%;background:white;color:#455A64;border:1px dashed #90A4AE;border-radius:6px;padding:8px;font-size:11px;cursor:pointer;font-weight:700">+ Agregar punto</button>
      <div style="display:flex;gap:6px;margin-top:4px">
        <button onclick="guardarEdicionServicio()" style="flex:1;background:#4527A0;color:white;border:none;border-radius:7px;padding:10px;font-size:12px;font-weight:700;cursor:pointer">✓ Guardar cambios</button>
        <button onclick="cancelarEditarServicio()" style="background:#eee;color:#555;border:none;border-radius:7px;padding:10px 14px;font-size:12px;cursor:pointer">Cancelar</button>
      </div>

  </div>`;
}

const ESTRUCTURA_VERSION = '78'; // Incrementar cuando cambie la estructura del panel

function loadData() {
  // Si la versión estructural cambió, limpiar la estructura pero preservar datos
  const versionGuardada = localStorage.getItem('gs_estructura_ver');
  if (versionGuardada !== ESTRUCTURA_VERSION) {
    // Preservar datos importantes antes de limpiar
    let datosAPreservar = {};
    try {
      const viejos = JSON.parse(localStorage.getItem('gs_panel_v5')||'{}');
      datosAPreservar = {
        pipeline: viejos.pipeline || [],
        liquidaciones: viejos.liquidaciones || [],
        rendiciones: viejos.rendiciones || [],
        facturas: viejos.facturas || [],
        conductores: viejos.conductores || [],
        patentes: viejos.patentes || [],
        camionetas: viejos.camionetas || [],
        costos: viejos.costos || [],
        copec: viejos.copec || [],
        cartola: viejos.cartola || [],
        clientesRut: viejos.clientesRut || {},
        cotizaciones: viejos.cotizaciones || [],
        rendimientoComb: viejos.rendimientoComb || [],
        dashboard: viejos.dashboard || {},
      };
    } catch(e) {}
    // Resetear estructura completa
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    // Restaurar datos preservados
    if (datosAPreservar.pipeline?.length) appData.pipeline = datosAPreservar.pipeline;
    if (datosAPreservar.liquidaciones?.length) appData.liquidaciones = datosAPreservar.liquidaciones;
    if (datosAPreservar.rendiciones?.length) appData.rendiciones = datosAPreservar.rendiciones;
    if (datosAPreservar.facturas?.length) appData.facturas = datosAPreservar.facturas;
    if (datosAPreservar.conductores?.length) appData.conductores = datosAPreservar.conductores;
    if (datosAPreservar.patentes?.length) appData.patentes = datosAPreservar.patentes;
    if (Object.keys(datosAPreservar.clientesRut||{}).length) appData.clientesRut = datosAPreservar.clientesRut;
    if (datosAPreservar.cotizaciones?.length) appData.cotizaciones = datosAPreservar.cotizaciones;
    if (datosAPreservar.rendimientoComb?.length) appData.rendimientoComb = datosAPreservar.rendimientoComb;
    if (datosAPreservar.camionetas?.length) appData.camionetas = datosAPreservar.camionetas;
    if (datosAPreservar.costos?.length) appData.costos = datosAPreservar.costos;
    if (datosAPreservar.copec?.length) appData.copec = datosAPreservar.copec;
    if (datosAPreservar.cartola?.length) appData.cartola = datosAPreservar.cartola;
    // Guardar nueva versión
    localStorage.setItem('gs_estructura_ver', ESTRUCTURA_VERSION);
    localStorage.setItem('gs_panel_ui_v5', '{}');
  } else {
    try { const s = localStorage.getItem('gs_panel_v5'); appData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); } 
    catch(e) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }
  // Limpiar servicios del localStorage — Supabase es la fuente única de verdad
  appData.servicios = [];
  try {
    const s = localStorage.getItem('gs_panel_ui_v5');
    uiState = s ? JSON.parse(s) : {};
    // v37: cerrar acordeones al cargar — vista limpia
    Object.keys(uiState).forEach(k => {
      if (k.startsWith('acord_') || k.startsWith('disp_hist_') ||
          k.startsWith('srv_open_') || k.startsWith('liq_open_') ||
          k.startsWith('liq_cl_') || k.startsWith('cs_') ||
          k.startsWith('avliq_tag_')) {
        delete uiState[k];
      }
    });
  } catch(e) { uiState = {}; }
  // Validar que el orden de fases sea siempre el correcto
  const ordenCorrecto = ['comercial','operacional','financiero','control'];
  if (appData.fases) {
    appData.fases.sort((a,b) => {
      const ia = ordenCorrecto.indexOf(a.id);
      const ib = ordenCorrecto.indexOf(b.id);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
  }
  // Migración: agregar dashboard si no existe
  if (!appData.dashboard) appData.dashboard = JSON.parse(JSON.stringify(DEFAULT_DATA.dashboard));
  // Costos fijos y PE — valores fijos, no se sobreescriben por localStorage
  appData.dashboard.gasto_meta = 5080000;
  // Corregir nombres de conductores incorrectos en localStorage
  if (appData.conductores) {
    appData.conductores = appData.conductores.map(c => {
      if (c === 'Manuel Madariaga') return 'Felipe Madariaga';
      if (c === 'Sebastian Zuñiga') return 'Sebastián Zúñiga';
      return c;
    });
    // Eliminar duplicados
    appData.conductores = [...new Set(appData.conductores)];
  }
  if (appData.dashboard.gasto_real === undefined) appData.dashboard.gasto_real = 0;
  // PE siempre calculado desde costos fijos con margen 25%
  appData.dashboard.meta_pe = Math.round(appData.dashboard.gasto_meta / 0.25);
  if (appData.dashboard.servicios_semana === undefined) appData.dashboard.servicios_semana = 0;
  if (appData.dashboard.servicios_semana_presup === undefined) appData.dashboard.servicios_semana_presup = 0;
  if (appData.dashboard.facturas_cobrar === undefined) appData.dashboard.facturas_cobrar = 0;
  if (appData.dashboard.presupuesto_mes === undefined) appData.dashboard.presupuesto_mes = 0;
  // ── MIGRACIÓN v36 ──────────────────────────────────────
  if (!appData.liquidaciones) appData.liquidaciones = [];
  if (!appData.rendimientoComb) appData.rendimientoComb = [];
  if (!appData.cotizaciones) appData.cotizaciones = [];
  if (!appData.clientesRut) appData.clientesRut = {};
  // Migrar IDs formato antiguo
  (appData.servicios||[]).forEach(s => {
    if (s.id && /^S-FEB-(\d+)$/.test(s.id)) {
      s.id = s.id.replace(/^S-FEB-(\d+)$/, (_,n) => n.padStart(2,'0')+'26FEB');
    } else if (s.id && /^S(\d+)$/.test(s.id)) {
      const p=(s.fecha||'').split('-');
      if(p.length===3){const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const m=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'][d.getMonth()];const a=String(d.getFullYear()).slice(2);s.id=s.id.replace(/^S(\d+)$/,(_,n)=>n.padStart(2,'0')+a+m);}
    }
  });
  // Rendimiento Combustible en Operacional
  if (!appData.fases || !Array.isArray(appData.fases)) appData.fases = JSON.parse(JSON.stringify(DEFAULT_DATA.fases));
  const _opF = appData.fases.find(f=>f.id==='operacional');
  if (_opF && !_opF.rutinarias.some(r=>r.rendimientoCombTask)) {
    _opF.rutinarias.push({titulo:'Rendimiento Combustible',proc:'Registrar odómetro inicio/fin del día para calcular km/litro.',subtareas:[],rendimientoCombTask:true,done:false});
  }
  // Cierre de Servicios y Liquidaciones en Financiero
  const _finF = appData.fases.find(f=>f.id==='financiero');
  if (_finF) {
    if (!_finF.rutinarias.some(r=>r.cierreServicioTask)) {
      _finF.rutinarias.unshift({titulo:'Cierre de Servicios',proc:'Completar precio, Km, tag y datos faltantes.',subtareas:[],cierreServicioTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.liquidacionTask)) {
      const _iCs=_finF.rutinarias.findIndex(r=>r.cierreServicioTask);
      _finF.rutinarias.splice(_iCs+1,0,{titulo:'Liquidaciones',proc:'Gestionar liquidaciones por servicio o grupo con múltiples RUT.',subtareas:[],liquidacionTask:true,done:false});
    }
    // Agregar Facturación y Cobro si no existe
    if (!_finF.rutinarias.some(r=>r.facturaTask)) {
      const _iLq=_finF.rutinarias.findIndex(r=>r.liquidacionTask);
      _finF.rutinarias.splice(_iLq+1,0,{titulo:'Facturación y Cobro',proc:'Registrar facturas emitidas, gestionar factoring y hacer seguimiento de cobro.',subtareas:[],facturaTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.costosTask)) {
      const _iFac=_finF.rutinarias.findIndex(r=>r.facturaTask);
      _finF.rutinarias.splice(_iFac+1,0,{titulo:'Costos',proc:'Resumen de costos del mes: petróleo, peajes, viáticos, comisiones, costos fijos y rendiciones.',subtareas:[],costosTask:true,done:false});
    }
    if (!_finF.rutinarias.some(r=>r.cajaTask)) {
      const _iCos=_finF.rutinarias.findIndex(r=>r.costosTask);
      _finF.rutinarias.splice(_iCos+1,0,{titulo:'Caja',proc:'Flujo de caja del mes: cobros recibidos, egresos, saldo estimado y pendientes de facturar.',subtareas:[],cajaTask:true,done:false});
    }
    // Rendición siempre al final
    if (!_finF.rutinarias.some(r=>r.rendicionTask)) {
      _finF.rutinarias.push({titulo:'Rendición de Gastos',proc:'Registrar y gestionar rendiciones de gastos del equipo.',subtareas:[],rendicionTask:true,done:false});
    } else {
      const _iRen=_finF.rutinarias.findIndex(r=>r.rendicionTask);
      if (_iRen!==-1 && _iRen!==_finF.rutinarias.length-1) {
        const [_ren]=_finF.rutinarias.splice(_iRen,1);
        _finF.rutinarias.push(_ren);
      }
    }
    // Limpiar módulos obsoletos y duplicados
    let _cpcCount=0; let _facCount=0; let _factCount=0;
    _finF.rutinarias=_finF.rutinarias.filter(r=>{
      if(r.liquidacionServicios||r.cierreLiquidacion) return false;
      if(r.titulo==='Bancarización Global Solutions'||r.titulo==='Bancarizacion Global Solutions') return false;
      if(r.titulo==='Control de caja y presupuesto') return false;
      if(r.titulo==='Cuentas por cobrar'||r.cuentasCobrarTask){_cpcCount++;return _cpcCount<=1;}
      if(r.facturaTask){_facCount++;return _facCount<=1;}
      if(r.factoringTask){_factCount++;return _factCount<=1;}
      return true;
    });
  }
  // Cotización PDF en Comercial
  const _comF = appData.fases.find(f=>f.id==='comercial');
  if (_comF && !_comF.rutinarias.some(r=>r.cotizacionTask)) {
    _comF.rutinarias.push({titulo:'Cotización PDF',proc:'Generar cotización formal en PDF.',subtareas:[],cotizacionTask:true,done:false});
  }

  // Migración: agregar ámbito control si no existe
  if (!appData.fases.find(f => f.id === 'control')) {
    const defaultControl = DEFAULT_DATA.fases.find(f => f.id === 'control');
    if (defaultControl) appData.fases.push(JSON.parse(JSON.stringify(defaultControl)));
  }
  // Migración: midia
  if (!appData.midia_foco) appData.midia_foco = [];
  if (!appData.midia_open) appData.midia_open = {};
  if (!appData.pipeline) appData.pipeline = JSON.parse(JSON.stringify(DEFAULT_DATA.pipeline));
  // Asegurar que clientes del DEFAULT_DATA siempre estén presentes
  DEFAULT_DATA.pipeline.forEach(def => {
    if (!appData.pipeline.find(p => p.cliente === def.cliente)) {
      appData.pipeline.push(JSON.parse(JSON.stringify(def)));
    }
  });
  // Migración: agregar plan a fases que no lo tengan
  appData.fases.forEach(fase => {
    if (!fase.plan) {
      const defaultFase = DEFAULT_DATA.fases.find(f => f.id === fase.id);
      if (defaultFase && defaultFase.plan) fase.plan = defaultFase.plan;
    }
  });
  // Migración: agregar plan a scalingup si no existe
  if (!appData.scalingup.plan) {
    appData.scalingup.plan = DEFAULT_DATA.scalingup.plan;
  }
  if (!appData.scalingup.planEscalamiento) {
    appData.scalingup.planEscalamiento = DEFAULT_DATA.scalingup.planEscalamiento;
  }
  // Migración: plan personal en control
  const ctrlFase = appData.fases.find(f => f.id === 'control');
  if (ctrlFase && !ctrlFase.personalPendientes) {
    ctrlFase.personalPendientes = [];
  }
  // Migración: cargar servicios febrero 2026 si no existen
  if (!appData.servicios) appData.servicios = [];
  // Migración: RRHH
  if (!appData.fases.find(f => f.id === 'rrhh')) {
    appData.fases.push({ id:'rrhh', numero:'04', nombre:'RRHH', subtitulo:'Gestionar personas', color:'#5D4037', colorClaro:'#EFEBE9', emoji:'—', rutinarias:[], pendientes:[] });
  }
  // Migración: prioridades

async function addServicio() {
  const fechaRaw = document.getElementById('srv_fecha')?.value.trim() || uiState.srvForm?.fecha || '';
  const fecha = fechaRaw ? (() => { const p=fechaRaw.split('-'); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : fechaRaw; })() : null;
  const patenteRaw = document.getElementById('srv_patente')?.value.trim() || uiState.srvForm?.patente || '';

    ? (document.getElementById('srv_patente_manual')?.value.trim().toUpperCase() || uiState.srvForm?.patenteManual || 'TERCERO')

  const conductor = document.getElementById('srv_conductor')?.value.trim() || uiState.srvForm?.conductor || '';
  const tipoEquipo = document.getElementById('srv_tipo_equipo')?.value.trim() || uiState.srvForm?.tipoEquipo || '';
  const clienteSelect = document.getElementById('srv_cliente')?.value.trim() || uiState.srvForm?.cliente || '';

    ? (document.getElementById('srv_cliente_nuevo')?.value.trim() || uiState.srvForm?.clienteNuevo || '')
    : clienteSelect;
  const peajesVal = document.getElementById('srv_peajes')?.value || uiState.srvForm?.peajes || '';
  const peajes = parseInt(peajesVal);
  // Validaciones obligatorias
  if (!fechaRaw) { alert('⚠️ Debes ingresar la fecha del servicio.'); return; }
  if (!conductor) { alert('⚠️ Debes seleccionar un conductor.'); return; }
  if (!patente) { alert('⚠️ Debes seleccionar una patente.'); return; }
  if (!cliente) { alert('⚠️ Debes seleccionar un cliente.'); return; }
  if (peajes === undefined || peajes === null || isNaN(peajes)) { alert('⚠️ Ingresa los peajes — escribe 0 si no hay.'); return; }
  if (!appData.servicios) appData.servicios = [];
  const hoy = new Date();
  const fechaFinal = fecha || `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  const partesFecha = fechaFinal.split('-');
  const anio = partesFecha[2] || hoy.getFullYear().toString();
  const mes = partesFecha[1] || String(hoy.getMonth()+1).padStart(2,'0');
  const id = generarIdServicio(appData.servicios, fechaFinal);
  const puntos = (uiState.srv_puntos || []).filter(p => p.guia||p.origen||p.destino);
  const origen = puntos.length ? puntos[0].origen : '';
  const guias = puntos.length
    ? puntos.map(p => ({ num: p.guia, destino: p.destino, fecha_descarga: p.fecha_descarga, origen: p.origen, tipo: p.tipo, fecha_guia: p.fecha_guia, kg: p.kg||'', imagen_url: p.imagen_url||'' }))
    : [{ num:'', destino:'', fecha_descarga:'' }];
  const tag = '';
  const km = 0;
  const viaticos = 0;
  const numPuntos = parseInt(document.getElementById('srv_num_puntos')?.value||uiState.srvForm?.numPuntos||'1')||1;
  const estadia = document.getElementById('srv_estadia')?.value||uiState.srvForm?.estadia||'no';
  const estadiaDias = parseInt(document.getElementById('srv_estadia_dias')?.value||uiState.srvForm?.estadiaDias||'1')||1;
  const servicio = { id, fecha: fechaFinal, anio, mes, patente, conductor, tipoEquipo, cliente, precio: 0, petroleo: 0, adicional: 0, liquidado: false, origen: 'Casablanca', tag, km, viaticos, peajes, guias, puntos, numPuntos, estadia, estadiaDias };
  appData.servicios.push(servicio);
  // Registrar para deshacer
  registrarAccion(`Registrar servicio ${id} — ${cliente}`, () => {
    const i = appData.servicios.findIndex(s=>s.id===id);
    if (i!==-1) {
      appData.servicios.splice(i,1);
      if (supaConectado && supa) supa.from('servicios').delete().eq('id',id).then(()=>{});
    }
  });
  if (conductor && !(appData.conductores||[]).includes(conductor)) {
    if (!appData.conductores) appData.conductores = [];
    appData.conductores.push(conductor);
  }
  // Limpiar formulario completo
  uiState.srv_guias = [{ num:'', destino:'', fecha_descarga:'' }];
  uiState.srv_puntos = [{ origen:'', destino:'', tipo:'descarga', guia:'', fecha_guia:'', fecha_descarga:'', kg:'', imagen_url:'' }];
  uiState.srvForm = {};
  saveData();
  render();
  // Sincronizar con Supabase inmediatamente
  if (supaConectado && supa) {
    try {
      const { error } = await supa.from('servicios').upsert(servicioToRow(servicio), {onConflict:'id'});
      mostrarToastServicio(!error);
    } catch(e) { mostrarToastServicio(false); }
  } else {
    mostrarToastServicio(false);
  }
  render();
}
async function delServicio(si) {
  if (!appData.servicios) return;
  const servicio = appData.servicios[si];
  if (!servicio) return;
  if (!confirm(`¿Eliminar servicio ${servicio.id} — ${servicio.cliente||'sin cliente'}?\nEsta acción no se puede deshacer.`)) return;
  const precio = servicio.precio || 0;
  const id = servicio.id;
  const copiaSrv = JSON.parse(JSON.stringify(servicio));
  registrarAccion(`Eliminar servicio ${id} — ${servicio.cliente||''}`, () => {
    appData.servicios.splice(si, 0, copiaSrv);
    if (supaConectado && supa) upsertServicioSupabase(copiaSrv);
  });
  appData.servicios.splice(si, 1);
  appData.dashboard.ventas_mes = Math.max(0, (appData.dashboard.ventas_mes || 0) - precio);
  saveData(); render();
  if (supaConectado && supa && id) {
    try { await supa.from('servicios').delete().eq('id', id); } catch(e) {}
  }
}

  if (el.isContentEditable) return;
  el.contentEditable = true;
  el.style.outline = '1px solid #aaa';
  el.style.borderRadius = '3px';
  el.style.padding = '1px 4px';
  el.focus();
  // Seleccionar todo el texto
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
  const guardar = () => {
    el.contentEditable = false;
    el.style.outline = '';
    el.style.padding = '';
    const nuevoTexto = el.innerText.trim();
    if (nuevoTexto) {
      appData.fases.find(f=>f.id===faseId).pendientes[pi].texto = nuevoTexto;
      saveData();
    } else { render(); }
  };
  el.onblur = guardar;
  el.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } if (e.key === 'Escape') { render(); } };
}

function renderFase(fase) {
  const tab = uiState[`tab_${fase.id}`] || 'rutinarias';
  const pendActivos = fase.pendientes.filter(p=>!p.done).length;
  const urgentes = fase.pendientes.filter(p=>p.badge==='hoy'&&!p.done).length;

  // Migración: asegurar que "Registro de servicio diario" existe en operacional
  if (fase.id === 'control') {
    const tieneRespaldo = fase.rutinarias.some(r => r.respaldoTask);
    if (!tieneRespaldo) {
      fase.rutinarias.push({
        titulo: 'Respaldo base de datos',
        proc: 'Ejecutar al término de cada día para respaldar toda la información del sistema en tu PC.',
        subtareas: [
          'Paso 1 — Ir a Control de Gestión → Tareas Rutinarias',
          'Paso 2 — Abrir tarea Respaldo base de datos',
          'Paso 3 — Hacer clic en el botón Descargar respaldo',
          'Paso 4 — El archivo se descarga con la fecha del día',
          'Paso 5 — Guardar en carpeta Respaldos Global Solutions en tu PC'
        ],
        respaldoTask: true, done: false
      });
      saveData();
    }
  }

  if (fase.id === 'comercial') {
    const tienePipeline = fase.rutinarias.some(r => r.pipelineTask);
    if (!tienePipeline) {
      fase.rutinarias.push({ titulo: 'Pipeline Comercial', proc: 'Revisar y actualizar el estado de cada cliente y prospecto activo.', subtareas: [], pipelineTask: true, done: false });
      saveData();
    }
  }

  if (fase.id === 'operacional') {
    const tieneRegistro = fase.rutinarias.some(r => r.registroServicio);
    if (!tieneRegistro) {
      fase.rutinarias.unshift({ titulo: 'Registro de servicio diario', proc: 'Completar al ejecutar o coordinar cada servicio del día.', subtareas: [], registroServicio: true, done: false });
      saveData();
    }
    const tieneDisponibilidad = fase.rutinarias.some(r => r.disponibilidadDiaria);
    if (!tieneDisponibilidad) {
      // Insertar en segundo lugar
      const idx = fase.rutinarias.findIndex(r => r.registroServicio);
      fase.rutinarias.splice(idx + 1, 0, { titulo: 'Disponibilidad y Ocupación diaria', proc: 'Registrar el estado de cada equipo al inicio del día.', subtareas: [], disponibilidadDiaria: true, done: false });
      saveData();
    } else {
      // Asegurar que disponibilidad esté en segundo lugar
      const idxReg = fase.rutinarias.findIndex(r => r.registroServicio);
      const idxDisp = fase.rutinarias.findIndex(r => r.disponibilidadDiaria);
      if (idxDisp !== idxReg + 1 && idxReg !== -1 && idxDisp !== -1) {
        const disp = fase.rutinarias.splice(idxDisp, 1)[0];
        fase.rutinarias.splice(idxReg + 1, 0, disp);
        saveData();
      }
    }
  }

  // v36: tareas sistema financiero
  if (fase.id === 'financiero') {
    if (!fase.rutinarias.some(r=>r.cierreServicioTask)) {
      fase.rutinarias.unshift({titulo:'Cierre de Servicios',proc:'Completar precio, Km, tag y datos faltantes.',subtareas:[],cierreServicioTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.liquidacionTask)) {
      const _iC=fase.rutinarias.findIndex(r=>r.cierreServicioTask);
      fase.rutinarias.splice(_iC+1,0,{titulo:'Liquidaciones',proc:'Gestionar liquidaciones por servicio o grupo.',subtareas:[],liquidacionTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.facturaTask)) {
      const _iLqRF=fase.rutinarias.findIndex(r=>r.liquidacionTask);
      fase.rutinarias.splice(_iLqRF+1,0,{titulo:'Facturación y Cobro',proc:'Registrar facturas emitidas, gestionar factoring y hacer seguimiento de cobro.',subtareas:[],facturaTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.costosTask)) {
      const _iFacRF=fase.rutinarias.findIndex(r=>r.facturaTask);
      fase.rutinarias.splice(_iFacRF+1,0,{titulo:'Costos',proc:'Resumen de costos del mes: petróleo, peajes, viáticos, comisiones, costos fijos y rendiciones.',subtareas:[],costosTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.cajaTask)) {
      const _iCosRF=fase.rutinarias.findIndex(r=>r.costosTask);
      fase.rutinarias.splice(_iCosRF+1,0,{titulo:'Caja',proc:'Flujo de caja del mes: cobros recibidos, egresos, saldo estimado y pendientes de facturar.',subtareas:[],cajaTask:true,done:false});
      saveData();
    }
    if (!fase.rutinarias.some(r=>r.rendicionTask)) {
      fase.rutinarias.push({titulo:'Rendición de Gastos',proc:'Registrar y gestionar rendiciones de gastos del equipo.',subtareas:[],rendicionTask:true,done:false});
      saveData();
    } else {
      const _iRenRF=fase.rutinarias.findIndex(r=>r.rendicionTask);
      if (_iRenRF!==-1 && _iRenRF!==fase.rutinarias.length-1) {
        const [_renRF]=fase.rutinarias.splice(_iRenRF,1);
        fase.rutinarias.push(_renRF);
        saveData();
      }
    }
    let _cpcRF=0; let _facRF=0; let _factRF=0;
    fase.rutinarias=fase.rutinarias.filter(r=>{
      if(r.liquidacionServicios||r.cierreLiquidacion) return false;
      if(r.titulo==='Bancarización Global Solutions'||r.titulo==='Bancarizacion Global Solutions') return false;
      if(r.titulo==='Control de caja y presupuesto') return false;
      if(r.titulo==='Cuentas por cobrar'||r.cuentasCobrarTask){_cpcRF++;return _cpcRF<=1;}
      if(r.facturaTask){_facRF++;return _facRF<=1;}
      if(r.factoringTask){_factRF++;return _factRF<=1;}
      return true;
    });
  }
  // v36: Rendimiento Combustible en operacional
  if (fase.id==='operacional' && !fase.rutinarias.some(r=>r.rendimientoCombTask)) {
    fase.rutinarias.push({titulo:'Rendimiento Combustible',proc:'Registrar odómetro inicio/fin del día.',subtareas:[],rendimientoCombTask:true,done:false});
    saveData();

  if (fase.id==='comercial' && !fase.rutinarias.some(r=>r.cotizacionTask)) {

        return `<div style="padding:10px 12px;margin-bottom:6px;background:${color};border:1px solid ${colorBorde};border-radius:8px;cursor:pointer">

function servicioToRow(s) {
  // Convertir fecha de dd-mm-yyyy a yyyy-mm-dd para Supabase
  const fechaISO = s.fecha ? (() => {
    const p = s.fecha.split('-');
    if (p.length === 3 && p[0].length === 2) return p[2]+'-'+p[1]+'-'+p[0];
    return s.fecha;
  })() : null;
  return {
    id: s.id,
    fecha: fechaISO,
    anio: s.anio,
    mes: s.mes,
    patente: s.patente || '',
    conductor: s.conductor || '',
    tipo_equipo: s.tipoEquipo || '',
    cliente: s.cliente || '',
    origen: s.origen || '',
    peajes: s.peajes || 0,
    guias: s.guias || [],
    precio: s.precio || 0,
    km: s.km || 0,
    litros: s.litros || 0,
    monto_comb: s.montoComb || 0,
    petroleo: s.petroleo || 0,
    adicional: s.adicional || 0,
    viaticos: s.viaticos || 0,
    cobro: s.cobro || 'pendiente',
    liquidado: s.liquidado || false,
    costo_total: s.costoTotal || 0,
    margen: s.margen || 0,
    rendimiento: s.rendimiento || 0,
    tag: s.tag || '',
    liquidacion_id: s.liquidacionId || '',
  };
}

    viaticos: r.viaticos,

    liquidado: r.liquidado,

      for (const item of appData.pipeline) {

        };

async function guardarPipelineSupabase(item) {
  if (!supaConectado || !supa) return;
  const row = {
    cliente: item.cliente,
    contacto: item.contacto || '',
    contactos: item.contactos || [],
    categoria: item.categoria || '',
    etapa: item.etapa || 'prospecto',
    ultima_gestion: item.ultimaGestion || '',
    proxima_accion: item.proximaAccion || '',
    notas: item.notas || '',
    notas_multiples: item.notasMultiples || [],
    rut: item.rut || '',
    email_factura: item.emailFactura || '',
    tipo_cliente: item.tipoCliente || 'directo',
    condicion_pago: item.condicionPago || '30',
    requiere_aprobacion: item.requiereAprobacion || false,
  };
  if (item.id && item.id.includes('-')) {
    await supa.from('pipeline').update(row).eq('id', item.id);

    if (data) item.id = data.id;
  }
}

async function syncDisponibilidadDesdeSupabase() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('disponibilidad').select('*').order('created_at');
    if (error) { console.warn('Error sync disponibilidad:', error); return; }
    if (!data || data.length === 0) {
      // Primera vez — migrar local a Supabase
      const local = appData.disponibilidad || {};
      for (const fecha of Object.keys(local)) {
        for (const patente of Object.keys(local[fecha])) {
          const r = local[fecha][patente];
          await supa.from('disponibilidad').upsert({
            id: `${fecha}_${patente}`,
            fecha, patente,
            estado: r.estado||'',
            conductor: r.conductor||'',
            tipo_mant: r.tipoMant||'',
            mant_manual: r.mantManual||''
          }, { onConflict: 'id' });
        }
      }
    } else {
      // Reconstruir appData.disponibilidad desde Supabase
      const disp = {};
      data.forEach(r => {
        if (!disp[r.fecha]) disp[r.fecha] = {};
        disp[r.fecha][r.patente] = {
          estado: r.estado||'',
          conductor: r.conductor||'',
          tipoMant: r.tipo_mant||'',
          mantManual: r.mant_manual||''
        };
      });
      appData.disponibilidad = disp;
      saveData();
    }
  } catch(e) { console.warn('Error sync disponibilidad:', e); }
}

async function syncConfigPanel() {
  if (!supa || !supaConectado) return;
  try {
    const { data, error } = await supa.from('config_panel').select('*').eq('id', 'main').single();
    if (error || !data) {
      await pushConfigPanel();
    } else {
      if (data.data && data.data.fases) {
        appData.fases = data.data.fases;
        _deduplicarFases();
        saveData();
      }
    }
  } catch(e) { console.warn('Error sync config panel:', e); }
}

function _deduplicarFases() {
  (appData.fases||[]).forEach(f => {
    if (!f.rutinarias) return;
    // Deduplicar por flag de sistema
    const flags = ['facturaTask','costosTask','cajaTask','liquidacionTask','cierreServicioTask','rendicionTask','pipelineTask','rendimientoCombTask'];
    flags.forEach(flag => {
      let cnt = 0;
      f.rutinarias = f.rutinarias.filter(r => r[flag] ? ++cnt <= 1 : true);
    });
    // Eliminar tareas manuales con títulos duplicados de tareas de sistema
    const titulosEliminar = ['facturación y cobro','facturacion y cobro','cuentas por cobrar','bancarización global solutions','bancarizacion global solutions','control de caja y presupuesto'];
    const tieneSistema = { facturaTask: f.rutinarias.some(r=>r.facturaTask) };
    f.rutinarias = f.rutinarias.filter(r => {
      const titulo = (r.titulo||'').toLowerCase().trim();
      // Si es tarea de sistema con flag, la conservamos
      if (flags.some(fl => r[fl])) return true;
      // Si el título coincide con uno de sistema y ya existe la versión con flag, eliminar
      if (titulo.includes('facturación y cobro') || titulo.includes('facturacion y cobro')) return !tieneSistema.facturaTask;
      if (titulo === 'cuentas por cobrar' || r.cuentasCobrarTask) return false;
      return true;
    });
  });
  saveData();
}

function editarPipeline(ci) {

function cancelarEditPipeline(ci) { delete uiState[`pip_edit_${ci}`]; if(uiState.pip_form_vals) delete uiState.pip_form_vals[ci]; render(); }
function cancelarAddPipeline() { delete uiState['pip_add']; delete uiState.pipNew; render(); }
async function agregarNotaPipeline(ci) {
  const input = document.getElementById('pip_nota_nueva_' + ci);
  if (!input || !input.value.trim()) return;
  const lista = appData.pipeline;
  if (!lista[ci].notasMultiples) lista[ci].notasMultiples = [];
  const hoy = new Date();
  const fecha = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
  lista[ci].notasMultiples.push({ fecha, texto: input.value.trim() });
  await guardarPipelineSupabase(lista[ci]);
  input.value = '';
  saveData();
  render();
  showToastGeneral('✅ Nota guardada');
}

function eliminarNotaPipeline(ci, ni) {
  const lista = appData.pipeline;
  if (!lista[ci].notasMultiples) return;
  lista[ci].notasMultiples.splice(ni, 1);
  guardarPipelineSupabase(lista[ci]);
  saveData();
  render();
}

async function guardarPipeline(ci) {
  if (!appData.pipeline) appData.pipeline = [];
  const item = appData.pipeline[ci];
  const notasExistentes = item.notasMultiples || [];
  appData.pipeline[ci] = {
    id: item.id || '',
    cliente: document.getElementById(`pip_cliente_${ci}`)?.value.trim() || item.cliente,
    contacto: '',
    contactos: item.contactos || [],
    categoria: document.getElementById(`pip_cat_${ci}`)?.value || item.categoria || '',
    etapa: document.getElementById(`pip_etapa_${ci}`)?.value || 'prospecto',
    proximaAccion: document.getElementById(`pip_accion_${ci}`)?.value.trim() || '',
    notas: item.notas || '',
    ultimaGestion: item.ultimaGestion || '',
    notasMultiples: notasExistentes,
    rut: (uiState.pip_form_vals&&uiState.pip_form_vals[ci]&&uiState.pip_form_vals[ci].rut!==undefined)?uiState.pip_form_vals[ci].rut:(document.getElementById(`pip_rut_${ci}`)?.value.trim()||item.rut||''),
    emailFactura: (uiState.pip_form_vals&&uiState.pip_form_vals[ci]&&uiState.pip_form_vals[ci].email_factura!==undefined)?uiState.pip_form_vals[ci].email_factura:(document.getElementById(`pip_email_factura_${ci}`)?.value.trim()||item.emailFactura||''),
    tipoCliente: document.getElementById(`pip_tipo_${ci}`)?.value || item.tipoCliente || 'directo',
    condicionPago: document.getElementById(`pip_pago_${ci}`)?.value || item.condicionPago || '30',
    requiereAprobacion: !!(document.getElementById('pip_aprueba_'+ci)?.checked),
  };
  delete uiState[`pip_edit_${ci}`];
  if(uiState.pip_form_vals) delete uiState.pip_form_vals[ci];
  await guardarPipelineSupabase(appData.pipeline[ci]);
  saveData(); render();
  showToastGeneral('✅ Cliente guardado correctamente');
}
async function agregarPipeline() {
  const cliente = document.getElementById('pip_new_cliente')?.value.trim();
  if (!cliente) return;
  if (!appData.pipeline) appData.pipeline = [];
  const hoy = new Date();
  const mes = hoy.toLocaleDateString('es-CL',{month:'short',year:'numeric'});

    etapa: document.getElementById('pip_new_etapa')?.value || pn.etapa || 'prospecto',

    notas: document.getElementById('pip_new_notas')?.value.trim() || pn.notas || '',
    ultimaGestion: mes,
    notasMultiples: [],
    rut: document.getElementById('pip_new_rut')?.value.trim() || pn.rut || '',
    emailFactura: document.getElementById('pip_new_email_factura')?.value.trim() || pn.email || '',

function renderInformes() {
  const periodo = uiState.informe_periodo || 'mes';
  const ambitoSel = uiState.informe_ambito || 'comercial';
  const servicios = appData.servicios || [];

  // Filtrar por período
  const hoy = new Date();
  const dd = s => { const p=s.fecha.split('-'); return new Date(p[2],p[1]-1,p[0]); };

  function filtrarPeriodo(svcs) {
    if (periodo === 'hoy') {
      const h = `${String(hoy.getDate()).padStart(2,'0')}-${String(hoy.getMonth()+1).padStart(2,'0')}-${hoy.getFullYear()}`;
      return svcs.filter(s => s.fecha === h);
    }
    if (periodo === 'semana') {
      const lunes = new Date(hoy); lunes.setDate(hoy.getDate() - hoy.getDay() + 1);
      return svcs.filter(s => { try { return dd(s) >= lunes; } catch(e) { return false; } });
    }
    if (periodo === 'mes') {
      return svcs.filter(s => s.mes === String(hoy.getMonth()+1).padStart(2,'0') && s.anio === String(hoy.getFullYear()));
    }
    if (periodo === 'anterior') {
      const mesSel = uiState.informe_mes_sel || `${hoy.getFullYear()}-${String(hoy.getMonth()).padStart(2,'0')}`;
      const [anio, mes] = mesSel.split('-');
      return svcs.filter(s => s.anio === anio && s.mes === mes);
    }
    if (periodo === 'anual') {
      return svcs.filter(s => s.anio === String(hoy.getFullYear()));
    }
    return svcs;
  }

  const filtrados = filtrarPeriodo(servicios);
  const liquidados = filtrados.filter(s => s.liquidado);

  // KPIs base
  const totalServicios = filtrados.length;
  const totalIngresos = liquidados.reduce((a,s) => a+(s.precio||0), 0);
  const totalKm = liquidados.reduce((a,s) => a+(s.km||0), 0);
  const totalCombMonto = liquidados.reduce((a,s) => a+(s.montoComb||0), 0);
  const totalLitros = liquidados.reduce((a,s) => a+(s.litros||0), 0);
  const totalCostos = liquidados.reduce((a,s) => a+(s.costoTotal||0), 0);
  const rendProm = totalLitros > 0 ? (totalKm/totalLitros).toFixed(1) : '—';
  const margenProm = totalIngresos > 0 ? Math.round(((totalIngresos-totalCostos)/totalIngresos)*100) : 0;
  const cobPagado = liquidados.filter(s=>s.cobro==='pagado').reduce((a,s)=>a+(s.precio||0),0);
  const cobPendiente = liquidados.filter(s=>!s.cobro||s.cobro==='pendiente').reduce((a,s)=>a+(s.precio||0),0);
  const cobFacturado = liquidados.filter(s=>s.cobro==='facturado').reduce((a,s)=>a+(s.precio||0),0);

  // Meses disponibles para selector
  const mesesDisp = [...new Set(servicios.map(s => `${s.anio}-${s.mes}`))].sort().reverse();

  // Selector de período
  const periodos = [
    { id:'hoy', label:'Hoy' },
    { id:'semana', label:'Esta semana' },
    { id:'mes', label:'Este mes' },
    { id:'anterior', label:'Mes anterior' },
    { id:'anual', label:'Año completo' },
  ];

  const periodoHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${periodos.map(p=>`<button onclick="uiState.informe_periodo='${p.id}';render()" style="padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${periodo===p.id?'#455A64':'#ECEFF1'};color:${periodo===p.id?'white':'#455A64'}">${p.label}</button>`).join('')}
    ${periodo==='anterior' && mesesDisp.length > 0 ? `<select onchange="uiState.informe_mes_sel=this.value;render()" style="border:1px solid #dde;border-radius:8px;padding:5px 8px;font-size:11px;outline:none">
      ${mesesDisp.map(m=>`<option value="${m}" ${uiState.informe_mes_sel===m?'selected':''}>${m}</option>`).join('')}
    </select>` : ''}
  </div>`;

  // Selector de ámbito
  const ambitos = [
    { id:'comercial', label:'Comercial', color:'#1565C0' },
    { id:'operacional', label:'Operacional', color:'#455A64' },
    { id:'financiero', label:'Financiero', color:'#2E7D32' },
    { id:'rrhh', label:'RRHH', color:'#5D4037' },
    { id:'scalingup', label:'Scaling Up', color:'#37474F' },
  ];

  const ambitoHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px">
    ${ambitos.map(a=>`<button onclick="uiState.informe_ambito='${a.id}';render()" style="padding:8px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${ambitoSel===a.id?a.color:'#ECEFF1'};color:${ambitoSel===a.id?'white':a.color}">${a.label}</button>`).join('')}
  </div>`;

  // KPIs resumen
  const kpisHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    <div style="background:#F5F5F5;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;color:#888;font-weight:700">SERVICIOS</div>
      <div style="font-size:22px;font-weight:900;color:#455A64">${totalServicios}</div>
    </div>
    <div style="background:#E8F5E9;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;color:#888;font-weight:700">INGRESOS</div>
      <div style="font-size:16px;font-weight:900;color:#2E7D32">${fmtPeso(totalIngresos)}</div>
    </div>
    <div style="background:#E3F2FD;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;color:#888;font-weight:700">KM TOTALES</div>
      <div style="font-size:18px;font-weight:900;color:#1565C0">${totalKm.toLocaleString('es-CL')}</div>
    </div>
    <div style="background:#FFF9C4;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;color:#888;font-weight:700">MARGEN PROM</div>
      <div style="font-size:18px;font-weight:900;color:#F9A825">${margenProm}%</div>
    </div>
  </div>`;

  // Contenido por ámbito
  function contenidoComercial() {
    const porCliente = {};
    filtrados.forEach(s => {
      const c = s.cliente || 'Sin cliente';
      if (!porCliente[c]) porCliente[c] = { servicios:0, ingresos:0, pendiente:0, pagado:0, facturado:0 };
      porCliente[c].servicios++;
      if (s.liquidado) {
        porCliente[c].ingresos += s.precio||0;
        if (s.cobro==='pagado') porCliente[c].pagado += s.precio||0;
        else if (s.cobro==='facturado') porCliente[c].facturado += s.precio||0;
        else porCliente[c].pendiente += s.precio||0;
      }
    });
    const rows = Object.entries(porCliente).sort((a,b)=>b[1].ingresos-a[1].ingresos);
    if (rows.length === 0) return `<div style="text-align:center;color:#aaa;padding:20px;font-size:12px">Sin servicios en este período</div>`;
    return `<div style="font-size:9px;font-weight:700;color:#1565C0;margin-bottom:8px;letter-spacing:0.5px">POR CLIENTE</div>
    ${rows.map(([c,d])=>`<div style="padding:10px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:6px;border-left:3px solid #1565C0">
      <div style="display:flex;justify-content:space-between;align-items:center">

        ${d.pendiente?`<span style="font-size:9px;background:#FFFDE7;color:#F9A825;padding:2px 6px;border-radius:6px">⏳ ${fmtPeso(d.pendiente)}</span>`:''}
        ${d.facturado?`<span style="font-size:9px;background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:6px">🧾 ${fmtPeso(d.facturado)}</span>`:''}
      </div>

    <div style="padding:10px 12px;background:#E8F5E9;border-radius:8px;margin-top:4px">
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;font-weight:700;color:#2E7D32">Por cobrar</span>
        <span style="font-size:12px;font-weight:900;color:#F9A825">${fmtPeso(cobPendiente)}</span>
      </div>
    </div>`;
  }

  function contenidoOperacional() {
    const FLOTA = appData.patentes || ['WR9192','GKFD84','XR8555','GCFF12','BPBL35','XA1114','DSDV36'];

    // Por equipo (flota completa)
    const porPatente = {};
    FLOTA.forEach(p => porPatente[p] = { servicios:0, km:0, ingresos:0, conductores:new Set() });
    filtrados.forEach(s => {
      const p = s.patente || 'TERCERO';
      if (!porPatente[p]) porPatente[p] = { servicios:0, km:0, ingresos:0, conductores:new Set() };
      porPatente[p].servicios++;
      porPatente[p].km += s.km||0;
      porPatente[p].ingresos += s.precio||0;
      if (s.conductor) porPatente[p].conductores.add(s.conductor);
    });

    // Días en mantención por patente
    const dispData = appData.disponibilidad || {};
    const diasMant = {};
    FLOTA.forEach(p => diasMant[p] = 0);
    Object.values(dispData).forEach(diaObj => {
      Object.entries(diaObj).forEach(([pat, reg]) => {
        if (reg.estado === 'Mantención') diasMant[pat] = (diasMant[pat]||0) + 1;
      });
    });

    // Por conductor
    const porConductor = {};
    filtrados.forEach(s => {
      const c = s.conductor || 'Sin conductor';
      if (!porConductor[c]) porConductor[c] = { servicios:0, km:0 };
      porConductor[c].servicios++;
      porConductor[c].km += s.km||0;
    });

    const equiposHTML = FLOTA.map(p => {
      const d = porPatente[p];
      const conductList = [...d.conductores].join(', ') || '—';

          <div style="font-size:10px;color:#777">Conductor: <strong style="color:#333">${conductList}</strong></div>
        </div>

    }).join('');

    const conductoresHTML = Object.entries(porConductor).sort((a,b)=>b[1].servicios-a[1].servicios).map(([c,d]) =>
      `<div style="padding:8px 12px;background:#F8F9FA;border-radius:8px;margin-bottom:5px;border-left:3px solid #607D8B;display:flex;justify-content:space-between">

        <span style="font-size:11px;color:#455A64;font-weight:700">${d.servicios} servicios${d.km?' · '+d.km.toLocaleString()+' km':''}</span>
      </div>`

    return `

      <div style="background:#FFFDE7;border-radius:8px;padding:10px">
